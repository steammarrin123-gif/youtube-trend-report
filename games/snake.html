<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 뱀 게임</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#141e30,#243b55);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;color:#fff;}
  #top-bar{width:100%;max-width:420px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  #top-bar a{color:#aaa;text-decoration:none;font-size:0.9rem;}
  #music-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;color:#fff;font-size:0.9rem;padding:5px 12px;cursor:pointer;}
  h1{font-size:1.6rem;margin-bottom:4px;}
  #level-btns{display:flex;gap:8px;margin-bottom:8px;}
  .lvl-btn{background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);border-radius:8px;color:#fff;font-size:0.82rem;font-weight:bold;padding:5px 12px;cursor:pointer;transition:background .2s;}
  .lvl-btn.active,.lvl-btn:hover{background:rgba(255,255,255,0.25);}
  #stats{display:flex;gap:22px;font-size:0.9rem;margin-bottom:10px;color:#ccc;}
  #stats span{color:#ffd700;font-weight:bold;}
  #canvas-wrap{position:relative;border-radius:12px;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,0.5);}
  canvas{display:block;background:#0d1117;}
  #overlay{position:absolute;inset:0;background:rgba(0,0,0,0.78);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;}
  #overlay h2{font-size:1.7rem;margin-bottom:7px;}
  #overlay p{color:#aaa;margin-bottom:18px;font-size:0.9rem;text-align:center;line-height:1.6;}
  #start-btn{background:linear-gradient(135deg,#56ab2f,#a8e063);border:none;border-radius:10px;color:#1a1a2e;font-size:1rem;font-weight:bold;padding:11px 28px;cursor:pointer;}
  #controls{display:grid;grid-template-columns:repeat(3,50px);gap:6px;margin-top:14px;}
  .ctrl-btn{width:50px;height:50px;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);border-radius:10px;color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;transition:background .15s;}
  .ctrl-btn:active{background:rgba(255,255,255,0.3);}
</style>
</head>
<body>
<div id="top-bar">
  <a href="index.html">← 메뉴</a>
  <button id="music-btn" onclick="toggleMusic()">🎵 음악 켜기</button>
</div>
<h1>🐍 뱀 게임</h1>
<div id="level-btns">
  <button class="lvl-btn active" onclick="setSpeed(160,this)">🐢 느림</button>
  <button class="lvl-btn" onclick="setSpeed(100,this)">🚶 보통</button>
  <button class="lvl-btn" onclick="setSpeed(60,this)">🏃 빠름</button>
</div>
<div id="stats">
  <div>점수: <span id="score">0</span></div>
  <div>최고: <span id="best">0</span></div>
  <div>길이: <span id="length">1</span></div>
</div>
<div id="canvas-wrap">
  <canvas id="canvas" width="400" height="400"></canvas>
  <div id="overlay">
    <h2>🐍 뱀 게임</h2>
    <p>방향키 또는 아래 버튼으로 조작<br>🍎를 먹을수록 뱀이 길어져요!</p>
    <button id="start-btn" onclick="startGame()">시작 ▶</button>
  </div>
</div>
<div id="controls">
  <div></div><button class="ctrl-btn" onclick="changeDir(0,-1)">▲</button><div></div>
  <button class="ctrl-btn" onclick="changeDir(-1,0)">◀</button>
  <button class="ctrl-btn" onclick="changeDir(0,1)">▼</button>
  <button class="ctrl-btn" onclick="changeDir(1,0)">▶</button>
</div>

<script>
const N={R:0,B3:247,C4:262,D4:294,E4:330,F4:349,G4:392,A4:440,B4:494,C5:523,D5:587,E5:659,A5:880};
const MELODY=[[N.E5,.25],[N.B4,.25],[N.C5,.25],[N.D5,.25],[N.E5,.125],[N.D5,.125],[N.C5,.25],[N.B4,.25],[N.A4,.5],[N.A4,.25],[N.C5,.25],[N.E5,.5],[N.D5,.25],[N.C5,.25],[N.B4,.5],[N.R,.25],[N.C5,.25],[N.D5,.5],[N.E5,.5],[N.C5,.5],[N.A4,.5],[N.A4,1],[N.R,.25]];
let audioCtx=null,musicPlaying=false,musicTimer=null,nextNote=0,noteIdx=0;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function schedNote(freq,t,dur){const ctx=getCtx();if(!freq)return;const o=ctx.createOscillator(),g=ctx.createGain();o.type='square';o.frequency.value=freq;g.gain.setValueAtTime(0.07,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur*0.85);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+dur);}
function schedMusic(){if(!musicPlaying)return;const ctx=getCtx(),beat=60/140;while(nextNote<ctx.currentTime+0.3){const[freq,beats]=MELODY[noteIdx];schedNote(freq,nextNote,beat*beats*0.9);nextNote+=beat*beats;noteIdx=(noteIdx+1)%MELODY.length;}musicTimer=setTimeout(schedMusic,100);}
function toggleMusic(){const btn=document.getElementById('music-btn');if(musicPlaying){musicPlaying=false;clearTimeout(musicTimer);btn.textContent='🎵 음악 켜기';}else{musicPlaying=true;const ctx=getCtx();ctx.resume();nextNote=ctx.currentTime+0.1;noteIdx=0;schedMusic();btn.textContent='🔇 음악 끄기';}}
function beep(freq,dur){const ctx=getCtx();ctx.resume();const o=ctx.createOscillator(),g=ctx.createGain();o.type='square';o.frequency.value=freq;g.gain.setValueAtTime(0.15,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+dur);}

const canvas=document.getElementById('canvas');const ctx2=canvas.getContext('2d');
const CELL=20,COLS=20,ROWS=20;
let snake,dir,nextDir,food,interval,score,speed=160;
let best=Number(localStorage.getItem('best_snake')||0);
document.getElementById('best').textContent=best;

function setSpeed(s,btn){speed=s;document.querySelectorAll('.lvl-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function startGame(){
  document.getElementById('overlay').style.display='none';
  snake=[{x:10,y:10}];dir={x:1,y:0};nextDir={x:1,y:0};score=0;
  updateStats();placeFood();clearInterval(interval);
  interval=setInterval(loop,speed);
}
function placeFood(){let p;do{p={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}while(snake.some(s=>s.x===p.x&&s.y===p.y));food=p;}
function changeDir(dx,dy){if(dx!==0&&dir.x!==0)return;if(dy!==0&&dir.y!==0)return;nextDir={x:dx,y:dy};}
function loop(){
  dir=nextDir;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){gameOver();return;}
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score+=10;if(score>best){best=score;localStorage.setItem('best_snake',best);}
    updateStats();placeFood();beep(660,.05);setTimeout(()=>beep(880,.05),.06);
  } else {snake.pop();}
  draw();
}
function draw(){
  ctx2.fillStyle='#0d1117';ctx2.fillRect(0,0,400,400);
  ctx2.strokeStyle='rgba(255,255,255,0.03)';ctx2.lineWidth=0.5;
  for(let i=0;i<=COLS;i++){ctx2.beginPath();ctx2.moveTo(i*CELL,0);ctx2.lineTo(i*CELL,400);ctx2.stroke();}
  for(let j=0;j<=ROWS;j++){ctx2.beginPath();ctx2.moveTo(0,j*CELL);ctx2.lineTo(400,j*CELL);ctx2.stroke();}
  snake.forEach((s,i)=>{
    const r=i/snake.length;
    ctx2.fillStyle=i===0?'#56ab2f':`hsl(${120-r*40},70%,${50-r*20}%)`;
    ctx2.beginPath();ctx2.roundRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2,4);ctx2.fill();
    if(i===0){
      ctx2.fillStyle='#fff';
      const ex=dir.x===1?14:dir.x===-1?4:dir.y===1?14:4;
      const ey=dir.y===1?14:dir.y===-1?4:4;
      ctx2.beginPath();ctx2.arc(s.x*CELL+ex,s.y*CELL+ey,2.5,0,Math.PI*2);ctx2.fill();
    }
  });
  ctx2.font=`${CELL}px serif`;ctx2.textAlign='center';ctx2.textBaseline='middle';
  ctx2.fillText('🍎',food.x*CELL+CELL/2,food.y*CELL+CELL/2);
}
function gameOver(){
  clearInterval(interval);
  beep(300,.1);setTimeout(()=>beep(200,.1),.12);setTimeout(()=>beep(150,.3),.25);
  const ov=document.getElementById('overlay');ov.style.display='flex';
  ov.innerHTML=`<h2>💀 게임 오버</h2><p>점수: ${score}점 · 길이: ${snake.length}<br>최고 기록: ${best}점</p><button id="start-btn" onclick="startGame()" style="background:linear-gradient(135deg,#56ab2f,#a8e063);border:none;border-radius:10px;color:#1a1a2e;font-size:1rem;font-weight:bold;padding:11px 28px;cursor:pointer">다시 시작 🔄</button>`;
}
function updateStats(){document.getElementById('score').textContent=score;document.getElementById('best').textContent=best;document.getElementById('length').textContent=snake.length;}
document.addEventListener('keydown',e=>{
  const map={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]};
  if(map[e.key]){changeDir(...map[e.key]);e.preventDefault();}
});
draw();
</script>
</body>
</html>
