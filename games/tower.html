<script>
'use strict';
// ═══════════════════════════════════════════
//  MUSIC (수노 MP3)
// ═══════════════════════════════════════════
const TRACKS={
  title:new Audio('music/title.mp3'),
  early:new Audio('music/early.mp3'),
  late: new Audio('music/late.mp3'),
  boss: new Audio('music/boss.mp3'),
};
Object.values(TRACKS).forEach(t=>{t.loop=true;t.volume=0.68;});
let mOn=false,curTrack=null,curTName='';
function playTrack(n){if(!mOn)return;if(curTName===n)return;if(curTrack){curTrack.pause();curTrack.currentTime=0;}curTName=n;curTrack=TRACKS[n];curTrack.play().catch(()=>{});}
function updateMusic(){if(!mOn)return;const hasBoss=[...enemies,...attackers].some(e=>!e.dead&&(e.type==='boss'||e.type==='demonlord'));if(hasBoss||wave>=17){playTrack('boss');return;}if(wave===0){playTrack('title');return;}if(wave<=8){playTrack('early');return;}playTrack('late');}
function toggleMusic(){const b=document.getElementById('music-btn');if(mOn){mOn=false;if(curTrack)curTrack.pause();curTName='';b.textContent='🎵 음악 켜기';}else{mOn=true;curTName='';updateMusic();b.textContent='🔇 음악 끄기';}}
document.addEventListener('click',function f(){if(!mOn){mOn=true;curTName='';updateMusic();document.getElementById('music-btn').textContent='🔇 음악 끄기';}document.removeEventListener('click',f);},{once:true});

// SFX
let AC=null;
function gac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function beep(f,d,t='square',v=.08){const c=gac();c.resume();const o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d);}
function sfxBoom(){beep(100,.2,'sawtooth',.3);setTimeout(()=>beep(60,.15,'sawtooth',.25),80);}
function sfxArrow(){beep(800,.03,'square',.06);}
function sfxIce(){beep(1400,.08,'sine',.1);beep(1800,.05,'sine',.08);}
function sfxLightning(){const c=gac();c.resume();const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.setValueAtTime(500,c.currentTime);o.frequency.exponentialRampToValueAtTime(80,c.currentTime+.12);g.gain.setValueAtTime(.18,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.12);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.12);}
function sfxMagic(){beep(660,.06,'sine',.1);setTimeout(()=>beep(880,.05,'sine',.08),60);}
function sfxHit(big){if(big)[200,160,120].forEach((f,i)=>setTimeout(()=>beep(f,.1,'sawtooth',.18),i*80));else beep(440,.04,'square',.1);}
function sfxUI(){beep(660,.06,'square',.09);}
function sfxUnlock(){[440,550,660,880].forEach((f,i)=>setTimeout(()=>beep(f,.08,'sine',.12),i*80));}

// ═══════════════════════════════════════════
//  GRID & PATH
// ═══════════════════════════════════════════
const COLS=30,ROWS=15,CS=40,GW=1200,GH=600;
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const WPT=[[0,7],[4,7],[4,2],[10,2],[10,7],[6,7],[6,12],[12,12],[12,7],[17,7],[17,2],[22,2],[22,12],[27,12],[27,7],[29,7]];

function buildPath(){
  const cells=[],seen=new Set();
  for(let i=0;i<WPT.length-1;i++){
    const[c1,r1]=WPT[i],[c2,r2]=WPT[i+1];
    const dc=Math.sign(c2-c1),dr=Math.sign(r2-r1);
    let c=c1,r=r1;
    while(c!==c2||r!==r2){const k=`${c},${r}`;if(!seen.has(k)){cells.push([c,r]);seen.add(k);}c+=dc;r+=dr;}
  }
  const[lc,lr]=WPT[WPT.length-1];if(!seen.has(`${lc},${lr}`))cells.push([lc,lr]);
  return cells;
}
const PATH=buildPath(),PS=new Set(PATH.map(([c,r])=>`${c},${r}`));
const CASTLE_COL=WPT[WPT.length-1][0],CASTLE_ROW=WPT[WPT.length-1][1];
const CX=CASTLE_COL*CS+CS/2,CY=CASTLE_ROW*CS+CS/2;

// zone per column: 0=forest, 1=ruins, 2=volcanic
function zone(col){return col<10?0:col<20?1:2;}

// ═══════════════════════════════════════════

// ═══════════════════════════════════════════

//  WAVES (20 waves, 4 chapters)
// ═══════════════════════════════════════════
const WAVES=[
  [{t:'orc',n:8,iv:42}],

// ═══════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════
const MAX_HP=1000;
let gold=200,playerHP=MAX_HP,score=0,wave=0,best=Number(localStorage.getItem('lb_best')||0);
let towers=[],enemies=[],attackers=[],bullets=[],particles=[],effects=[],lightnings=[],dmgNums=[];
let spawnQueues=[],selType=0,selTower=null;
let waveRunning=false,gameOver=false,gameWon=false,spd=1,frame=0;
let shakeX=0,shakeY=0,redFlash=0,hovCell=null;
let waveMsg='',waveMsgT=0;

function chOf(w){return w<=5?1:w<=10?2:w<=15?3:4;}
function addP(x,y,col,n,sp,sz=3){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=(Math.random()*.8+.4)*sp;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col,sz:Math.random()*sz+1.5});}}
function shake(a){shakeX=(Math.random()-.5)*a;shakeY=(Math.random()-.5)*a;}
function addFx(type,x,y,opts){effects.push({type,x,y,life:1,...opts});}
let _toastT=null;
function toast(msg,col='#ffd700'){const e=document.getElementById('toast');e.textContent=msg;e.style.color=col;e.style.opacity=1;clearTimeout(_toastT);_toastT=setTimeout(()=>e.style.opacity=0,2200);}
function addDmg(x,y,n){dmgNums.push({x,y,n:Math.floor(n),life:1,vy:-2});}

function dealDmg(dmg,e){
  playerHP=Math.max(0,playerHP-dmg);redFlash=20;shake(3+dmg/30);
  addDmg(CX+(Math.random()-.5)*50,CY-50,dmg);addP(CX,CY,'#e74c3c',10,5,4);
  addFx('castle_hit',CX,CY,{col:EDEFS[e.type].atkColor,life:1,decay:.05});
  if(playerHP<=0){gameOver=true;sfxHit(true);}else sfxHit(false);
  updateHUD();
}

// ═══════════════════════════════════════════
//  HUD UPDATE
// ═══════════════════════════════════════════
function updateHUD(){
  const p=playerHP/MAX_HP,bar=document.getElementById('hp-bar');
  bar.style.width=(p*100)+'%';bar.style.background=p>.5?'linear-gradient(90deg,#2ecc71,#1abc9c)':p>.25?'linear-gradient(90deg,#f39c12,#e67e22)':'linear-gradient(90deg,#e74c3c,#c0392b)';
  document.getElementById('hp-txt').textContent=playerHP+'/'+MAX_HP;
  document.getElementById('hg').textContent=gold;
  document.getElementById('hw').textContent=wave;
  document.getElementById('hs').textContent=score.toLocaleString();
  document.getElementById('hb').textContent=best.toLocaleString();
  document.getElementById('hch').textContent='챕터 '+chOf(wave||1);
  const wb=document.getElementById('wave-btn');
  if(wave>=20){wb.textContent='전쟁 종료';wb.className='done';}
  else if(waveRunning){wb.textContent='⚡ 다음 웨이브 앞당기기 [스페이스]';wb.className='running';}
  else{wb.textContent='▶ 다음 웨이브 시작 [스페이스]';wb.className='';}
  [1,2,3,4].forEach(n=>document.getElementById('sp'+n).classList.toggle('on',spd===n));
  renderShop();
}
function setSpd(n){spd=n;updateHUD();sfxUI();}

// ═══════════════════════════════════════════
//  SHOP
// ═══════════════════════════════════════════
function renderShop(){
  const sh=document.getElementById('shop');sh.innerHTML='';
  TDEFS.forEach((td,i)=>{
    const unlocked=wave>=td.unlock||i<3,afford=gold>=td.lv[0].cost;
    const btn=document.createElement('button');
    btn.className='tb'+(selType===i&&!selTower?' sel':'');btn.disabled=!unlocked;
    const previewC=document.createElement('canvas');previewC.width=32;previewC.height=32;
    drawTowerPreview(previewC.getContext('2d'),i,16,20);
    btn.appendChild(previewC);
    const n=document.createElement('div');n.className='tb-name';n.style.color=td.color;n.textContent=td.name;btn.appendChild(n);
    const c=document.createElement('div');c.className='tb-cost';c.style.color=afford?'#ffd700':'#e74c3c';c.textContent=unlocked?('💰'+td.lv[0].cost):'🔒W'+td.unlock;btn.appendChild(c);
    const d=document.createElement('div');d.className='tb-desc';d.textContent=td.lv[0].desc;btn.appendChild(d);
    btn.style.opacity=unlocked?(afford?'1':'.55'):'1';
    if(unlocked)btn.onclick=()=>{if(!afford){toast('💰 골드 부족!','#e74c3c');return;}selType=i;selTower=null;renderShop();updateTPanel();sfxUI();};
    sh.appendChild(btn);
  });
}

function setSelTower(t){
  selTower=t;selType=t?t.type:selType;
  document.getElementById('tpanel').style.display=t?'flex':'none';
  document.getElementById('shop').style.display=t?'none':'grid';
  if(t)updateTPanel();
}
function deselT(){setSelTower(null);renderShop();}
function updateTPanel(){
  if(!selTower)return;
  const t=selTower,td=t.data;
  const pc=document.getElementById('tpc');
  pc.getContext('2d').clearRect(0,0,48,48);
  drawTowerPreview(pc.getContext('2d'),t.type,24,30);
  document.getElementById('tp-n').textContent=TDEFS[t.type].name+' Lv.'+(t.lv+1)+'  킬:'+t.kills;
  document.getElementById('tp-s').textContent=`DMG:${td.dmg} 사거리:${td.range} 속도:${td.rate}f${td.aoe?' AOE:'+td.aoe:''}${td.slow?' 감속:'+(td.slow*100|0)+'%':''}${td.chain?' 체인:'+td.chain:''}`;
  const ub=document.getElementById('tp-u');
  if(t.lv>=2){ub.textContent='★ MAX';ub.disabled=true;}else{ub.textContent=`⬆ 업그레이드 💰${td.upg}`;ub.disabled=gold<td.upg;}
  document.getElementById('tp-v').textContent='💰 판매 +'+t.sellVal;
}
function upgT(){if(!selTower||selTower.lv>=2)return;const u=selTower.data.upg;if(gold<u){toast('💰 부족!','#e74c3c');return;}gold-=u;selTower.totalCost+=u;selTower.lv++;sfxUI();toast('⬆ Lv.'+(selTower.lv+1)+'!','#2ecc71');updateTPanel();updateHUD();}
function sellT(){if(!selTower)return;gold+=selTower.sellVal;toast('+'+selTower.sellVal+'💰','#ffd700');sfxUI();towers=towers.filter(t=>t!==selTower);setSelTower(null);updateHUD();}

function drawTowerPreview(ctx,type,px,py){
  const td=TDEFS[type];
  ctx.save();
  switch(type){
    case 0:// 검사탑 - 석탑
      ctx.fillStyle='#554433';ctx.fillRect(px-8,py-12,16,14);
      ctx.fillStyle='#665544';ctx.fillRect(px-10,py-2,20,6);
      ctx.fillStyle='#c8a860';ctx.fillRect(px-1,py-18,3,8);
      break;
    case 1:// 궁수탑 - 나무탑
      ctx.fillStyle='#5a3a1a';ctx.fillRect(px-6,py-14,12,16);
      ctx.fillStyle='#7fb77e';// 활
      ctx.strokeStyle='#7fb77e';ctx.lineWidth=2;ctx.beginPath();ctx.arc(px,py-12,6,Math.PI*.7,Math.PI*.3);ctx.stroke();
      break;
    case 2:// 대포탑 - 석벽
      ctx.fillStyle='#442222';ctx.fillRect(px-10,py-8,20,10);
      ctx.fillStyle='#884422';ctx.beginPath();ctx.arc(px,py-8,8,Math.PI,0);ctx.fill();
      ctx.fillStyle='#c0392b';ctx.fillRect(px-2,py-10,4,6);
      break;
    case 3:// 냉기탑 - 얼음 결정
      ctx.fillStyle='rgba(100,200,255,.3)';ctx.beginPath();ctx.arc(px,py-8,10,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#74b9ff';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(px,py-18);ctx.lineTo(px,py+2);ctx.stroke();ctx.beginPath();ctx.moveTo(px-9,py-8);ctx.lineTo(px+9,py-8);ctx.stroke();
      break;
    case 4:// 번개탑 - 금속 첨탑
      ctx.fillStyle='#333';ctx.fillRect(px-4,py-2,8,6);
      ctx.strokeStyle='#ffd700';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(px,py-20);ctx.lineTo(px,py-2);ctx.stroke();
      ctx.strokeStyle='rgba(255,215,0,.5)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(px-8,py-10);ctx.lineTo(px+8,py-10);ctx.stroke();
      break;
    case 5:// 마법진 - 룬 서클
      ctx.strokeStyle='rgba(162,155,254,.8)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(px,py-4,10,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='rgba(162,155,254,.6)';ctx.beginPath();ctx.arc(px,py-14,4,0,Math.PI*2);ctx.fill();
      break;
  }
  ctx.restore();
}

function buildQ(wi){const q=[];WAVES[wi].forEach(g=>{for(let i=0;i<g.n;i++)q.push({type:g.t,delay:g.iv*(i+1)});});q.sort((a,b)=>a.delay-b.delay);return q;}
function doWave(){startWave(waveRunning);}
function startWave(early=false){
  if(wave>=20||gameOver||gameWon)return;
  if(!waveRunning&&!early){
    wave++;spawnQueues.push({q:buildQ(wave-1),tick:0,wn:wave});waveRunning=true;
    waveMsg='WAVE '+wave;waveMsgT=120;
    setTimeout(()=>updateMusic(),100);
    TDEFS.filter(t=>t.unlock===wave).forEach(t=>setTimeout(()=>{toast('🔓 '+t.name+' 해금!','#2ecc71');sfxUnlock();},600));
    [{w:6,g:80},{w:11,g:150},{w:16,g:220}].filter(c=>c.w===wave).forEach(c=>setTimeout(()=>{gold+=c.g;toast('🎖 챕터보너스 +'+c.g+'💰');updateHUD();},1000));
  } else if(waveRunning&&wave<20){
    wave++;spawnQueues.push({q:buildQ(wave-1),tick:0,wn:wave});
    const b=20+wave*2;gold+=b;toast('⚡ W'+wave+' 앞당김 +'+b+'💰');sfxUI();
    setTimeout(()=>updateMusic(),100);
  }
  updateHUD();
}

class Tower{
  constructor(col,row,type){
    this.col=col;this.row=row;this.type=type;this.lv=0;
    this.px=col*CS+CS/2;this.py=row*CS+CS/2;
    this.timer=0;this.angle=0;this.flash=0;this.totalCost=TDEFS[type].lv[0].cost;this.kills=0;
    this.idleAngle=Math.random()*Math.PI*2;
  }
  get data(){return TDEFS[this.type].lv[this.lv];}
  get range(){return this.data.range*CS;}
  get sellVal(){return Math.floor(this.totalCost*.65);}
}

class Enemy{
  constructor(type,wn){
    const ed=EDEFS[type];this.type=type;
    this.hp=Math.floor(ed.hp*(1+wn*.14));this.maxHp=this.hp;
    this.spd=ed.spd;this.reward=Math.floor(ed.reward*(1+wn*.05));
    this.armor=ed.armor||0;this.sz=ed.sz;
    this.stealth=ed.stealth||false;this.regen=ed.regen||0;this.isBoss=ed.isBoss||false;
    this.progress=0;const[sc,sr]=PATH[0];this.x=sc*CS+CS/2;this.y=sr*CS+CS/2;
    this.slowT=0;this.burnT=0;this.burnDmg=0;this.freezeT=0;
    this.dead=false;this.wn=wn;this.wobble=Math.random()*Math.PI*2;
    this.attacking=false;this.atkTimer=0;this.atkAnim=0;this.leg=0;
  }
  get spd2(){if(this.freezeT>0)return this.spd*.04;if(this.slowT>0)return this.spd*.38;return this.spd;}
  update(){
    if(this.dead)return false;
    this.wobble+=.1;this.leg+=this.spd2*.4;this.atkAnim=Math.max(0,this.atkAnim-1);
    if(this.attacking){
      this.atkTimer++;
      const ed=EDEFS[this.type];
      if(this.atkTimer>=ed.ar){
        this.atkTimer=0;this.atkAnim=22;
        dealDmg(Math.floor(ed.atk*(1+this.wn*.08)),this);
      }
      return false;
    }
    this.progress+=this.spd2;
    const idx=Math.min(Math.floor(this.progress/CS),PATH.length-2);
    if(this.progress>=(PATH.length-1)*CS){
      this.attacking=true;this.atkTimer=0;
      const[ec,er]=PATH[PATH.length-1];this.x=ec*CS+CS/2;this.y=er*CS+CS/2;
      attackers.push(this);return false;
    }
    const[c1,r1]=PATH[idx],[c2,r2]=PATH[Math.min(idx+1,PATH.length-1)];
    const t=(this.progress%CS)/CS;this.x=(c1+(c2-c1)*t)*CS+CS/2;this.y=(r1+(r2-r1)*t)*CS+CS/2;
    if(this.slowT>0)this.slowT--;if(this.freezeT>0)this.freezeT--;
    if(this.burnT>0){this.hp-=this.burnDmg;this.burnT--;addP(this.x,this.y,'#f84',1,1.5,2);if(this.hp<=0){killEnemy(this);return false;}}
    if(this.regen>0&&this.hp<this.maxHp)this.hp=Math.min(this.maxHp,this.hp+this.regen);
    return false;
  }
}

class Bullet{
  constructor(sx,sy,tgt,dmg,opts,col){this.x=sx;this.y=sy;this.tgt=tgt;this.dmg=dmg;this.opts=opts;this.col=col;this.spd=9;this.dead=false;this.trail=[];}
  update(){
    if(!this.tgt||this.tgt.dead){this.dead=true;return;}
    this.trail.push({x:this.x,y:this.y,l:.6});if(this.trail.length>8)this.trail.shift();this.trail.forEach(p=>p.l-=.1);
    const dx=this.tgt.x-this.x,dy=this.tgt.y-this.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<this.spd+4){this.hit();return;}this.x+=dx/d*this.spd;this.y+=dy/d*this.spd;
  }
  hit(){
    this.dead=true;const tx=this.tgt.x,ty=this.tgt.y;
    if(this.opts.aoe>0){
      enemies.forEach(e=>{if(e.dead)return;const dx=e.x-tx,dy=e.y-ty;if(dx*dx+dy*dy<(this.opts.aoe*CS)**2)hitE(e,this.dmg,this.opts);});
      attackers.forEach(e=>{if(e.dead)return;const dx=e.x-tx,dy=e.y-ty;if(dx*dx+dy*dy<(this.opts.aoe*CS)**2)hitE(e,this.dmg,this.opts);});
      addFx('boom',tx,ty,{r:this.opts.aoe*CS,col:this.col,life:1,decay:.035});addP(tx,ty,this.col,30,7,7);addP(tx,ty,'#fff',10,4,3);shake(6);sfxBoom();
    } else {
      hitE(this.tgt,this.dmg,this.opts);addP(tx,ty,this.col,10,3.5,4);
      if(this.opts.chain){let src=this.tgt;for(let i=0;i<this.opts.chain;i++){let nr=null,nd=Infinity;[...enemies,...attackers].forEach(e=>{if(e.dead||e===src)return;const d2=Math.hypot(e.x-src.x,e.y-src.y);if(d2<175&&d2<nd){nd=d2;nr=e;}});if(!nr)break;lightnings.push({x1:src.x,y1:src.y,x2:nr.x,y2:nr.y,life:12,bright:i===0});hitE(nr,Math.floor(this.dmg*.55),this.opts);src=nr;}}
    }
  }
}

function hitE(e,dmg,opts={}){if(e.dead)return;const d=Math.max(1,Math.floor(dmg*(1-e.armor)));e.hp-=d;if(opts.slow)e.slowT=Math.max(e.slowT,65);if(opts.freeze){e.freezeT=Math.max(e.freezeT,90);addP(e.x,e.y,'#74b9ff',8,2.5,3);}if(opts.burn){e.burnT=Math.max(e.burnT,120);e.burnDmg=Math.floor(opts.burn/8);}addP(e.x,e.y,'#ffe',4,2,3);if(e.hp<=0)killEnemy(e);}
function killEnemy(e){if(e.dead)return;e.dead=true;gold+=e.reward;score+=e.reward*15;if(score>best){best=score;localStorage.setItem('lb_best',best);}sfxHit(e.isBoss);if(e.isBoss)shake(14);addP(e.x,e.y,'#ffd700',22,6,6);}

// ═══════════════════════════════════════════
//  TOWER FIRING
// ═══════════════════════════════════════════
function updateTowers(){
  towers.forEach(t=>{
    t.timer++;t.flash=Math.max(0,t.flash-1);t.idleAngle+=.015;
    const d=t.data;if(t.timer<d.rate)return;
    const all=[...enemies,...attackers];
    let tgt=null,maxP=-Infinity;
    all.forEach(e=>{if(e.dead)return;const dx=e.x-t.px,dy=e.y-t.py;const p=e.attacking?9999:e.progress;if(dx*dx+dy*dy<=t.range**2&&p>maxP){maxP=p;tgt=e;}});
    if(!tgt)return;
    t.timer=0;t.flash=15;t.kills++;t.angle=Math.atan2(tgt.y-t.py,tgt.x-t.px);
    const opts={aoe:d.aoe||0,slow:d.slow||0,freeze:d.sp==='freeze',burn:d.burn||0,chain:d.chain||0};
    const col=TDEFS[t.type].color;
    if(d.sp==='triple'||d.sp==='penta'){
      const cnt=d.sp==='penta'?5:3;
      const sorted=all.filter(e=>!e.dead).sort((a,b)=>b.progress-a.progress);
      sorted.slice(0,cnt).forEach(e=>{if(Math.hypot(e.x-t.px,e.y-t.py)<t.range*1.6)bullets.push(new Bullet(t.px,t.py,e,d.dmg,opts,col));});
      sfxArrow();
    } else if(d.sp==='arcane'){
      // 8방향 유도탄
      const nearEnemies=all.filter(e=>!e.dead).sort((a,b)=>a.progress-b.progress);
      for(let i=0;i<Math.min(4,nearEnemies.length);i++)bullets.push(new Bullet(t.px,t.py,nearEnemies[i],d.dmg,opts,col));
      sfxMagic();
    } else {
      bullets.push(new Bullet(t.px,t.py,tgt,d.dmg,opts,col));
      if(t.type===0)for(let i=0;i<3;i++)lightnings.push({x1:t.px,y1:t.py,x2:tgt.x,y2:tgt.y,life:5,slash:true,offset:i*8,col:'#ffe'});
      else if(t.type===4){sfxLightning();lightnings.push({x1:t.px,y1:t.py,x2:tgt.x,y2:tgt.y,life:10,bright:true,col:'#ffd700'});}
      else if(t.type===1)sfxArrow();
      else if(t.type===3)sfxIce();
      else if(t.type===5)sfxMagic();
      else if(t.type===2)sfxBoom();
    }
  });
}

// ═══════════════════════════════════════════
//  BACKGROUND DRAWING (3 zones)
// ═══════════════════════════════════════════
const bgParticles=[];
for(let i=0;i<80;i++)bgParticles.push({x:Math.random()*GW,y:Math.random()*GH,z:Math.floor(zone(Math.random()*GW/CS)),spd:.2+Math.random()*.4,size:Math.random()*2+1,life:Math.random()});

function drawBackground(){
  // Sky gradients per zone
  for(let c=0;c<COLS;c++){
    const z=zone(c);
    let sky;
    if(z===0)sky='#0a120a';
    else if(z===1)sky='#100d15';
    else sky='#150500';
    cx.fillStyle=sky;cx.fillRect(c*CS,0,CS,GH);
  }
  // Zone transition gradients
  const grd1=cx.createLinearGradient(9*CS,0,11*CS,0);grd1.addColorStop(0,'rgba(0,0,0,0)');grd1.addColorStop(.5,'rgba(10,8,18,.7)');grd1.addColorStop(1,'rgba(0,0,0,0)');cx.fillStyle=grd1;cx.fillRect(9*CS,0,2*CS,GH);
  const grd2=cx.createLinearGradient(19*CS,0,21*CS,0);grd2.addColorStop(0,'rgba(0,0,0,0)');grd2.addColorStop(.5,'rgba(20,5,0,.7)');grd2.addColorStop(1,'rgba(0,0,0,0)');cx.fillStyle=grd2;cx.fillRect(19*CS,0,2*CS,GH);

  // Zone decorations (background layer, non-path cells only)
  for(let r=0;r<ROWS;r++){for(let c=0;c<COLS;c++){
    if(PS.has(`${c},${r}`))continue;
    const z=zone(c);const x=c*CS,y=r*CS;
    if(z===0){// forest
      const seed=(c*17+r*31)%100;
      if(seed<30){// tree
        cx.fillStyle=`hsl(120,${25+seed%10}%,${6+seed%4}%)`;
        cx.fillRect(x+18,y+r*CS>GH*.6?8:4,CS-36,CS-(r*CS>GH*.6?16:8));
        cx.fillStyle=`hsl(120,${30+seed%8}%,${9+seed%4}%)`;
        cx.beginPath();cx.moveTo(x+CS/2-10,y+r*CS>GH*.6?12:8);cx.lineTo(x+CS/2,y-4);cx.lineTo(x+CS/2+10,y+r*CS>GH*.6?12:8);cx.closePath();cx.fill();
      } else if(seed<50){cx.fillStyle='rgba(20,50,20,.4)';cx.fillRect(x,y,CS,CS);}
    } else if(z===1){// ruins
      const seed2=(c*23+r*41)%100;
      if(seed2<20){// column
        cx.fillStyle='#2a2530';cx.fillRect(x+14,y+2,CS-28,CS-4);
        cx.fillStyle='#333040';cx.fillRect(x+10,y,CS-20,8);cx.fillRect(x+10,y+CS-8,CS-20,8);
      } else if(seed2<40){cx.fillStyle='rgba(30,25,40,.5)';cx.fillRect(x,y,CS,CS);}
    } else {// volcanic
      const seed3=(c*19+r*37)%100;
      if(seed3<25){// lava crack
        cx.fillStyle='rgba(200,60,0,.15)';cx.fillRect(x,y,CS,CS);
        cx.strokeStyle='rgba(255,100,0,.25)';cx.lineWidth=1;cx.beginPath();cx.moveTo(x+Math.random()*CS,y);cx.lineTo(x+Math.random()*CS,y+CS);cx.stroke();
      } else if(seed3<50){cx.fillStyle='rgba(40,10,0,.4)';cx.fillRect(x,y,CS,CS);}
    }
  }}

  // Ambient particles
  bgParticles.forEach(p=>{
    p.life+=p.spd*.01;if(p.life>1){p.life=0;p.x=Math.random()*GW;p.y=Math.random()*GH;}
    const z=p.z;
    if(z===0)cx.fillStyle=`rgba(100,200,100,${p.life*.3})`;
    else if(z===1)cx.fillStyle=`rgba(150,130,200,${p.life*.2})`;
    else{cx.fillStyle=`rgba(255,100,30,${p.life*.35})`;p.y-=p.spd;}
    cx.beginPath();cx.arc(p.x,p.y,p.size,0,Math.PI*2);cx.fill();
  });

  // Path drawing
  PATH.forEach(([c,r],idx)=>{
    const z=zone(c);const x=c*CS,y=r*CS;
    if(z===0)cx.fillStyle=`hsl(30,${35+idx%3*3}%,${15+idx%4*2}%)`;
    else if(z===1)cx.fillStyle=`hsl(220,${10+idx%3*2}%,${18+idx%4*2}%)`;
    else cx.fillStyle=`hsl(15,${40+idx%4*3}%,${12+idx%3*2}%)`;
    cx.fillRect(x,y,CS,CS);
    // Path edge glow
    cx.fillStyle=z===2?'rgba(255,80,0,.08)':z===1?'rgba(200,180,255,.05)':'rgba(100,255,100,.04)';
    cx.fillRect(x+2,y+2,CS-4,CS-4);
  });

  // Path arrows
  cx.fillStyle='rgba(255,240,180,.12)';cx.font='11px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
  for(let i=0;i<PATH.length-1;i+=3){const[c1,r1]=PATH[i],[c2,r2]=PATH[i+1];cx.fillText(c2>c1?'›':c2<c1?'‹':r2>r1?'v':'^',c1*CS+CS/2,r1*CS+CS/2);}

  // START marker
  const[sc,sr]=PATH[0];
  cx.fillStyle='rgba(50,255,100,.2)';cx.fillRect(sc*CS,sr*CS,CS,CS);
  cx.fillStyle='rgba(100,255,150,.8)';cx.font='bold 8px sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('IN',sc*CS+CS/2,sr*CS+CS/2);
}

//  CASTLE DRAWING
// ═══════════════════════════════════════════
function drawCastle(){
  const x=CX,y=CY;const p=playerHP/MAX_HP;const atkN=attackers.filter(e=>!e.dead).length;
  const baseCol=p>.5?'#3a3a4a':p>.25?'#4a2a1a':'#4a0a0a';
  const wallCol=p>.5?'#4a4a5a':p>.25?'#5a3a2a':'#5a1a1a';
  const glow=p>.5?'rgba(80,80,200,.15)':p>.25?'rgba(200,100,30,.2)':'rgba(200,0,0,.3)';

  // Glow
  if(atkN>0||p<.5){const gr=cx.createRadialGradient(x,y,5,x,y,65);gr.addColorStop(0,glow);gr.addColorStop(1,'transparent');cx.fillStyle=gr;cx.beginPath();cx.arc(x,y,65,0,Math.PI*2);cx.fill();}

  // Left tower
  cx.fillStyle=baseCol;cx.fillRect(x-46,y-56,24,52);
  cx.fillStyle=wallCol;cx.fillRect(x-44,y-54,20,48);
  for(let i=0;i<3;i++){cx.fillStyle=baseCol;cx.fillRect(x-44+i*8,y-68,6,14);}

  // Right tower
  cx.fillStyle=baseCol;cx.fillRect(x+22,y-56,24,52);
  cx.fillStyle=wallCol;cx.fillRect(x+24,y-54,20,48);
  for(let i=0;i<3;i++){cx.fillStyle=baseCol;cx.fillRect(x+24+i*8,y-68,6,14);}

  // Main wall
  cx.fillStyle=wallCol;cx.fillRect(x-22,y-42,44,38);

  // Gate arch
  cx.fillStyle='#0a0a12';cx.beginPath();cx.arc(x,y-20,14,Math.PI,0);cx.fillRect(x-14,y-20,28,20);cx.fill();
  cx.strokeStyle=wallCol;cx.lineWidth=2;cx.beginPath();cx.arc(x,y-20,14,Math.PI,0);cx.stroke();

  // Cracks at low HP
  if(p<.5){cx.strokeStyle='rgba(0,0,0,.6)';cx.lineWidth=1.5;cx.beginPath();cx.moveTo(x-15,y-50);cx.lineTo(x-10,y-30);cx.lineTo(x-18,y-20);cx.stroke();cx.beginPath();cx.moveTo(x+20,y-48);cx.lineTo(x+16,y-35);cx.stroke();}
  if(p<.25){cx.strokeStyle='rgba(0,0,0,.8)';cx.lineWidth=2;cx.beginPath();cx.moveTo(x-5,y-60);cx.lineTo(x+2,y-40);cx.lineTo(x-4,y-25);cx.stroke();}

  // Flag
  cx.strokeStyle=p>.5?'#4af':'#e74c3c';cx.lineWidth=2;cx.beginPath();cx.moveTo(x,y-70);cx.lineTo(x,y-55);cx.stroke();
  cx.fillStyle=p>.5?'#4af':'#e74c3c';cx.beginPath();cx.moveTo(x,y-70);cx.lineTo(x+12,y-63);cx.lineTo(x,y-56);cx.closePath();cx.fill();

  // HP bar
  const bw=70,bh=8,bx=x-bw/2,by=y-82;
  cx.fillStyle='#111';cx.fillRect(bx-1,by-1,bw+2,bh+2);
  cx.fillStyle=p>.5?'#2ecc71':p>.25?'#f39c12':'#e74c3c';cx.fillRect(bx,by,bw*p,bh);
  cx.strokeStyle='#333';cx.lineWidth=1;cx.strokeRect(bx,by,bw,bh);

  if(atkN>0){cx.fillStyle='#e74c3c';cx.shadowBlur=5;cx.shadowColor='#e74c3c';cx.font='bold 10px sans-serif';cx.textAlign='center';cx.fillText('⚔ 공격 중×'+atkN,x,y+12);cx.shadowBlur=0;}
}

// ═══════════════════════════════════════════
//  TOWER DRAWING (canvas art)
// ═══════════════════════════════════════════
function drawTower(t){
  const td=TDEFS[t.type];const x=t.col*CS,y=t.row*CS;const px=t.px,py=t.py;
  const sel=selTower===t,fl=t.flash>6;

  // Selection / hover ring
  if(sel){cx.strokeStyle=td.color;cx.lineWidth=2;cx.strokeRect(x+1,y+1,CS-2,CS-2);}

  // Base
  cx.fillStyle='#1a1e28';cx.fillRect(x+3,y+3,CS-6,CS-6);
  if(fl){cx.fillStyle=td.color+'40';cx.fillRect(x+3,y+3,CS-6,CS-6);cx.shadowBlur=14;cx.shadowColor=td.color;}

  // Tower-specific drawing
  cx.save();cx.translate(px,py);
  switch(t.type){
    case 0:{// 검사탑
      cx.fillStyle='#4a3a2a';cx.fillRect(-10,0,20,14);cx.fillStyle='#5a4a3a';cx.fillRect(-12,-2,24,6);
      cx.fillStyle='#5a4a3a';cx.fillRect(-12,-18,24,20);
      for(let i=0;i<3;i++){cx.fillStyle='#3a2a1a';cx.fillRect(-10+i*9,-26,6,10);}
      cx.rotate(t.angle);cx.fillStyle=td.color;cx.fillRect(-1,-22,3,10);
      break;}
    case 1:{// 궁수탑
      cx.fillStyle='#3a2a1a';cx.fillRect(-8,0,16,14);
      cx.fillStyle='#4a3520';cx.beginPath();cx.moveTo(-12,-18);cx.lineTo(12,-18);cx.lineTo(8,-2);cx.lineTo(-8,-2);cx.closePath();cx.fill();
      cx.strokeStyle=td.color;cx.lineWidth=2;cx.beginPath();cx.arc(0,-14,8,Math.PI*.65,Math.PI*.35);cx.stroke();
      cx.strokeStyle='#c8a860';cx.lineWidth=1;cx.beginPath();cx.moveTo(0,-6);cx.lineTo(0,-22);cx.stroke();
      break;}
    case 2:{// 대포탑
      cx.fillStyle='#2a1a1a';cx.beginPath();cx.arc(0,2,13,0,Math.PI*2);cx.fill();
      cx.fillStyle='#3a2a2a';cx.beginPath();cx.arc(0,0,11,0,Math.PI*2);cx.fill();
      cx.rotate(t.angle);
      cx.fillStyle='#884422';cx.fillRect(-3,-18,6,18);cx.fillStyle='#663322';cx.fillRect(-4,-22,8,6);
      break;}
    case 3:{// 냉기탑
      const pulse=.85+Math.sin(frame*.1)*.15;
      cx.fillStyle='rgba(100,180,255,.15)';cx.beginPath();cx.arc(0,0,16*pulse,0,Math.PI*2);cx.fill();
      cx.strokeStyle=td.color;cx.lineWidth=1.5;
      [[0,-20],[0,4],[-12,-8],[12,-8],[8,-18],[-8,-18],[8,-2],[-8,-2]].forEach(([a,b],i)=>{if(i<4){cx.beginPath();cx.moveTo(0,0);cx.lineTo(a,b);cx.stroke();}else{cx.fillStyle=td.color;cx.beginPath();cx.arc(a,b,2.5,0,Math.PI*2);cx.fill();}});
      break;}
    case 4:{// 번개탑
      cx.fillStyle='#222';cx.fillRect(-5,0,10,14);
      cx.fillStyle='#444';cx.beginPath();cx.arc(0,-2,8,0,Math.PI*2);cx.fill();
      cx.strokeStyle=td.color;cx.lineWidth=2;cx.beginPath();cx.moveTo(0,-22);cx.lineTo(0,-10);cx.stroke();
      if(frame%12<6){cx.strokeStyle='rgba(255,215,0,.5)';cx.lineWidth=1;cx.beginPath();cx.moveTo(0,-12);cx.lineTo(-8+(Math.random()-.5)*6,-6);cx.stroke();cx.beginPath();cx.moveTo(0,-12);cx.lineTo(8+(Math.random()-.5)*6,-6);cx.stroke();}
      break;}
    case 5:{// 마법진
      cx.strokeStyle='rgba(162,155,254,.6)';cx.lineWidth=1.5;cx.beginPath();cx.arc(0,4,13,0,Math.PI*2);cx.stroke();
      cx.rotate(t.idleAngle);cx.strokeStyle=td.color;cx.lineWidth=1;
      for(let i=0;i<6;i++){const a=i/6*Math.PI*2;cx.beginPath();cx.moveTo(Math.cos(a)*6,Math.sin(a)*6+4);cx.lineTo(Math.cos(a)*12,Math.sin(a)*12+4);cx.stroke();}
      cx.rotate(-t.idleAngle);
      const gf=cx.createRadialGradient(0,-12,0,0,-12,5);gf.addColorStop(0,td.color);gf.addColorStop(1,'transparent');cx.fillStyle=gf;cx.beginPath();cx.arc(0,-12,5,0,Math.PI*2);cx.fill();
      break;}
  }
  cx.restore();cx.shadowBlur=0;

  // Level dots
  for(let i=0;i<3;i++){cx.fillStyle=i<=t.lv?td.color:'#1e2a3a';cx.beginPath();cx.arc(x+8+i*7,y+5,2.5,0,Math.PI*2);cx.fill();}
}

// ═══════════════════════════════════════════

      cx.fillStyle='#c05020';cx.beginPath();cx.moveTo(-r*.7,-r*.5);cx.lineTo(-r*.5,-r*1.1);cx.lineTo(-r*.3,-r*.5);cx.fill();cx.beginPath();cx.moveTo(r*.7,-r*.5);cx.lineTo(r*.5,-r*1.1);cx.lineTo(r*.3,-r*.5);cx.fill();

      cx.fillStyle='rgba(60,100,40,.7)';cx.beginPath();cx.moveTo(-r*.4,0);cx.quadraticCurveTo(-r*1.8,-r*.8+fw,-r*2.2,-r*.2+fw);cx.quadraticCurveTo(-r*1.3,r*.3,-r*.4,0);cx.fill();
      cx.beginPath();cx.moveTo(r*.4,0);cx.quadraticCurveTo(r*1.8,-r*.8+fw,r*2.2,-r*.2+fw);cx.quadraticCurveTo(r*1.3,r*.3,r*.4,0);cx.fill();

      const mg=cx.createRadialGradient(r*.6,r*.1,0,r*.6,r*.1,r*.3);mg.addColorStop(0,'#a29bfe');mg.addColorStop(1,'transparent');cx.fillStyle=mg;cx.beginPath();cx.arc(r*.6,r*.1,r*.3,0,Math.PI*2);cx.fill();

      cx.fillStyle='#ffd700';cx.beginPath();cx.moveTo(-r*.7,-r*.8);cx.lineTo(-r*.7,-r*1.35);cx.lineTo(-r*.35,-r*1.05);cx.lineTo(0,-r*1.5);cx.lineTo(r*.35,-r*1.05);cx.lineTo(r*.7,-r*1.35);cx.lineTo(r*.7,-r*.8);cx.closePath();cx.fill();
      cx.fillStyle='#f1c40f';cx.shadowBlur=8;cx.shadowColor='#f1c40f';cx.beginPath();cx.arc(-r*.35,-r*.2,r*.28,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(r*.35,-r*.2,r*.28,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
      cx.fillStyle='#111';cx.beginPath();cx.arc(-r*.35,-r*.2,r*.16,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(r*.35,-r*.2,r*.16,0,Math.PI*2);cx.fill();
      cx.fillStyle='#fff';for(let ti=0;ti<4;ti++){cx.beginPath();cx.moveTo(-r*.4+ti*r*.28,r*.22);cx.lineTo(-r*.28+ti*r*.28,r*.5);cx.lineTo(-r*.15+ti*r*.28,r*.22);cx.fill();}
      break;}
    case 'demonlord':{
      cx.fillStyle='#3a0a5a';cx.beginPath();cx.ellipse(0,0,r,r*.8,0,0,Math.PI*2);cx.fill();cx.fillStyle='#2a0040';cx.beginPath();cx.ellipse(0,-r*.15,r*.8,r*.55,0,0,Math.PI*2);cx.fill();
      // wings
      cx.fillStyle='rgba(80,0,120,.7)';cx.beginPath();cx.moveTo(-r*.4,0);cx.lineTo(-r*2.5,-r*.9);cx.lineTo(-r*2.2,r*.4);cx.lineTo(-r*.5,r*.4);cx.closePath();cx.fill();cx.beginPath();cx.moveTo(r*.4,0);cx.lineTo(r*2.5,-r*.9);cx.lineTo(r*2.2,r*.4);cx.lineTo(r*.5,r*.4);cx.closePath();cx.fill();

    cx.fillStyle='#ffd700';cx.font='bold 8px sans-serif';cx.textAlign='center';cx.fillText(EDEFS[e.type].name+' '+Math.ceil(e.hp),e.x,by-2);

// ═══════════════════════════════════════════
//  ATTACKER DRAWING (성 공격 중)
// ═══════════════════════════════════════════
function drawAttacker(e){
  if(e.dead)return;
  const ang=e.wobble;const R=42;const ax=CX+Math.cos(ang)*R,ay=CY+Math.sin(ang)*R;
  const atkOff=e.atkAnim>0?Math.sin(e.atkAnim/22*Math.PI)*12:0;
  const dx=CX-ax,dy=CY-ay,dl=Math.hypot(dx,dy)||1;
  const ex=ax+dx/dl*atkOff,ey=ay+dy/dl*atkOff;
  const savedX=e.x,savedY=e.y;e.x=ex;e.y=ey;drawEnemy(e);e.x=savedX;e.y=savedY;
  if(e.atkAnim>8){
    cx.strokeStyle=EDEFS[e.type].atkColor+'88';cx.lineWidth=1.5;cx.setLineDash([3,4]);cx.beginPath();cx.moveTo(ex,ey);cx.lineTo(CX,CY);cx.stroke();cx.setLineDash([]);
  }
}

// ═══════════════════════════════════════════
//  EFFECTS DRAWING
// ═══════════════════════════════════════════
function drawEffects(){
  effects.forEach(ef=>{
    if(ef.type==='boom'){
      const r=ef.r*(2-ef.life)*ef.life*2;
      cx.strokeStyle=ef.col;cx.lineWidth=3*ef.life;cx.globalAlpha=ef.life*.8;cx.shadowBlur=12;cx.shadowColor=ef.col;cx.beginPath();cx.arc(ef.x,ef.y,r,0,Math.PI*2);cx.stroke();
      cx.fillStyle=ef.col;cx.globalAlpha=ef.life*.3;cx.beginPath();cx.arc(ef.x,ef.y,r*.55,0,Math.PI*2);cx.fill();cx.shadowBlur=0;cx.globalAlpha=1;
    } else if(ef.type==='castle_hit'){
      const r=(1-ef.life)*55+5;cx.strokeStyle=ef.col;cx.lineWidth=4*ef.life;cx.globalAlpha=ef.life*.9;cx.shadowBlur=14;cx.shadowColor=ef.col;cx.beginPath();cx.arc(ef.x,ef.y,r,0,Math.PI*2);cx.stroke();cx.shadowBlur=0;cx.globalAlpha=1;
    }
  });
  lightnings.forEach(l=>{
    if(l.slash){
      cx.strokeStyle=`rgba(255,240,150,${l.life/5*.8})`;cx.lineWidth=2.5;cx.shadowBlur=6;cx.shadowColor='#ffe';
      cx.beginPath();const mid=l.offset||0;cx.moveTo(l.x1+Math.cos(l.life*.3)*mid,l.y1+Math.sin(l.life*.3)*mid);cx.lineTo(l.x2,l.y2);cx.stroke();cx.shadowBlur=0;return;
    }
    const a=l.life/(l.bright?12:10);cx.strokeStyle=`rgba(255,215,0,${a*.85})`;cx.lineWidth=l.bright?3:1.8;cx.shadowBlur=l.bright?12:6;cx.shadowColor='#ffd700';
    cx.beginPath();cx.moveTo(l.x1,l.y1);const s=5,ddx=(l.x2-l.x1)/s,ddy=(l.y2-l.y1)/s;
    for(let i=1;i<s;i++)cx.lineTo(l.x1+ddx*i+(Math.random()-.5)*14,l.y1+ddy*i+(Math.random()-.5)*14);
    cx.lineTo(l.x2,l.y2);cx.stroke();cx.shadowBlur=0;
  });
  bullets.forEach(b=>{
    b.trail.forEach(p=>{cx.globalAlpha=p.l*.4;cx.fillStyle=b.col;cx.beginPath();cx.arc(p.x,p.y,2.5,0,Math.PI*2);cx.fill();});cx.globalAlpha=1;
    cx.fillStyle=b.col;cx.shadowBlur=10;cx.shadowColor=b.col;cx.beginPath();cx.arc(b.x,b.y,b.opts.aoe?7:4,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
  });
}

// ═══════════════════════════════════════════
//  OVERLAYS
// ═══════════════════════════════════════════
function drawOverlays(){

    cx.fillStyle='rgba(0,200,100,.1)';cx.fillRect(GW/2-200,8,400,32);cx.strokeStyle='rgba(0,200,100,.35)';cx.lineWidth=1;cx.strokeRect(GW/2-200,8,400,32);
    cx.fillStyle='#2ecc71';cx.font='bold 12px sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('✅ 웨이브 '+wave+' 완료 — 타워를 강화하고 스페이스바로 다음 웨이브!',GW/2,24);
  }
  if(gameOver){
    cx.fillStyle='rgba(0,0,0,.88)';cx.fillRect(0,0,GW,GH);cx.textAlign='center';
    cx.fillStyle='#e74c3c';cx.font='bold 56px sans-serif';cx.strokeStyle='#000';cx.lineWidth=5;cx.strokeText('🏰 성이 함락되었습니다',GW/2,GH/2-36);cx.fillText('🏰 성이 함락되었습니다',GW/2,GH/2-36);
    cx.fillStyle='#ffd700';cx.font='22px sans-serif';cx.fillText('웨이브 '+wave+' · 점수 '+score.toLocaleString(),GW/2,GH/2+14);cx.fillStyle='#aaa';cx.font='14px sans-serif';cx.fillText('새로고침으로 다시 시작',GW/2,GH/2+48);
  }
  if(gameWon){
    cx.fillStyle='rgba(0,0,15,.9)';cx.fillRect(0,0,GW,GH);cx.textAlign='center';
    cx.fillStyle='#ffd700';cx.font='bold 52px sans-serif';cx.fillText('🏆 왕국을 지켰습니다!',GW/2,GH/2-36);cx.fillStyle='#fff';cx.font='22px sans-serif';cx.fillText('최종 점수 '+score.toLocaleString(),GW/2,GH/2+14);cx.fillStyle='#aaa';cx.font='14px sans-serif';cx.fillText('새로고침으로 다시 시작',GW/2,GH/2+48);
  }
}

// ═══════════════════════════════════════════
//  MAIN UPDATE
// ═══════════════════════════════════════════
function update(){
  if(gameOver||gameWon)return;
  frame++;shakeX*=.68;shakeY*=.68;if(redFlash>0)redFlash--;if(waveMsgT>0)waveMsgT--;
  // spawn
  for(let i=spawnQueues.length-1;i>=0;i--){const sq=spawnQueues[i];sq.tick++;while(sq.q.length>0&&sq.tick>=sq.q[0].delay){enemies.push(new Enemy(sq.q[0].type,sq.wn));sq.q.shift();}if(sq.q.length===0)spawnQueues.splice(i,1);}
  // wave complete
  const alive=[...enemies,...attackers].filter(e=>!e.dead).length;
  if(waveRunning&&spawnQueues.length===0&&alive===0){
    waveRunning=false;const b=50+wave*14;gold+=b;toast('✅ 웨이브 '+wave+' 클리어! +'+b+'💰','#2ecc71');sfxHit(false);if(wave>=20)gameWon=true;updateHUD();
  }
  // enemies
  for(let i=enemies.length-1;i>=0;i--){if(enemies[i].dead){enemies.splice(i,1);continue;}enemies[i].update();}
  for(let i=attackers.length-1;i>=0;i--){if(attackers[i].dead){attackers.splice(i,1);continue;}attackers[i].update();}
  // towers
  updateTowers();
  // bullets
  for(let i=bullets.length-1;i>=0;i--){bullets[i].update();if(bullets[i].dead)bullets.splice(i,1);}
  // effects
  lightnings.forEach(l=>l.life--);lightnings=lightnings.filter(l=>l.life>0);
  effects.forEach(ef=>ef.life-=ef.decay||.04);effects=effects.filter(ef=>ef.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=.026;p.sz*=.96;});particles=particles.filter(p=>p.life>0);
  dmgNums.forEach(d=>{d.y+=d.vy;d.vy*=.88;d.life-=.022;});dmgNums=dmgNums.filter(d=>d.life>0);
  if(frame%60===0)updateMusic();
}

function gameLoop(){
  for(let s=0;s<spd;s++)update();
  cx.save();if(Math.abs(shakeX)>.4)cx.translate(shakeX,shakeY);
  cx.clearRect(-12,-12,GW+24,GH+24);
  drawBackground();
  drawCastle();
  towers.forEach(drawTower);
  // range ring for hover
  if(!selTower&&hovCell&&!PS.has(`${hovCell[0]},${hovCell[1]}`)&&!towers.some(t=>t.col===hovCell[0]&&t.row===hovCell[1])){
    const td=TDEFS[selType];const r=td.lv[0].range*CS;const px=hovCell[0]*CS+CS/2,py=hovCell[1]*CS+CS/2;
    cx.fillStyle=td.color+'14';cx.strokeStyle=td.color+'66';cx.lineWidth=1.5;cx.beginPath();cx.arc(px,py,r,0,Math.PI*2);cx.fill();cx.stroke();
    cx.fillStyle='rgba(255,255,255,.06)';cx.fillRect(hovCell[0]*CS,hovCell[1]*CS,CS,CS);
  }
  if(selTower){cx.fillStyle=TDEFS[selTower.type].color+'12';cx.strokeStyle=TDEFS[selTower.type].color+'77';cx.lineWidth=2;cx.beginPath();cx.arc(selTower.px,selTower.py,selTower.range,0,Math.PI*2);cx.fill();cx.stroke();}
  drawEffects();
  enemies.forEach(drawEnemy);
  attackers.forEach(drawAttacker);
  particles.forEach(p=>{cx.globalAlpha=p.life;cx.fillStyle=p.col;cx.beginPath();cx.arc(p.x,p.y,p.sz,0,Math.PI*2);cx.fill();});cx.globalAlpha=1;
  // damage numbers
  dmgNums.forEach(d=>{cx.globalAlpha=d.life;cx.strokeStyle='#000';cx.lineWidth=3;cx.fillStyle=d.n>50?'#ff6b35':d.n>20?'#ffd700':'#ff4444';cx.font=`bold ${13+Math.min(d.n/6,15)}px sans-serif`;cx.textAlign='center';cx.strokeText('-'+d.n,d.x,d.y);cx.fillText('-'+d.n,d.x,d.y);});cx.globalAlpha=1;
  if(redFlash>0){cx.fillStyle=`rgba(200,0,0,${redFlash/20*.38})`;cx.fillRect(0,0,GW,GH);}
  drawOverlays();cx.restore();
  requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════
cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();const mx=(e.clientX-r.left)*(GW/r.width),my=(e.clientY-r.top)*(GH/r.height);hovCell=my<GH?[Math.floor(mx/CS),Math.floor(my/CS)]:null;});
cv.addEventListener('mouseleave',()=>hovCell=null);
cv.addEventListener('click',e=>{
  const r=cv.getBoundingClientRect();const mx=(e.clientX-r.left)*(GW/r.width),my=(e.clientY-r.top)*(GH/r.height);
  if(my<0||my>=GH)return;
  const col=Math.floor(mx/CS),row=Math.floor(my/CS);if(col<0||col>=COLS||row<0||row>=ROWS)return;
  const ex=towers.find(t=>t.col===col&&t.row===row);
  if(ex){setSelTower(selTower===ex?null:ex);if(!selTower)renderShop();sfxUI();return;}
  if(selTower){deselT();return;}
  if(PS.has(`${col},${row}`)){toast('경로 위에는 설치할 수 없습니다','#e74c3c');return;}
  const td=TDEFS[selType];const cost=td.lv[0].cost;
  if(gold<cost){toast('💰 골드 부족! ('+cost+' 필요)','#e74c3c');return;}
  if(wave<td.unlock&&selType>=3){toast('🔒 웨이브 '+td.unlock+' 이후 해금','#aaa');return;}
  gold-=cost;towers.push(new Tower(col,row,selType));sfxUI();toast(td.name+' 설치!','#2ecc71');updateHUD();
});
cv.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];cv.dispatchEvent(new MouseEvent('click',{clientX:t.clientX,clientY:t.clientY,bubbles:true}));},{passive:false});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){doWave();e.preventDefault();}
  if(e.code==='KeyQ')setSpd(spd%4+1);
  if(e.code==='Escape')deselT();
});

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
updateHUD();renderShop();gameLoop();
</script>
</body>
</html>
