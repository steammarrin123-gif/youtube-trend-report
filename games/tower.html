<script>
// ===== AUDIO =====
const AN={R:0,C3:131,G3:196,A3:220,C4:262,E4:330,G4:392,A4:440,C5:523,E5:659,G5:784};
const BGM_L=[[AN.C5,.5],[AN.E5,.5],[AN.G5,1],[AN.E5,.5],[AN.C5,.5],[AN.G4,1],[AN.A4,.5],[AN.C5,.5],[AN.E5,1],[AN.D5||(AN.E5*.9),.5],[AN.C5,.5],[AN.G4,1]];
const BGM_B=[[AN.C3,.5],[AN.G3,.5],[AN.C4,.5],[AN.G3,.5],[AN.A3,.5],[AN.C4,.5],[AN.G3,.5],[AN.C3,.5]];
let actx=null,mOn=false,mT=null,mN=[0,0],mI=[0,0];
function gac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function asn(f,t,d,type='square',v=.07){const c=gac();if(!f)return;const o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.value=f;g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+d*.88);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+d);}
function adrm(t,k){const c=gac();const b=c.createBuffer(1,Math.floor(c.sampleRate*.1),c.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);const s=c.createBufferSource(),g=c.createGain(),f=c.createBiquadFilter();s.buffer=b;f.type=k?'lowpass':'highpass';f.frequency.value=k?200:5000;g.gain.setValueAtTime(k?.35:.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.07);s.connect(f);f.connect(g);g.connect(c.destination);s.start(t);}
function schedBGM(){if(!mOn)return;const c=gac(),b=60/130;while(mN[0]<c.currentTime+.3){const[f,bs]=BGM_L[mI[0]];asn(f,mN[0],b*bs*.9);mN[0]+=b*bs;mI[0]=(mI[0]+1)%BGM_L.length;}while(mN[1]<c.currentTime+.3){const[f,bs]=BGM_B[mI[1]];asn(f,mN[1],b*bs*.9,'square',.05);mN[1]+=b*bs;mI[1]=(mI[1]+1)%BGM_B.length;}const now=c.currentTime;for(let i=0;i<4;i++){const t=Math.ceil(now/b)*b+i*b;if(t>now+.05&&t<now+.3){adrm(t,true);if(i%2===1)adrm(t+b*.5,false);}}mT=setTimeout(schedBGM,100);}
function toggleMusic(){const btn=document.getElementById('music-btn');if(mOn){mOn=false;clearTimeout(mT);btn.textContent='🎵 켜기';}else{mOn=true;const c=gac();c.resume();mN=[c.currentTime+.1,c.currentTime+.1];mI=[0,0];schedBGM();btn.textContent='🔇 끄기';}}
function sfx(f,d,t='square'){const c=gac();c.resume();const o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(.18,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d);}

// ===== CONSTANTS =====
const COLS=20,ROWS=10,CS=40,GW=800,GH=400,UH=120,W=800,H=520;
const cv=document.getElementById('c'),cx=cv.getContext('2d');

// ===== PATH =====
const WPT=[[0,1],[4,1],[4,4],[8,4],[8,1],[13,1],[13,6],[8,6],[8,8],[15,8],[15,5],[19,5]];
function buildPath(){
  const cells=[],seen=new Set();
  for(let i=0;i<WPT.length-1;i++){
    const[c1,r1]=WPT[i],[c2,r2]=WPT[i+1];
    const dc=Math.sign(c2-c1),dr=Math.sign(r2-r1);
    let c=c1,r=r1;
    while(c!==c2||r!==r2){
      const k=c+','+r;if(!seen.has(k)){cells.push([c,r]);seen.add(k);}
      c+=dc;r+=dr;
    }
  }
  const[lc,lr]=WPT[WPT.length-1];const lk=lc+','+lr;
  if(!seen.has(lk))cells.push([lc,lr]);
  return cells;
}
const PATH=buildPath(),PATH_SET=new Set(PATH.map(([c,r])=>c+','+r));

// ===== TOWER DATA =====
const TD=[
  {name:'기본',icon:'🗼',color:'#4af',
   lv:[{cost:60,upgCost:80,dmg:28,range:2.5,rate:55,desc:'균형잡힌 타워'},
       {cost:60,upgCost:120,dmg:50,range:2.8,rate:48,desc:'강화된 공격력'},
       {cost:60,upgCost:0,dmg:90,range:3.2,rate:40,desc:'관통 공격',special:'pierce'}]},
  {name:'궁수',icon:'🏹',color:'#2ecc71',
   lv:[{cost:80,upgCost:90,dmg:14,range:2.3,rate:18,desc:'빠른 연사'},
       {cost:80,upgCost:130,dmg:20,range:2.6,rate:14,desc:'3연발',special:'triple'},
       {cost:80,upgCost:0,dmg:28,range:3.0,rate:10,desc:'5연발 폭풍',special:'penta'}]},
  {name:'폭탄',icon:'💣',color:'#e74c3c',
   lv:[{cost:130,upgCost:150,dmg:65,range:2.0,rate:85,aoe:1.3,desc:'범위 폭발'},
       {cost:130,upgCost:200,dmg:110,range:2.3,rate:75,aoe:1.8,desc:'강화 폭발'},
       {cost:130,upgCost:0,dmg:180,range:2.6,rate:65,aoe:2.5,desc:'초대형 폭발',special:'mega'}]},
  {name:'얼음',icon:'❄️',color:'#74b9ff',
   lv:[{cost:95,upgCost:110,dmg:8,range:2.5,rate:48,slow:.4,desc:'감속 40%'},
       {cost:95,upgCost:150,dmg:12,range:2.8,rate:42,slow:.65,desc:'감속 65%'},
       {cost:95,upgCost:0,dmg:5,range:3.2,rate:38,slow:.95,desc:'완전 동결',special:'freeze'}]},
  {name:'전기',icon:'⚡',color:'#ffd700',
   lv:[{cost:160,upgCost:190,dmg:38,range:2.3,rate:52,chain:2,desc:'체인 2개'},
       {cost:160,upgCost:240,dmg:60,range:2.6,rate:45,chain:3,desc:'체인 3개'},
       {cost:160,upgCost:0,dmg:95,range:3.0,rate:38,chain:5,desc:'체인 5개 폭풍',special:'storm'}]},
  {name:'화염',icon:'🔥',color:'#e67e22',
   lv:[{cost:115,upgCost:140,dmg:6,range:2.1,rate:28,burn:18,desc:'화상 데미지'},
       {cost:115,upgCost:185,dmg:10,range:2.4,rate:22,burn:30,aoe:.7,desc:'광역 화상'},
       {cost:115,upgCost:0,dmg:14,range:2.8,rate:18,burn:50,aoe:1.2,desc:'불바다',special:'inferno'}]},
];

// ===== ENEMY DATA =====
const ED={
  normal: {icon:'👾',baseHp:80, spd:1.0,reward:10,armor:0},
  fast:   {icon:'🏃',baseHp:45, spd:2.3,reward:14,armor:0},
  armored:{icon:'🛡️',baseHp:160,spd:0.7,reward:22,armor:.4},
  flying: {icon:'🦅',baseHp:65, spd:1.6,reward:20,armor:0},
  stealth:{icon:'👁️',baseHp:75, spd:1.3,reward:26,armor:0,stealth:true},
  zombie: {icon:'💀',baseHp:110,spd:0.8,reward:18,armor:0,split:true},
  regen:  {icon:'🧬',baseHp:220,spd:0.6,reward:32,armor:.2,regen:1.5},
  boss:   {icon:'👑',baseHp:900,spd:0.4,reward:120,armor:.35,isBoss:true},
};

// ===== WAVES (20파) =====
const WAVES=[
  [{t:'normal',n:8,iv:40}],
  [{t:'normal',n:12,iv:35}],
  [{t:'normal',n:8,iv:35},{t:'fast',n:5,iv:25}],
  [{t:'fast',n:12,iv:22}],
  [{t:'armored',n:6,iv:45}],
  [{t:'normal',n:10,iv:30},{t:'armored',n:5,iv:42}],
  [{t:'flying',n:10,iv:32}],
  [{t:'fast',n:10,iv:22},{t:'flying',n:5,iv:30}],
  [{t:'stealth',n:8,iv:38}],
  [{t:'boss',n:1,iv:0},{t:'normal',n:12,iv:28}],
  [{t:'zombie',n:8,iv:40},{t:'armored',n:5,iv:38}],
  [{t:'armored',n:8,iv:35},{t:'flying',n:7,iv:28}],
  [{t:'stealth',n:10,iv:32},{t:'fast',n:8,iv:22}],
  [{t:'regen',n:5,iv:50},{t:'armored',n:6,iv:38}],
  [{t:'boss',n:2,iv:90},{t:'armored',n:8,iv:35}],
  [{t:'zombie',n:12,iv:32},{t:'flying',n:8,iv:26}],
  [{t:'regen',n:8,iv:38},{t:'fast',n:12,iv:20}],
  [{t:'stealth',n:12,iv:28},{t:'armored',n:8,iv:35}],
  [{t:'boss',n:3,iv:80},{t:'fast',n:15,iv:18}],
  [{t:'boss',n:4,iv:70},{t:'armored',n:12,iv:30},{t:'flying',n:10,iv:24}],
];

// ===== GAME STATE =====
let gold=150,lives=20,score=0,wave=0,best=Number(localStorage.getItem('best_tower2')||0);
let towers=[],enemies=[],bullets=[],particles=[];
let selType=0,selTower=null; // selected tower type (shop) or placed tower
let waveRunning=false,spawnQ=[],spawnTick=0;
let gameOver=false,gameWon=false;
let speedMult=1,frameN=0;
let infoMsg='',infoTimer=0;
let hovCell=null; // hovered cell for range preview

// ===== CLASSES =====
class Tower{
  constructor(col,row,type){
    this.col=col;this.row=row;this.type=type;this.lv=0;
    this.px=col*CS+CS/2;this.py=row*CS+CS/2;
    this.timer=0;this.angle=0;this.fireFlash=0;
    this.totalCost=TD[type].lv[0].cost;
  }
  get data(){return TD[this.type].lv[this.lv];}
  upgrade(){
    if(this.lv>=2||gold<this.data.upgCost)return false;
    gold-=this.data.upgCost;this.totalCost+=this.data.upgCost;this.lv++;
    sfx(880,.08);showInfo('업그레이드 완료!',60);return true;
  }
  sell(){const v=Math.floor(this.totalCost*.6);gold+=v;sfx(660,.06);showInfo('판매: +'+v+'💰',60);return v;}
  get sellVal(){return Math.floor(this.totalCost*.6);}
  get rangePx(){return this.data.range*CS;}
}

class Enemy{
  constructor(type,waveN){
    const ed=ED[type];
    this.type=type;this.icon=ed.icon;
    this.hp=Math.floor(ed.baseHp*(1+waveN*.14));this.maxHp=this.hp;
    this.spd=ed.spd;this.reward=ed.reward;this.armor=ed.armor||0;
    this.stealth=ed.stealth||false;this.split=ed.split||false;
    this.regen=ed.regen||0;this.isBoss=ed.isBoss||false;
    this.pathIdx=0;this.progress=0;
    const[sc,sr]=PATH[0];this.x=sc*CS+CS/2;this.y=sr*CS+CS/2;
    this.slowTimer=0;this.burnTimer=0;this.burnDmg=0;this.burnTick=0;
    this.freezeTimer=0;this.dead=false;
  }
  get effectSpd(){
    if(this.freezeTimer>0)return this.spd*.05;
    if(this.slowTimer>0){const d=TD[3].lv[Math.min(2,Math.floor(this.slowTimer/100))];return this.spd*(1-(d.slow||.4));}
    return this.spd;
  }
  update(){
    if(this.dead)return true;
    const spd=this.effectSpd;
    this.progress+=spd;
    let traveled=this.progress;
    let idx=0;
    while(idx<PATH.length-1&&traveled>=CS){traveled-=CS;idx++;}
    if(idx>=PATH.length-1){return'leak';}
    const[c1,r1]=PATH[idx],[c2,r2]=PATH[Math.min(idx+1,PATH.length-1)];
    const t=traveled/CS;
    this.x=(c1+(c2-c1)*t)*CS+CS/2;this.y=(r1+(r2-r1)*t)*CS+CS/2;
    // Effects
    if(this.slowTimer>0)this.slowTimer--;
    if(this.freezeTimer>0)this.freezeTimer--;
    if(this.burnTimer>0){
      this.burnTick++;if(this.burnTick>=8){this.hp-=this.burnDmg;this.burnTick=0;}
      this.burnTimer--;addP(this.x,this.y,'#f84',1,1.5);
    }
    if(this.regen>0&&this.hp<this.maxHp)this.hp=Math.min(this.maxHp,this.hp+this.regen);
    return false;
  }
}

class Bullet{
  constructor(tx,ty,target,dmg,aoe,slow,burn,chain,type,color){
    this.x=tx;this.y=ty;this.target=target;
    this.dmg=dmg;this.aoe=aoe||0;this.slow=slow||0;
    this.burn=burn||0;this.chain=chain||0;
    this.type=type;this.color=color;this.spd=7;this.dead=false;
  }
  update(){
    if(!this.target||this.target.dead){this.dead=true;return;}
    const dx=this.target.x-this.x,dy=this.target.y-this.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<this.spd+3){this.hit();return;}
    this.x+=dx/d*this.spd;this.y+=dy/d*this.spd;
  }
  hit(){
    this.dead=true;
    if(this.aoe>0){
      // AOE hit
      enemies.forEach(e=>{
        if(e.dead)return;
        const dx=e.x-this.target.x,dy=e.y-this.target.y;
        if(dx*dx+dy*dy<(this.aoe*CS)**2){hitEnemy(e,this.dmg,this.slow,this.burn);}
      });
      addP(this.target.x,this.target.y,'#f84',20,4);sfx(this.aoe>1.5?200:300,.12);
    } else {
      hitEnemy(this.target,this.dmg,this.slow,this.burn);
      addP(this.target.x,this.target.y,this.color,6,2.5);
      // Chain lightning
      if(this.chain>0){
        let src=this.target;
        for(let i=0;i<this.chain;i++){
          let nearest=null,nd=Infinity;
          enemies.forEach(e=>{if(e.dead||e===src)return;const d2=Math.hypot(e.x-src.x,e.y-src.y);if(d2<150&&d2<nd){nd=d2;nearest=e;}});
          if(!nearest)break;
          lightnings.push({x1:src.x,y1:src.y,x2:nearest.x,y2:nearest.y,life:8});
          hitEnemy(nearest,Math.floor(this.dmg*.6),this.slow,this.burn);
          src=nearest;
        }
      }
    }
  }
}

let lightnings=[];
function hitEnemy(e,dmg,slow,burn){
  if(e.dead)return;
  const d=Math.floor(dmg*(1-e.armor));
  e.hp-=d;
  if(slow>0){e.slowTimer=Math.max(e.slowTimer,60);e.slowAmt=slow;}
  if(slow>.9){e.freezeTimer=Math.max(e.freezeTimer,80);addP(e.x,e.y,'#74b9ff',8,2);}
  if(burn>0){e.burnTimer=Math.max(e.burnTimer,120);e.burnDmg=Math.floor(burn/8);}
  if(e.hp<=0){killEnemy(e);}
}
function killEnemy(e){
  e.dead=true;gold+=e.reward;score+=e.reward*10;
  if(score>best){best=score;localStorage.setItem('best_tower2',best);}
  addP(e.x,e.y,'#ffd700',15,4);sfx(e.isBoss?200:660,.05);
  // Zombie split
  if(e.split&&e.maxHp>80){
    for(let i=0;i<2;i++){
      const c=new Enemy('zombie',wave);
      c.hp=Math.floor(e.maxHp*.3);c.maxHp=c.hp;
      c.progress=e.progress-5;c.x=e.x+(i-.5)*20;c.y=e.y;
      enemies.push(c);
    }
  }
  document.getElementById&&null;
}

// ===== PARTICLES =====
function addP(x,y,color,n,spd){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=(Math.random()*.8+.4)*spd;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color,sz:Math.random()*4+2});}}
function showInfo(msg,t){infoMsg=msg;infoTimer=t;}

// ===== WAVE SPAWNING =====
function buildSpawnQueue(waveIdx){
  const q=[];
  const groups=WAVES[waveIdx];
  groups.forEach(g=>{
    for(let i=0;i<g.n;i++)q.push({type:g.t,delay:g.iv*(i+1)+(q.length>0?q[q.length-1].delay:0)});
  });
  q.sort((a,b)=>a.delay-b.delay);
  return q;
}
function startWave(){
  if(waveRunning||gameOver||gameWon)return;
  if(wave>=20){gameWon=true;return;}
  wave++;
  spawnQ=buildSpawnQueue(wave-1);
  spawnTick=0;waveRunning=true;
  sfx(440,.06);setTimeout(()=>sfx(550,.06),.1);
  showInfo('웨이브 '+wave+' 시작! 💀',80);
}

// ===== TOWER TARGETING & FIRING =====
function updateTowers(){
  towers.forEach(t=>{
    t.timer++;t.fireFlash=Math.max(0,t.fireFlash-1);
    const d=t.data;if(t.timer<d.rate)return;
    // Find farthest enemy in range
    let target=null,maxProg=-1;
    enemies.forEach(e=>{
      if(e.dead)return;
      const dx=e.x-t.px,dy=e.y-t.py;
      if(dx*dx+dy*dy<t.rangePx*t.rangePx&&e.progress>maxProg){maxProg=e.progress;target=e;}
    });
    if(!target)return;
    t.timer=0;t.fireFlash=8;
    t.angle=Math.atan2(target.y-t.py,target.x-t.px);
    const spec=d.special;
    if(spec==='triple'||spec==='penta'){
      const cnt=spec==='penta'?5:3;
      // Sort by progress, take top N
      const sorted=[...enemies].filter(e=>!e.dead).sort((a,b)=>b.progress-a.progress);
      for(let i=0;i<Math.min(cnt,sorted.length);i++){
        const e=sorted[i];const dx=e.x-t.px,dy=e.y-t.py;
        if(dx*dx+dy*dy<(t.rangePx*1.5)**2)bullets.push(new Bullet(t.px,t.py,e,d.dmg,0,d.slow||0,d.burn||0,0,t.type,TD[t.type].color));
      }
      sfx(880,.03);
    } else if(spec==='pierce'){
      // All enemies in a line
      bullets.push(new Bullet(t.px,t.py,target,d.dmg,0,0,0,0,t.type,TD[t.type].color));
      sfx(660,.04);
    } else {
      bullets.push(new Bullet(t.px,t.py,target,d.dmg,d.aoe||0,d.slow||0,d.burn||0,d.chain||0,t.type,TD[t.type].color));
      sfx(t.type===2?300:880,.03);
    }
  });
}

// ===== DRAW FUNCTIONS =====
function drawBG(){
  // Sky + terrain
  const sky=cx.createLinearGradient(0,0,0,GH);
  sky.addColorStop(0,'#0a1a0a');sky.addColorStop(1,'#1a3a1a');
  cx.fillStyle=sky;cx.fillRect(0,0,GW,GH);
  // Grass cells
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(!PATH_SET.has(c+','+r)){
      const gv=.06+((c+r)%2)*.02;
      cx.fillStyle=`rgba(30,${80+((c*3+r*7)%30)},30,1)`;
      cx.fillRect(c*CS,r*CS,CS,CS);
      cx.strokeStyle='rgba(0,0,0,.15)';cx.lineWidth=.5;cx.strokeRect(c*CS,r*CS,CS,CS);
    }
  }
  // Path
  cx.fillStyle='#6b4c2a';
  PATH.forEach(([c,r])=>{cx.fillRect(c*CS,r*CS,CS,CS);});
  cx.fillStyle='#7a5a30';
  PATH.forEach(([c,r])=>{cx.fillRect(c*CS+4,r*CS+4,CS-8,CS-8);});
  // Path arrows
  cx.fillStyle='rgba(255,220,150,.2)';cx.font='18px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
  for(let i=0;i<PATH.length-1;i+=2){
    const[c1,r1]=PATH[i],[c2,r2]=PATH[i+1];
    const dx=c2-c1,dy=r2-r1;
    const arrow=dx>0?'→':dx<0?'←':dy>0?'↓':'↑';
    cx.fillText(arrow,c1*CS+CS/2,r1*CS+CS/2);
  }
  // Start / End markers
  const[sc,sr]=PATH[0],[ec,er]=PATH[PATH.length-1];
  cx.fillStyle='rgba(0,200,0,.3)';cx.fillRect(sc*CS,sr*CS,CS,CS);
  cx.fillStyle='rgba(200,0,0,.3)';cx.fillRect(ec*CS,er*CS,CS,CS);
  cx.fillStyle='#fff';cx.font='bold 10px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText('IN',sc*CS+CS/2,sr*CS+CS/2);cx.fillText('OUT',ec*CS+CS/2,er*CS+CS/2);
}

function drawTowers(){
  // Range preview for hovered cell (placing mode)
  if(selTower===null&&hovCell&&!PATH_SET.has(hovCell[0]+','+hovCell[1])&&!towers.some(t=>t.col===hovCell[0]&&t.row===hovCell[1])){
    const td=TD[selType].lv[0];const r=td.range*CS;
    const px=hovCell[0]*CS+CS/2,py=hovCell[1]*CS+CS/2;
    cx.fillStyle=TD[selType].color+'22';cx.strokeStyle=TD[selType].color+'88';cx.lineWidth=1.5;
    cx.beginPath();cx.arc(px,py,r,0,Math.PI*2);cx.fill();cx.stroke();
    cx.fillStyle='rgba(255,255,255,.1)';cx.fillRect(hovCell[0]*CS,hovCell[1]*CS,CS,CS);
  }
  // Selected tower range
  if(selTower){
    cx.fillStyle=TD[selTower.type].color+'18';cx.strokeStyle=TD[selTower.type].color+'80';cx.lineWidth=2;
    cx.beginPath();cx.arc(selTower.px,selTower.py,selTower.rangePx,0,Math.PI*2);cx.fill();cx.stroke();
  }
  // Draw towers
  towers.forEach(t=>{
    const lc=TD[t.type].color;
    // Base
    cx.fillStyle='#2a2a3a';cx.fillRect(t.col*CS+3,t.row*CS+3,CS-6,CS-6);
    cx.strokeStyle=lc;cx.lineWidth=selTower===t?3:1.5;cx.strokeRect(t.col*CS+3,t.row*CS+3,CS-6,CS-6);
    // Icon
    cx.save();cx.translate(t.px,t.py);
    if(t.type===0||t.type===4)cx.rotate(t.angle); // rotating towers
    cx.font=(t.fireFlash>0?'1.6':'1.4')+'rem sans-serif';cx.textAlign='center';cx.textBaseline='middle';
    cx.globalAlpha=t.fireFlash>0?1:.85;
    cx.fillText(TD[t.type].icon,0,0);
    cx.globalAlpha=1;cx.restore();
    // Level dots
    for(let i=0;i<=t.lv;i++){cx.fillStyle=i<t.lv?lc:'#555';cx.beginPath();cx.arc(t.col*CS+8+i*7,t.row*CS+5,3,0,Math.PI*2);cx.fill();}
    // Flash on fire
    if(t.fireFlash>4){cx.fillStyle=lc+'44';cx.fillRect(t.col*CS,t.row*CS,CS,CS);}
  });
}

function drawEnemies(){
  enemies.forEach(e=>{
    if(e.dead)return;
    const alpha=e.stealth?.45:1;cx.globalAlpha=alpha;
    // Freeze overlay
    if(e.freezeTimer>0){cx.fillStyle='rgba(100,180,255,.35)';cx.beginPath();cx.arc(e.x,e.y,20,0,Math.PI*2);cx.fill();}
    // Icon
    cx.font=(e.isBoss?'2':'1.4')+'rem sans-serif';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(e.icon,e.x,e.y+4);
    cx.globalAlpha=1;
    // HP bar
    if(!e.isBoss){
      const bw=28,bh=4,bx=e.x-bw/2,by=e.y-20;
      cx.fillStyle='#333';cx.fillRect(bx,by,bw,bh);
      const hpPct=e.hp/e.maxHp;
      cx.fillStyle=hpPct>.5?'#2ecc71':hpPct>.25?'#f39c12':'#e74c3c';
      cx.fillRect(bx,by,bw*hpPct,bh);
    } else {
      // Boss HP bar (big)
      const bw=50,bh=6,bx=e.x-bw/2,by=e.y-30;
      cx.fillStyle='#111';cx.fillRect(bx,by,bw,bh);
      cx.fillStyle='#e74c3c';cx.fillRect(bx,by,bw*(e.hp/e.maxHp),bh);
      cx.fillStyle='#ffd700';cx.font='bold 10px sans-serif';cx.textAlign='center';
      cx.fillText('BOSS '+Math.ceil(e.hp),e.x,by-2);
    }
    // Effects indicator
    if(e.burnTimer>0){cx.font='.7rem sans-serif';cx.fillText('🔥',e.x+15,e.y-15);}
    if(e.slowTimer>0&&e.slowTimer>30){cx.font='.7rem sans-serif';cx.fillText('❄️',e.x-15,e.y-15);}
  });
  cx.globalAlpha=1;
}

function drawBullets(){
  bullets.forEach(b=>{
    cx.fillStyle=b.type===2?'#f84':b.type===3?'#74b9ff':b.type===4?'#ffd700':b.type===5?'#e67e22':TD[b.type].color;
    cx.shadowBlur=8;cx.shadowColor=cx.fillStyle;
    cx.beginPath();cx.arc(b.x,b.y,b.type===2?7:4,0,Math.PI*2);cx.fill();
    cx.shadowBlur=0;
  });
  // Chain lightning
  lightnings.forEach(l=>{
    cx.strokeStyle=`rgba(255,220,0,${l.life/8})`;cx.lineWidth=2;cx.shadowBlur=8;cx.shadowColor='#ffd700';
    cx.beginPath();cx.moveTo(l.x1,l.y1);
    // Jagged line
    const steps=4,dx=(l.x2-l.x1)/steps,dy=(l.y2-l.y1)/steps;
    cx.moveTo(l.x1,l.y1);
    for(let i=1;i<steps;i++)cx.lineTo(l.x1+dx*i+(Math.random()-0.5)*10,l.y1+dy*i+(Math.random()-0.5)*10);
    cx.lineTo(l.x2,l.y2);cx.stroke();cx.shadowBlur=0;
  });
}

function drawParticles(){
  particles.forEach(p=>{cx.globalAlpha=p.life;cx.fillStyle=p.color;cx.beginPath();cx.arc(p.x,p.y,p.sz,0,Math.PI*2);cx.fill();});
  cx.globalAlpha=1;
}

// ===== UI DRAWING =====
function drawUI(){
  cx.fillStyle='#0d1117';cx.fillRect(0,GH,GW,UH);
  cx.strokeStyle='#333';cx.lineWidth=1;cx.beginPath();cx.moveTo(0,GH);cx.lineTo(GW,GH);cx.stroke();

  // Stats bar
  const stats=[['❤️',lives,'#e74c3c'],['💰',gold,'#ffd700'],['🌊','W'+wave+'/20','#4af'],['⭐',score,'#aaa'],['🏆',best,'#ffd700']];
  stats.forEach(([icon,val,color],i)=>{
    const x=10+i*145;
    cx.fillStyle='rgba(255,255,255,.06)';cx.fillRect(x,GH+4,135,26);
    cx.fillStyle=color;cx.font='bold 13px sans-serif';cx.textAlign='left';
    cx.fillText(icon+' '+val,x+8,GH+21);
  });

  // Speed & wave buttons
  cx.fillStyle=speedMult===2?'#ffd700':'rgba(255,255,255,.12)';
  cx.fillRect(645,GH+4,60,26);cx.strokeStyle='#555';cx.lineWidth=1;cx.strokeRect(645,GH+4,60,26);
  cx.fillStyle=speedMult===2?'#000':'#fff';cx.font='bold 12px sans-serif';cx.textAlign='center';
  cx.fillText('2× 빠름',675,GH+21);

  cx.fillStyle=waveRunning?'rgba(100,100,100,.3)':'rgba(231,76,60,.8)';
  cx.fillRect(712,GH+4,82,26);cx.strokeStyle='#555';cx.strokeRect(712,GH+4,82,26);
  cx.fillStyle='#fff';cx.font='bold 12px sans-serif';cx.textAlign='center';
  cx.fillText(waveRunning?'전투 중':'▶ 다음 웨이브',753,GH+21);

  // Tower shop OR selected tower info
  if(selTower){
    drawTowerInfo();
  } else {
    drawShop();
  }

  // Info message
  if(infoTimer>0){
    cx.globalAlpha=Math.min(1,infoTimer/20);
    cx.fillStyle='rgba(0,0,0,.7)';cx.fillRect(GW/2-120,GH/2-20,240,36);
    cx.fillStyle='#ffd700';cx.font='bold 14px sans-serif';cx.textAlign='center';
    cx.fillText(infoMsg,GW/2,GH/2+3);
    cx.globalAlpha=1;
  }
}

function drawShop(){
  const shopY=GH+36;
  TD.forEach((t,i)=>{
    const x=i*132+4,td=t.lv[0];
    const isSel=selType===i&&selTower===null;
    cx.fillStyle=isSel?t.color+'33':'rgba(255,255,255,.06)';
    cx.strokeStyle=isSel?t.color:'#333';cx.lineWidth=isSel?2:1;
    cx.fillRect(x,shopY,128,GH+UH-shopY-4);cx.strokeRect(x,shopY,128,GH+UH-shopY-4);
    cx.font='1.6rem sans-serif';cx.textAlign='center';cx.fillText(t.icon,x+24,shopY+30);
    cx.fillStyle=t.color;cx.font='bold 11px sans-serif';cx.fillText(t.name,x+76,shopY+14);
    cx.fillStyle='#ffd700';cx.font='11px sans-serif';cx.fillText('💰'+td.cost,x+76,shopY+28);
    cx.fillStyle='#aaa';cx.font='9px sans-serif';cx.textAlign='center';
    const words=td.desc.split(' ');
    words.forEach((w,wi)=>cx.fillText(w,x+76,shopY+42+wi*11));
    if(gold<td.cost){cx.fillStyle='rgba(0,0,0,.5)';cx.fillRect(x,shopY,128,GH+UH-shopY-4);}
  });
}

function drawTowerInfo(){
  if(!selTower)return;
  const t=selTower,td=t.data;
  const x=4,y=GH+36,w=GW-8,h=UH-40;
  cx.fillStyle='rgba(255,255,255,.06)';cx.strokeStyle=TD[t.type].color;cx.lineWidth=2;
  cx.fillRect(x,y,w,h);cx.strokeRect(x,y,w,h);
  // Icon + name
  cx.font='1.8rem sans-serif';cx.textAlign='center';cx.fillText(TD[t.type].icon,x+30,y+h/2+8);
  cx.fillStyle=TD[t.type].color;cx.font='bold 13px sans-serif';cx.textAlign='left';
  cx.fillText(TD[t.type].name+' Lv.'+(t.lv+1),x+55,y+18);
  // Stats
  cx.fillStyle='#ccc';cx.font='11px sans-serif';
  cx.fillText('데미지: '+td.dmg,x+55,y+33);
  cx.fillText('사거리: '+td.range,x+55+120,y+33);
  cx.fillText('발사속도: '+td.rate+'f',x+55+240,y+33);
  if(td.aoe)cx.fillText('범위: '+td.aoe,x+55+360,y+33);
  if(td.slow)cx.fillText('감속: '+(td.slow*100|0)+'%',x+55+360,y+33);
  if(td.burn)cx.fillText('화상: '+td.burn,x+55+360,y+33);
  if(td.chain)cx.fillText('체인: '+td.chain,x+55+360,y+33);
  // Desc
  cx.fillStyle='#88c';cx.font='10px sans-serif';cx.fillText(td.desc,x+55,y+47);
  // Buttons
  if(t.lv<2){
    const upCost=td.upgCost;const canUp=gold>=upCost;
    cx.fillStyle=canUp?'rgba(50,150,50,.8)':'rgba(50,50,50,.5)';
    cx.fillRect(GW-230,y+8,105,h-16);
    cx.strokeStyle=canUp?'#2ecc71':'#555';cx.lineWidth=1.5;cx.strokeRect(GW-230,y+8,105,h-16);
    cx.fillStyle=canUp?'#fff':'#666';cx.font='bold 11px sans-serif';cx.textAlign='center';
    cx.fillText('⬆ 업그레이드',GW-177,y+h/2-5);cx.fillText('💰'+upCost,GW-177,y+h/2+10);
  } else {
    cx.fillStyle='rgba(80,80,80,.4)';cx.fillRect(GW-230,y+8,105,h-16);
    cx.strokeStyle='#555';cx.lineWidth=1;cx.strokeRect(GW-230,y+8,105,h-16);
    cx.fillStyle='#555';cx.font='bold 11px sans-serif';cx.textAlign='center';
    cx.fillText('MAX LEVEL',GW-177,y+h/2+3);
  }
  cx.fillStyle='rgba(150,50,50,.7)';cx.fillRect(GW-118,y+8,110,h-16);
  cx.strokeStyle='#e74c3c';cx.lineWidth=1.5;cx.strokeRect(GW-118,y+8,110,h-16);
  cx.fillStyle='#fff';cx.font='bold 11px sans-serif';cx.textAlign='center';
  cx.fillText('💰 판매',GW-63,y+h/2-5);cx.fillText('+'+t.sellVal,GW-63,y+h/2+10);
  // Close hint
  cx.fillStyle='#444';cx.font='10px sans-serif';cx.textAlign='left';
  cx.fillText('[다른 곳 클릭으로 닫기]',x+55,y+h-5);
}

// ===== OVERLAYS =====
function drawOverlays(){
  if(gameOver){
    cx.fillStyle='rgba(0,0,0,.8)';cx.fillRect(0,0,GW,GH);
    cx.textAlign='center';cx.fillStyle='#e74c3c';cx.font='bold 48px sans-serif';
    cx.strokeStyle='#000';cx.lineWidth=4;cx.strokeText('💀 게임 오버',GW/2,GH/2-30);cx.fillText('💀 게임 오버',GW/2,GH/2-30);
    cx.fillStyle='#ffd700';cx.font='bold 24px sans-serif';cx.fillText('점수: '+score,GW/2,GH/2+20);
    cx.fillStyle='#aaa';cx.font='16px sans-serif';cx.fillText('새로고침으로 다시 시작',GW/2,GH/2+60);
  }
  if(gameWon){
    cx.fillStyle='rgba(0,0,20,.85)';cx.fillRect(0,0,GW,GH);
    cx.textAlign='center';cx.fillStyle='#ffd700';cx.font='bold 44px sans-serif';
    cx.strokeStyle='#000';cx.lineWidth=4;cx.strokeText('🏆 클리어!',GW/2,GH/2-30);cx.fillText('🏆 클리어!',GW/2,GH/2-30);
    cx.fillStyle='#fff';cx.font='24px sans-serif';cx.fillText('최종 점수: '+score,GW/2,GH/2+20);
    cx.fillStyle='#aaa';cx.font='16px sans-serif';cx.fillText('새로고침으로 다시 시작',GW/2,GH/2+60);
  }
  // Wave complete notification
  if(!waveRunning&&wave>0&&!gameOver&&!gameWon){
    cx.fillStyle='rgba(0,200,100,.12)';cx.fillRect(GW/2-140,10,280,36);
    cx.fillStyle='#2ecc71';cx.font='bold 14px sans-serif';cx.textAlign='center';
    cx.fillText('✅ 웨이브 '+wave+' 클리어! 다음 웨이브 시작 →',GW/2,32);
  }
}

// ===== UPDATE =====
function update(){
  if(gameOver||gameWon)return;
  frameN++;
  // Spawn
  if(waveRunning&&spawnQ.length>0){
    spawnTick++;
    while(spawnQ.length>0&&spawnTick>=spawnQ[0].delay){
      enemies.push(new Enemy(spawnQ[0].type,wave));spawnQ.shift();
    }
  }
  // Update enemies
  const leaked=[];
  for(let i=enemies.length-1;i>=0;i--){
    const r=enemies[i].update();
    if(r==='leak'){lives--;enemies.splice(i,1);addP(PATH[PATH.length-1][0]*CS,PATH[PATH.length-1][1]*CS,'#f00',10,3);sfx(200,.2);if(lives<=0){gameOver=true;return;}}
    else if(enemies[i].dead)enemies.splice(i,1);
  }
  // Wave complete check
  if(waveRunning&&spawnQ.length===0&&enemies.length===0){
    waveRunning=false;
    const bonus=30+wave*10;gold+=bonus;
    showInfo('웨이브 '+wave+' 클리어! 💰+'+bonus,120);
    sfx(880,.08);setTimeout(()=>sfx(1100,.08),.1);
    if(wave>=20)gameWon=true;
  }
  updateTowers();
  // Bullets
  for(let i=bullets.length-1;i>=0;i--){bullets[i].update();if(bullets[i].dead)bullets.splice(i,1);}
  // Lightnings
  lightnings.forEach(l=>l.life--);lightnings=lightnings.filter(l=>l.life>0);
  // Particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life-=.028;p.sz*=.96;});
  particles=particles.filter(p=>p.life>0);
  if(infoTimer>0)infoTimer--;
}

function gameLoop(){
  for(let s=0;s<speedMult;s++)update();
  cx.clearRect(0,0,W,H);
  drawBG();drawTowers();drawEnemies();drawBullets();drawParticles();drawOverlays();drawUI();
  requestAnimationFrame(gameLoop);
}

// ===== INPUT =====
cv.addEventListener('mousemove',e=>{
  const rect=cv.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);
  if(my<GH){hovCell=[Math.floor(mx/CS),Math.floor(my/CS)];}
  else hovCell=null;
});
cv.addEventListener('mouseleave',()=>hovCell=null);

cv.addEventListener('click',e=>{
  const rect=cv.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);

  // UI area clicks
  if(my>=GH){
    // Speed button
    if(mx>=645&&mx<=705&&my>=GH+4&&my<=GH+30){speedMult=speedMult===1?2:1;return;}
    // Next wave button
    if(mx>=712&&mx<=794&&my>=GH+4&&my<=GH+30){startWave();return;}
    const shopY=GH+36;
    if(selTower){
      // Upgrade button
      if(mx>=GW-230&&mx<=GW-125&&my>=shopY+8&&my<=shopY+72){selTower.upgrade();return;}
      // Sell button
      if(mx>=GW-118&&mx<=GW-8&&my>=shopY+8&&my<=shopY+72){
        towers=towers.filter(t=>t!==selTower);selTower.sell();selTower=null;return;
      }
      selTower=null;return;
    } else {
      // Shop tower select
      TD.forEach((t,i)=>{
        const x=i*132+4;
        if(mx>=x&&mx<=x+128&&my>=shopY){selType=i;selTower=null;}
      });
    }
    return;
  }

  // Game area clicks
  const col=Math.floor(mx/CS),row=Math.floor(my/CS);
  if(col<0||col>=COLS||row<0||row>=ROWS)return;

  // Click on existing tower
  const existing=towers.find(t=>t.col===col&&t.row===row);
  if(existing){selTower=selTower===existing?null:existing;return;}

  // Deselect placed tower
  if(selTower){selTower=null;return;}

  // Place tower
  if(PATH_SET.has(col+','+row)){showInfo('경로에는 설치 불가!',40);return;}
  const cost=TD[selType].lv[0].cost;
  if(gold<cost){showInfo('골드가 부족합니다! 💰'+cost+' 필요',60);return;}
  gold-=cost;towers.push(new Tower(col,row,selType));
  sfx(660,.06);showInfo(TD[selType].icon+' '+TD[selType].name+' 설치!',40);
});

// Touch support
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  const rect=cv.getBoundingClientRect();
  const t=e.touches[0];
  const fakeClick=new MouseEvent('click',{clientX:t.clientX,clientY:t.clientY});
  cv.dispatchEvent(fakeClick);
},{passive:false});

gameLoop();
</script>
