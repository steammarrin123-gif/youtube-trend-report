<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏰 타워 디펜스</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#060c14;display:flex;flex-direction:column;align-items:center;font-family:'Segoe UI',sans-serif;color:#fff;padding:6px;}
#top-bar{width:800px;max-width:100vw;display:flex;justify-content:space-between;align-items:center;padding:0 0 5px;}
#top-bar a{color:#aaa;text-decoration:none;font-size:.8rem;}
canvas{display:block;max-width:100vw;cursor:pointer;border-radius:4px 4px 0 0;}

/* ─── 통계바 ─── */
#stats{width:800px;max-width:100vw;background:#0d1520;border:1px solid #1a2535;border-top:none;display:flex;gap:4px;padding:5px 6px;align-items:center;}
.stat{background:rgba(255,255,255,.06);border-radius:5px;padding:3px 10px;font-size:12px;font-weight:bold;white-space:nowrap;}

/* ─── 컨트롤바 ─── */
#controls{width:800px;max-width:100vw;background:#0d1520;border:1px solid #1a2535;border-top:none;display:flex;gap:5px;padding:5px 6px;align-items:center;}
.spd-btn{background:rgba(255,255,255,.08);border:1px solid #2a3a4a;border-radius:5px;color:#aaa;font-size:11px;font-weight:bold;padding:5px 12px;cursor:pointer;transition:all .15s;}
.spd-btn.active{background:rgba(255,215,0,.25);border-color:#ffd700;color:#ffd700;}
.spd-btn:hover{background:rgba(255,255,255,.15);}
#wave-btn{flex:1;background:rgba(40,180,60,.8);border:2px solid #2ecc71;border-radius:6px;color:#fff;font-size:13px;font-weight:bold;padding:6px 16px;cursor:pointer;transition:all .15s;}
#wave-btn:hover{background:rgba(40,180,60,1);}
#wave-btn.running{background:rgba(200,140,0,.8);border-color:#ffd700;}
#wave-btn.done{background:rgba(60,60,60,.5);border-color:#555;color:#777;cursor:default;}

/* ─── 상점 ─── */
#shop{width:800px;max-width:100vw;background:#0d1520;border:1px solid #1a2535;border-top:none;display:grid;grid-template-columns:repeat(8,1fr);border-radius:0 0 6px 6px;}
.tw-btn{background:transparent;border:none;border-right:1px solid #1a2535;color:#fff;padding:6px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:background .15s;min-height:70px;position:relative;}
.tw-btn:last-child{border-right:none;}
.tw-btn:hover:not(:disabled){background:rgba(255,255,255,.08);}
.tw-btn.sel{background:rgba(255,255,255,.12);outline:2px solid var(--c) inset;}
.tw-btn:disabled{opacity:.4;cursor:not-allowed;}
.tw-btn .ticon{font-size:1.5rem;line-height:1;}
.tw-btn .tname{font-size:10px;font-weight:bold;}
.tw-btn .tcost{font-size:10px;}
.tw-btn .tdesc{font-size:8.5px;color:#889;text-align:center;line-height:1.2;}
.tw-btn .unlock-tag{font-size:8px;color:#e74c3c;font-weight:bold;}

/* ─── 타워 정보 패널 (상점 대체) ─── */
#tower-panel{width:800px;max-width:100vw;background:#0d1520;border:1px solid #1a2535;border-top:none;display:none;align-items:center;gap:8px;padding:6px 10px;border-radius:0 0 6px 6px;}
#tp-icon{font-size:2rem;}
#tp-info{flex:1;}
#tp-name{font-size:13px;font-weight:bold;}
#tp-stats{font-size:11px;color:#aaa;margin-top:2px;}
#tp-desc{font-size:10px;color:#88c;margin-top:2px;}
#tp-upg{background:rgba(40,160,40,.8);border:2px solid #2ecc71;border-radius:6px;color:#fff;font-size:12px;font-weight:bold;padding:8px 14px;cursor:pointer;white-space:nowrap;}
#tp-upg:disabled{background:rgba(60,60,60,.5);border-color:#555;color:#777;cursor:default;}
#tp-sell{background:rgba(160,40,40,.8);border:2px solid #e74c3c;border-radius:6px;color:#fff;font-size:12px;font-weight:bold;padding:8px 14px;cursor:pointer;white-space:nowrap;}
#tp-close{background:rgba(60,60,60,.5);border:1px solid #444;border-radius:5px;color:#aaa;font-size:11px;padding:6px 10px;cursor:pointer;}

/* ─── 메시지 토스트 ─── */
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.85);border-radius:8px;padding:10px 20px;font-size:14px;font-weight:bold;pointer-events:none;opacity:0;transition:opacity .2s;z-index:100;}
</style>
</head>

<div id="top-bar">
  <a href="index.html">← 메뉴</a>
  <span style="color:#ffd700;font-weight:bold">🏰 타워 디펜스 v2</span>
  <button id="music-btn" onclick="toggleMusic()" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:5px;color:#fff;font-size:.8rem;padding:3px 8px;cursor:pointer;">🎵 켜기</button>

<div id="controls">
  <button class="spd-btn active" onclick="setSpeed(1)" id="s1">1× 속도</button>
  <button class="spd-btn" onclick="setSpeed(2)" id="s2">2× 속도</button>
  <button class="spd-btn" onclick="setSpeed(3)" id="s3">3× 속도</button>
  <button class="spd-btn" onclick="setSpeed(4)" id="s4">4× 속도</button>

  <button id="tp-close" onclick="setSelTower(null)">✕ 닫기</button>
</div>

<div id="toast"></div>

<script>
// ===========================  AUDIO  ===========================
const AN={R:0,C3:131,D3:147,E3:165,G3:196,A3:220,C4:262,E4:330,G4:392,A4:440,C5:523,D5:587,E5:659,G5:784,A5:880};
const BGM_L=[[AN.E5,.5],[AN.D5,.25],[AN.E5,.25],[AN.C5,.5],[AN.E5,.5],[AN.G5,1],[AN.R,.25],[AN.A5,.25],[AN.G5,.25],[AN.E5,.25],[AN.D5,.5],[AN.C5,.5],[AN.E5,1],[AN.R,.5],[AN.G5,.5],[AN.A5,.5],[AN.G5,.5],[AN.E5,.5],[AN.C5,1],[AN.R,.5]];
const BGM_B=[[AN.C3,.5],[AN.G3,.5],[AN.C4,.5],[AN.G3,.5],[AN.A3,.5],[AN.E3,.5],[AN.G3,.5],[AN.C3,.5]];
let AC=null,mOn=false,mT=null,mN=[0,0],mI=[0,0];
function gac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function asn(f,t,d,tp='square',v=.07){const c=gac();if(!f)return;const o=c.createOscillator(),g=c.createGain();o.type=tp;o.frequency.value=f;g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+d*.88);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+d);}
function adrm(t,k){const c=gac();const b=c.createBuffer(1,Math.floor(c.sampleRate*.1),c.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);const s=c.createBufferSource(),g=c.createGain(),f=c.createBiquadFilter();s.buffer=b;f.type=k?'lowpass':'highpass';f.frequency.value=k?180:5500;g.gain.setValueAtTime(k?.35:.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.07);s.connect(f);f.connect(g);g.connect(c.destination);s.start(t);}
function schedBGM(){if(!mOn)return;const c=gac(),b=60/132;while(mN[0]<c.currentTime+.3){const[f,bs]=BGM_L[mI[0]];asn(f,mN[0],b*bs*.9);mN[0]+=b*bs;mI[0]=(mI[0]+1)%BGM_L.length;}while(mN[1]<c.currentTime+.3){const[f,bs]=BGM_B[mI[1]];asn(f,mN[1],b*bs*.9,'square',.05);mN[1]+=b*bs;mI[1]=(mI[1]+1)%BGM_B.length;}const now=c.currentTime,b2=60/132;for(let i=0;i<4;i++){const t=Math.ceil(now/b2)*b2+i*b2;if(t>now+.05&&t<now+.3){adrm(t,true);if(i%2===1)adrm(t+b2*.5,false);}}mT=setTimeout(schedBGM,100);}
function toggleMusic(){const btn=document.getElementById('music-btn');if(mOn){mOn=false;clearTimeout(mT);btn.textContent='🎵 켜기';}else{mOn=true;const c=gac();c.resume();mN=[c.currentTime+.1,c.currentTime+.1];mI=[0,0];schedBGM();btn.textContent='🔇 끄기';}}
function sfxShoot(type,lv){const c=gac();c.resume();const t=c.currentTime;switch(type){case 0:asn(660+lv*80,t,.05,'square',.12);break;case 1:for(let i=0;i<=lv;i++)asn(880+i*100,t+i*.04,.04,'square',.1);break;case 2:{const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(50,t+.2);g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.2);}break;case 3:asn(1400,t,.08,'sine',.12);asn(1800,t+.03,.05,'sine',.09);break;case 4:{const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(100,t+.1);g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.1);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.1);}break;case 5:{const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.setValueAtTime(250,t);o.frequency.linearRampToValueAtTime(100,t+.12);g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.12);}break;case 6:asn(80,t,.3,'sawtooth',.3);asn(50,t+.1,.25,'sawtooth',.25);break;case 7:{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(200,t);o.frequency.linearRampToValueAtTime(70,t+.4);g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.4);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.4);}break;}}
function sfxKill(boss){const c=gac();c.resume();const t=c.currentTime;boss?[200,160,120,80].forEach((f,i)=>asn(f,t+i*.08,.1,'sawtooth',.2)):asn(660,t,.05,'square',.12);}
function sfxUI(){const c=gac();c.resume();asn(660,c.currentTime,.06,'square',.1);}
function sfxUnlock(){const c=gac();c.resume();const t=c.currentTime;[440,550,660,880].forEach((f,i)=>asn(f,t+i*.1,.1,'sine',.15));}

// ===========================  CONSTANTS & PATH  ===========================
const COLS=20,ROWS=10,CS=40,GW=800,GH=400;
const cv=document.getElementById('c'),cx=cv.getContext('2d');

const WPT=[[0,2],[4,2],[4,0],[8,0],[8,4],[4,4],[4,7],[10,7],[10,3],[14,3],[14,8],[19,8]];
function buildPath(){const cells=[],seen=new Set();for(let i=0;i<WPT.length-1;i++){const[c1,r1]=WPT[i],[c2,r2]=WPT[i+1];const dc=Math.sign(c2-c1),dr=Math.sign(r2-r1);let c=c1,r=r1;while(c!==c2||r!==r2){const k=c+','+r;if(!seen.has(k)){cells.push([c,r]);seen.add(k);}c+=dc;r+=dr;}}const[lc,lr]=WPT[WPT.length-1];if(!seen.has(lc+','+lr))cells.push([lc,lr]);return cells;}
const PATH=buildPath(),PATH_SET=new Set(PATH.map(([c,r])=>c+','+r));

// ===========================  TOWER DATA (8종) ===========================
const TD=[
  {name:'기본',icon:'🗼',color:'#4af',unlock:1,lv:[{cost:60,upgCost:80,dmg:28,range:2.5,rate:55,desc:'균형형 타워'},{cost:60,upgCost:120,dmg:52,range:2.8,rate:48,desc:'강화 데미지'},{cost:60,upgCost:0,dmg:95,range:3.2,rate:40,desc:'관통 공격',special:'pierce'}]},
  {name:'궁수',icon:'🏹',color:'#2ecc71',unlock:1,lv:[{cost:80,upgCost:95,dmg:13,range:2.4,rate:16,desc:'빠른 연사'},{cost:80,upgCost:140,dmg:20,range:2.7,rate:12,desc:'3연발',special:'triple'},{cost:80,upgCost:0,dmg:28,range:3.1,rate:9,desc:'5연발',special:'penta'}]},
  {name:'폭탄',icon:'💣',color:'#e74c3c',unlock:1,lv:[{cost:130,upgCost:155,dmg:70,range:2.0,rate:88,aoe:1.3,desc:'범위 폭발'},{cost:130,upgCost:200,dmg:120,range:2.3,rate:78,aoe:1.8,desc:'강화 폭발'},{cost:130,upgCost:0,dmg:200,range:2.6,rate:68,aoe:2.6,desc:'초대형 폭발',special:'mega'}]},
  {name:'얼음',icon:'❄️',color:'#74b9ff',unlock:6,lv:[{cost:95,upgCost:115,dmg:8,range:2.5,rate:50,slow:.4,desc:'감속 40%'},{cost:95,upgCost:155,dmg:13,range:2.8,rate:43,slow:.65,desc:'감속 65%'},{cost:95,upgCost:0,dmg:6,range:3.3,rate:38,slow:.96,desc:'완전 동결',special:'freeze'}]},
  {name:'전기',icon:'⚡',color:'#ffd700',unlock:6,lv:[{cost:160,upgCost:195,dmg:40,range:2.3,rate:54,chain:2,desc:'체인 2개'},{cost:160,upgCost:245,dmg:65,range:2.6,rate:46,chain:3,desc:'체인 3개'},{cost:160,upgCost:0,dmg:100,range:3.1,rate:38,chain:5,desc:'체인 5개',special:'storm'}]},
  {name:'화염',icon:'🔥',color:'#e67e22',unlock:11,lv:[{cost:115,upgCost:145,dmg:7,range:2.2,rate:26,burn:20,desc:'화상 지속'},{cost:115,upgCost:190,dmg:11,range:2.5,rate:21,burn:32,aoe:.7,desc:'광역 화상'},{cost:115,upgCost:0,dmg:15,range:2.9,rate:17,burn:55,aoe:1.3,desc:'불바다',special:'inferno'}]},
  {name:'운석',icon:'☄️',color:'#ff6b35',unlock:11,lv:[{cost:200,upgCost:240,dmg:150,range:3.0,rate:180,aoe:1.8,desc:'운석 소환',special:'meteor'},{cost:200,upgCost:300,dmg:250,range:3.5,rate:160,aoe:2.3,desc:'대형 운석',special:'meteor'},{cost:200,upgCost:0,dmg:400,range:4.0,rate:140,aoe:3.0,desc:'운석 3발',special:'meteorstorm'}]},
  {name:'파동포',icon:'🌊',color:'#a29bfe',unlock:16,lv:[{cost:250,upgCost:300,dmg:80,range:9.9,rate:200,desc:'전방 파동',special:'wave'},{cost:250,upgCost:380,dmg:140,range:9.9,rate:175,desc:'강화 파동',special:'wave'},{cost:250,upgCost:0,dmg:220,range:9.9,rate:150,desc:'쌍발 파동',special:'wave2'}]},
];

// ===========================  ENEMY DATA (12종) ===========================
const ED={
  normal:{icon:'👾',baseHp:80,spd:1.0,reward:10,armor:0},fast:{icon:'🏃',baseHp:45,spd:2.4,reward:14,armor:0},
  armored:{icon:'🛡️',baseHp:165,spd:0.7,reward:22,armor:.42},flying:{icon:'🦅',baseHp:65,spd:1.7,reward:20,armor:0},
  stealth:{icon:'👁️',baseHp:80,spd:1.3,reward:26,armor:0,stealth:true},zombie:{icon:'💀',baseHp:115,spd:0.8,reward:18,armor:0,split:2},
  regen:{icon:'🧬',baseHp:230,spd:0.6,reward:32,armor:.2,regen:2},boss:{icon:'👑',baseHp:900,spd:0.4,reward:120,armor:.35,isBoss:true},
  cyborg:{icon:'🤖',baseHp:200,spd:0.9,reward:35,armor:.5,immuneSlow:true},ghost:{icon:'💫',baseHp:60,spd:3.0,reward:30,armor:0,stealth:true},
  splitter:{icon:'🦠',baseHp:140,spd:0.7,reward:25,armor:0,split:4},dragon:{icon:'🐉',baseHp:3000,spd:0.35,reward:300,armor:.45,isBoss:true,regen:5},
};

// ===========================  WAVES (20파) ===========================
const WAVES=[
  [{t:'normal',n:8,iv:40}],[{t:'normal',n:14,iv:32}],[{t:'normal',n:10,iv:32},{t:'fast',n:5,iv:24}],
  [{t:'fast',n:14,iv:20}],[{t:'armored',n:7,iv:44}],[{t:'normal',n:12,iv:28},{t:'armored',n:6,iv:40}],
  [{t:'flying',n:12,iv:30}],[{t:'fast',n:12,iv:20},{t:'flying',n:6,iv:28}],[{t:'stealth',n:9,iv:36}],
  [{t:'boss',n:1,iv:0},{t:'normal',n:15,iv:26}],[{t:'zombie',n:10,iv:38},{t:'armored',n:6,iv:35}],
  [{t:'cyborg',n:8,iv:38},{t:'flying',n:8,iv:26}],[{t:'ghost',n:10,iv:30},{t:'fast',n:10,iv:20}],
  [{t:'splitter',n:7,iv:45},{t:'armored',n:8,iv:32}],[{t:'boss',n:2,iv:100},{t:'cyborg',n:8,iv:32}],
  [{t:'zombie',n:14,iv:30},{t:'ghost',n:8,iv:24}],[{t:'splitter',n:10,iv:38},{t:'flying',n:10,iv:24}],
  [{t:'regen',n:10,iv:36},{t:'cyborg',n:8,iv:28}],[{t:'boss',n:3,iv:80},{t:'ghost',n:12,iv:22},{t:'fast',n:15,iv:18}],
  [{t:'dragon',n:1,iv:0},{t:'boss',n:2,iv:100},{t:'cyborg',n:10,iv:28},{t:'splitter',n:8,iv:36}],
];

// ===========================  GAME STATE ===========================
let gold=200,lives=20,score=0,wave=0,best=Number(localStorage.getItem('best_td3')||0);
let towers=[],enemies=[],bullets=[],particles=[],lightnings=[],waveEffects=[];
let spawnQueues=[],selType=0,selTower=null;
let waveRunning=false,gameOver=false,gameWon=false,speedMult=1,frameN=0;
let shakeX=0,shakeY=0,hovCell=null;

function chapterOf(w){return w<=5?1:w<=10?2:w<=15?3:4;}
function addP(x,y,color,n,spd,sz=3){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=(Math.random()*.8+.4)*spd;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color,sz:Math.random()*sz+1.5});}}
function shake(amt){shakeX=(Math.random()-.5)*amt;shakeY=(Math.random()-.5)*amt;}

let toastTimer=null;
function toast(msg,color='#ffd700'){const el=document.getElementById('toast');el.textContent=msg;el.style.color=color;el.style.opacity=1;clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.style.opacity=0,2000);}

// ===========================  UI UPDATES ===========================
function updateHUD(){
  document.getElementById('h-lives').textContent=lives;
  document.getElementById('h-gold').textContent=gold;
  document.getElementById('h-wave').textContent=wave;
  document.getElementById('h-score').textContent=score.toLocaleString();
  document.getElementById('h-best').textContent=best.toLocaleString();
  document.getElementById('h-chap').textContent=chapterOf(wave||1);
  // wave button
  const wb=document.getElementById('wave-btn');
  if(wave>=20){wb.textContent='모든 웨이브 완료';wb.className='done';}
  else if(waveRunning){wb.textContent='⚡ 다음 웨이브 조기 소환 (진행 중) [스페이스]';wb.className='running';}
  else{wb.textContent='▶ 다음 웨이브 시작 [스페이스]';wb.className='';}
  // speed buttons
  [1,2,3,4].forEach(s=>document.getElementById('s'+s).classList.toggle('active',speedMult===s));
  // refresh shop
  renderShop();
}
function setSpeed(s){speedMult=s;updateHUD();sfxUI();}

function renderShop(){
  const shopEl=document.getElementById('shop');
  shopEl.innerHTML='';
  TD.forEach((t,i)=>{

                  <span class="tdesc">${t.lv[0].desc}</span>`

// ===========================  WAVE MANAGEMENT ===========================
function buildSpawnQueue(waveIdx){
  const q=[];
  WAVES[waveIdx].forEach(g=>{
    for(let i=0;i<g.n;i++){
      q.push({type:g.t,delay:g.iv*(i+1)});  // 각 그룹 독립 인터벌
    }
  });
  q.sort((a,b)=>a.delay-b.delay);return q;
}
function handleWaveBtn(){startWave(waveRunning);}
function startWave(early=false){
  if(wave>=20||gameOver||gameWon)return;
  gac().resume();
  if(!waveRunning&&!early){
    wave++;
    spawnQueues.push({q:buildSpawnQueue(wave-1),tick:0,waveN:wave});
    waveRunning=true;
    toast(`🌊 웨이브 ${wave} 시작! (챕터 ${chapterOf(wave)})`,'#4af');
    sfxUI();
    // 타워 해금 확인
    const unlocked=TD.filter(t=>t.unlock===wave);
    if(unlocked.length>0)setTimeout(()=>{toast(`🔓 해금: ${unlocked.map(t=>t.icon+t.name).join(', ')}`,'#2ecc71');sfxUnlock();},600);
    // 챕터 보너스
    const cap=[{w:6,g:60},{w:11,g:120},{w:16,g:180}].find(c=>c.w===wave);
    if(cap)setTimeout(()=>{gold+=cap.g;toast(`🎖 챕터 보너스! +${cap.g}💰`,'#ffd700');updateHUD();},1100);
  } else if(waveRunning&&wave<20){
    wave++;
    spawnQueues.push({q:buildSpawnQueue(wave-1),tick:0,waveN:wave});
    const bonus=20+wave*2;gold+=bonus;
    toast(`⚡ 웨이브 ${wave} 조기 소환! +${bonus}💰`,'#ffd700');sfxUI();
    // 해금 확인
    const unlocked=TD.filter(t=>t.unlock===wave);
    if(unlocked.length>0)setTimeout(()=>{toast(`🔓 해금: ${unlocked.map(t=>t.icon+t.name).join(', ')}`,'#2ecc71');sfxUnlock();},400);
  }
  updateHUD();
}

// ===========================  TOWER CLASS ===========================
class Tower{
  constructor(col,row,type){this.col=col;this.row=row;this.type=type;this.lv=0;this.px=col*CS+CS/2;this.py=row*CS+CS/2;this.timer=0;this.angle=0;this.fireFlash=0;this.totalCost=TD[type].lv[0].cost;this.kills=0;}
  get data(){return TD[this.type].lv[this.lv];}
  get rangePx(){return this.data.range*CS;}
  get sellVal(){return Math.floor(this.totalCost*.65);}
}

// ===========================  ENEMY CLASS ===========================
class Enemy{
  constructor(type,waveN){
    const ed=ED[type];this.type=type;this.icon=ed.icon;
    this.hp=Math.floor(ed.baseHp*(1+waveN*.13));this.maxHp=this.hp;
    this.spd=ed.spd;this.reward=Math.floor(ed.reward*(1+waveN*.05));this.armor=ed.armor||0;
    this.stealth=ed.stealth||false;this.split=ed.split||0;this.regen=ed.regen||0;this.isBoss=ed.isBoss||false;this.immuneSlow=ed.immuneSlow||false;
    this.progress=0;const[sc,sr]=PATH[0];this.x=sc*CS+CS/2;this.y=sr*CS+CS/2;
    this.slowT=0;this.burnT=0;this.burnDmg=0;this.burnTick=0;this.freezeT=0;this.dead=false;this.waveN=waveN;
  }
  get effectSpd(){if(this.freezeT>0)return this.spd*.04;if(!this.immuneSlow&&this.slowT>0)return this.spd*.38;return this.spd;}
  update(){
    if(this.dead)return false;
    this.progress+=this.effectSpd;
    const idx=Math.min(Math.floor(this.progress/CS),PATH.length-2);
    if(idx>=PATH.length-1)return'leak';
    const[c1,r1]=PATH[idx],[c2,r2]=PATH[idx+1];
    const t=(this.progress%CS)/CS;
    this.x=(c1+(c2-c1)*t)*CS+CS/2;this.y=(r1+(r2-r1)*t)*CS+CS/2;
    if(this.progress>=PATH.length*CS-CS)return'leak';
    if(this.slowT>0)this.slowT--;if(this.freezeT>0)this.freezeT--;
    if(this.burnT>0){this.burnTick++;if(this.burnTick>=7){this.hp-=this.burnDmg;this.burnTick=0;if(this.hp<=0){killEnemy(this);return false;}}this.burnT--;addP(this.x,this.y,'#f84',1,1.5,2);}
    if(this.regen>0&&this.hp<this.maxHp)this.hp=Math.min(this.maxHp,this.hp+this.regen);
    return false;
  }
}

function hitEnemy(e,dmg,opts={}){if(e.dead)return;const d=Math.max(1,Math.floor(dmg*(1-e.armor)));e.hp-=d;if(opts.slow&&!e.immuneSlow)e.slowT=Math.max(e.slowT,65);if(opts.freeze&&!e.immuneSlow){e.freezeT=Math.max(e.freezeT,90);addP(e.x,e.y,'#74b9ff',6,2.5,3);}if(opts.burn){e.burnT=Math.max(e.burnT,130);e.burnDmg=Math.floor(opts.burn/8);}addP(e.x,e.y,'#ff6',3,2,2.5);if(e.hp<=0)killEnemy(e);}
function killEnemy(e){if(e.dead)return;e.dead=true;gold+=e.reward;score+=e.reward*15;if(score>best){best=score;localStorage.setItem('best_td3',best);}sfxKill(e.isBoss);if(e.isBoss)shake(12);addP(e.x,e.y,'#ffd700',20,5,5);if(e.split>0&&e.maxHp>60){for(let i=0;i<e.split;i++){const ne=new Enemy(e.split===2?'zombie':'normal',Math.max(1,e.waveN-2));ne.hp=Math.floor(e.maxHp*.25);ne.maxHp=ne.hp;ne.progress=Math.max(0,e.progress-10+i*5);enemies.push(ne);}}}

// ===========================  BULLET CLASS ===========================
class Bullet{
  constructor(sx,sy,target,dmg,opts,color){this.x=sx;this.y=sy;this.target=target;this.dmg=dmg;this.opts=opts;this.color=color;this.spd=8;this.dead=false;}
  update(){if(!this.target||this.target.dead){this.dead=true;return;}const dx=this.target.x-this.x,dy=this.target.y-this.y,d=Math.sqrt(dx*dx+dy*dy);if(d<this.spd+3){this.explode();return;}this.x+=dx/d*this.spd;this.y+=dy/d*this.spd;}
  explode(){this.dead=true;const tx=this.target.x,ty=this.target.y;if(this.opts.aoe>0){enemies.forEach(e=>{if(e.dead)return;const dx=e.x-tx,dy=e.y-ty;if(dx*dx+dy*dy<(this.opts.aoe*CS)**2)hitEnemy(e,this.dmg,this.opts);});addP(tx,ty,this.color,25,5,6);sfxShoot(2,0);}else{hitEnemy(this.target,this.dmg,this.opts);addP(tx,ty,this.color,8,3,3);if(this.opts.chain){let src=this.target;for(let i=0;i<this.opts.chain;i++){let nearest=null,nd=Infinity;enemies.forEach(e=>{if(e.dead||e===src)return;const d2=Math.hypot(e.x-src.x,e.y-src.y);if(d2<160&&d2<nd){nd=d2;nearest=e;}});if(!nearest)break;lightnings.push({x1:src.x,y1:src.y,x2:nearest.x,y2:nearest.y,life:10});hitEnemy(nearest,Math.floor(this.dmg*.55),this.opts);src=nearest;}}}}
}

// ===========================  TOWER FIRING ===========================
function updateTowers(){
  towers.forEach(t=>{
    t.timer++;t.fireFlash=Math.max(0,t.fireFlash-1);
    const d=t.data;if(t.timer<d.rate)return;
    let target=null,maxP=-Infinity;
    enemies.forEach(e=>{if(e.dead)return;const dx=e.x-t.px,dy=e.y-t.py;if(dx*dx+dy*dy<=t.rangePx**2&&e.progress>maxP){maxP=e.progress;target=e;}});
    if(!target)return;
    t.timer=0;t.fireFlash=10;t.kills++;t.angle=Math.atan2(target.y-t.py,target.x-t.px);
    sfxShoot(t.type,t.lv);
    const spec=d.special,opts={aoe:d.aoe||0,slow:d.slow||0,freeze:spec==='freeze',burn:d.burn||0,chain:d.chain||0};
    if(spec==='meteor'||spec==='meteorstorm'){const cnt=spec==='meteorstorm'?3:1;for(let m=0;m<cnt;m++)setTimeout(()=>{const alive=enemies.filter(e=>!e.dead);if(!alive.length)return;const et=alive[Math.floor(Math.random()*Math.min(alive.length,5))];waveEffects.push({type:'meteor',x:et.x,y:-30,tx:et.x,ty:et.y,speed:12,dmg:d.dmg,aoe:d.aoe,life:60});},m*400);}
    else if(spec==='wave'||spec==='wave2'){const cnt=spec==='wave2'?2:1;for(let w2=0;w2<cnt;w2++)waveEffects.push({type:'wave',x:t.px,y:t.py+(w2-.5)*30,vx:7,dmg:d.dmg,life:120,hit:new Set(),color:'#a29bfe'});}
    else if(spec==='triple'||spec==='penta'){const cnt=spec==='penta'?5:3;const sorted=[...enemies].filter(e=>!e.dead).sort((a,b)=>b.progress-a.progress);sorted.slice(0,cnt).forEach(e=>{const dx=e.x-t.px,dy=e.y-t.py;if(dx*dx+dy*dy<(t.rangePx*1.6)**2)bullets.push(new Bullet(t.px,t.py,e,d.dmg,opts,TD[t.type].color));});}
    else bullets.push(new Bullet(t.px,t.py,target,d.dmg,opts,TD[t.type].color));
  });
}
function updateWaveEffects(){for(let i=waveEffects.length-1;i>=0;i--){const ef=waveEffects[i];ef.life--;if(ef.type==='meteor'){ef.y+=ef.speed;if(ef.y>=ef.ty){enemies.forEach(e=>{if(e.dead)return;const dx=e.x-ef.tx,dy=e.y-ef.ty;if(dx*dx+dy*dy<(ef.aoe*CS)**2)hitEnemy(e,ef.dmg,{aoe:ef.aoe});});addP(ef.tx,ef.ty,'#ff6b35',30,6,7);shake(8);sfxShoot(6,0);waveEffects.splice(i,1);continue;}}else if(ef.type==='wave'){ef.x+=ef.vx;enemies.forEach(e=>{if(e.dead||ef.hit.has(e))return;if(Math.abs(e.x-ef.x)<25&&Math.abs(e.y-ef.y)<50){hitEnemy(e,ef.dmg,{});ef.hit.add(e);}});if(ef.x>GW+50){waveEffects.splice(i,1);continue;}}if(ef.life<=0)waveEffects.splice(i,1);}}

// ===========================  DRAWING ===========================
function drawBG(){
  const sky=cx.createLinearGradient(0,0,0,GH);sky.addColorStop(0,'#0a1520');sky.addColorStop(1,'#162a16');cx.fillStyle=sky;cx.fillRect(0,0,GW,GH);

  for(let i=0;i<10;i++){const tx=i*90+30,th=25+i%4*8;cx.fillStyle='#0d220d';cx.fillRect(tx-3,GH-th-8,6,th);cx.fillStyle='#1a3a1a';cx.beginPath();cx.moveTo(tx-12,GH-th-6);cx.lineTo(tx,GH-th-28);cx.lineTo(tx+12,GH-th-6);cx.closePath();cx.fill();}
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){if(!PATH_SET.has(c+','+r)){cx.fillStyle=`hsl(${120+((c*3+r*7)%20)},${22+(c+r)%3*4}%,${8+(c+r)%3*2}%)`;cx.fillRect(c*CS,r*CS,CS,CS);cx.strokeStyle='rgba(0,0,0,.15)';cx.lineWidth=.4;cx.strokeRect(c*CS,r*CS,CS,CS);}}
  PATH.forEach(([c,r],idx)=>{cx.fillStyle=`hsl(30,${28+idx%4*2}%,${20+idx%3*2}%)`;cx.fillRect(c*CS,r*CS,CS,CS);cx.fillStyle='rgba(0,0,0,.12)';cx.fillRect(c*CS+3,r*CS+3,CS-6,CS-6);});
  cx.fillStyle='rgba(255,210,120,.15)';cx.font='13px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
  for(let i=0;i<PATH.length-1;i+=2){const[c1,r1]=PATH[i],[c2,r2]=PATH[i+1];cx.fillText(c2>c1?'→':c2<c1?'←':r2>r1?'↓':'↑',c1*CS+CS/2,r1*CS+CS/2);}
  const[sc,sr]=PATH[0],[ec,er]=PATH[PATH.length-1];
  cx.fillStyle='rgba(0,255,100,.3)';cx.fillRect(sc*CS,sr*CS,CS,CS);cx.fillStyle='rgba(255,50,50,.3)';cx.fillRect(ec*CS,er*CS,CS,CS);
  cx.fillStyle='#fff';cx.font='bold 9px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText('IN',sc*CS+CS/2,sr*CS+CS/2);cx.fillText('OUT',ec*CS+CS/2,er*CS+CS/2);
}
function drawTowers(){

function drawEnemies(){

    cx.fillStyle=ECOL[e.type]||'#9b59b6';
    cx.beginPath();cx.arc(e.x,e.y,r,0,Math.PI*2);cx.fill();

    const sz=e.isBoss?22:16;cx.font=sz+'px sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(e.icon,e.x,e.y+2);cx.globalAlpha=1;
    if(!e.isBoss){const bw=28,bh=4,bx=e.x-bw/2,by=e.y-21;cx.fillStyle='#222';cx.fillRect(bx,by,bw,bh);const p=e.hp/e.maxHp;cx.fillStyle=p>.5?'#2ecc71':p>.25?'#f39c12':'#e74c3c';cx.fillRect(bx,by,bw*p,bh);}
    else{const bw=50,bh=6,bx=e.x-bw/2,by=e.y-30;cx.fillStyle='#111';cx.fillRect(bx-1,by-1,bw+2,bh+2);cx.fillStyle='#e74c3c';cx.fillRect(bx,by,bw*(e.hp/e.maxHp),bh);cx.strokeStyle='#f55';cx.lineWidth=1;cx.strokeRect(bx,by,bw,bh);cx.fillStyle='#ffd700';cx.font='bold 9px sans-serif';cx.textAlign='center';cx.fillText(e.type.toUpperCase()+' '+Math.ceil(e.hp),e.x,by-2);}
    if(e.burnT>0){cx.font='.6rem sans-serif';cx.textAlign='center';cx.fillText('🔥',e.x+13,e.y-13);}
    if(e.slowT>0&&e.slowT>20){cx.font='.6rem sans-serif';cx.fillText('❄️',e.x-13,e.y-13);}
  });cx.globalAlpha=1;
}
function drawBullets(){
  bullets.forEach(b=>{cx.fillStyle=b.color;cx.shadowBlur=8;cx.shadowColor=b.color;cx.beginPath();cx.arc(b.x,b.y,b.opts.aoe>0?6:3.5,0,Math.PI*2);cx.fill();cx.shadowBlur=0;});
  lightnings.forEach(l=>{cx.save();cx.strokeStyle=`rgba(255,220,0,${l.life/10})`;cx.lineWidth=2;cx.shadowBlur=8;cx.shadowColor='#ffd700';cx.beginPath();cx.moveTo(l.x1,l.y1);const steps=5,dx=(l.x2-l.x1)/steps,dy=(l.y2-l.y1)/steps;for(let i=1;i<steps;i++)cx.lineTo(l.x1+dx*i+(Math.random()-.5)*12,l.y1+dy*i+(Math.random()-.5)*12);cx.lineTo(l.x2,l.y2);cx.stroke();cx.restore();});
  waveEffects.forEach(ef=>{if(ef.type==='meteor'){cx.save();cx.translate(ef.x,ef.y);cx.rotate(Math.PI/4);cx.font='1.6rem sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('☄️',0,0);cx.fillStyle='rgba(255,100,30,.4)';for(let i=1;i<=4;i++)cx.fillRect(-3,i*7,6,5);cx.restore();}else if(ef.type==='wave'){cx.fillStyle=`rgba(162,155,254,${ef.life/120*.5})`;cx.beginPath();cx.ellipse(ef.x,ef.y,28,48,0,0,Math.PI*2);cx.fill();cx.strokeStyle='#a29bfe88';cx.lineWidth=2;cx.beginPath();cx.ellipse(ef.x,ef.y,28,48,0,0,Math.PI*2);cx.stroke();}});
}
function drawParticles(){particles.forEach(p=>{cx.globalAlpha=p.life;cx.fillStyle=p.color;cx.beginPath();cx.arc(p.x,p.y,p.sz,0,Math.PI*2);cx.fill();});cx.globalAlpha=1;}
function drawOverlays(){
  if(gameOver){cx.fillStyle='rgba(0,0,0,.82)';cx.fillRect(0,0,GW,GH);cx.textAlign='center';cx.strokeStyle='#000';cx.lineWidth=4;cx.fillStyle='#e74c3c';cx.font='bold 52px sans-serif';cx.strokeText('💀 게임 오버',GW/2,GH/2-30);cx.fillText('💀 게임 오버',GW/2,GH/2-30);cx.fillStyle='#ffd700';cx.font='24px sans-serif';cx.fillText('점수: '+score.toLocaleString(),GW/2,GH/2+20);cx.fillStyle='#aaa';cx.font='15px sans-serif';cx.fillText('새로고침으로 재시작',GW/2,GH/2+60);}
  if(gameWon){cx.fillStyle='rgba(0,0,20,.85)';cx.fillRect(0,0,GW,GH);cx.textAlign='center';cx.strokeStyle='#000';cx.lineWidth=4;cx.fillStyle='#ffd700';cx.font='bold 48px sans-serif';cx.strokeText('🏆 클리어!',GW/2,GH/2-40);cx.fillText('🏆 클리어!',GW/2,GH/2-40);cx.fillStyle='#fff';cx.font='22px sans-serif';cx.fillText('최종 점수: '+score.toLocaleString(),GW/2,GH/2+15);cx.fillStyle='#aaa';cx.font='15px sans-serif';cx.fillText('새로고침으로 재시작',GW/2,GH/2+60);}
}

// ===========================  MAIN UPDATE ===========================
function update(){
  if(gameOver||gameWon)return;
  frameN++;shakeX*=.7;shakeY*=.7;
  for(let qi=spawnQueues.length-1;qi>=0;qi--){const sq=spawnQueues[qi];sq.tick++;while(sq.q.length>0&&sq.tick>=sq.q[0].delay){enemies.push(new Enemy(sq.q[0].type,sq.waveN));sq.q.shift();}if(sq.q.length===0)spawnQueues.splice(qi,1);}
  if(waveRunning&&spawnQueues.length===0&&enemies.filter(e=>!e.dead).length===0){
    waveRunning=false;const bonus=40+wave*12;gold+=bonus;
    toast(`✅ 웨이브 ${wave} 완료! +${bonus}💰`,'#2ecc71');sfxUI();
    if(wave>=20)gameWon=true;updateHUD();
  }
  for(let i=enemies.length-1;i>=0;i--){
    if(enemies[i].dead){enemies.splice(i,1);continue;}
    const r=enemies[i].update();
    if(r==='leak'){lives--;if(enemies[i])enemies.splice(i,1);addP(PATH[PATH.length-1][0]*CS,PATH[PATH.length-1][1]*CS,'#f55',12,4,4);if(lives<=0){gameOver=true;updateHUD();return;}updateHUD();}
    else if(enemies[i]&&enemies[i].dead)enemies.splice(i,1);
  }
  updateTowers();
  for(let i=bullets.length-1;i>=0;i--){bullets[i].update();if(bullets[i].dead)bullets.splice(i,1);}
  updateWaveEffects();
  lightnings.forEach(l=>l.life--);lightnings=lightnings.filter(l=>l.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=.026;p.sz*=.96;});particles=particles.filter(p=>p.life>0);
}
function gameLoop(){
  for(let s=0;s<speedMult;s++)update();
  cx.save();if(Math.abs(shakeX)>.5)cx.translate(shakeX,shakeY);
  cx.clearRect(0,0,GW,GH);drawBG();drawTowers();drawEnemies();drawBullets();drawParticles();drawOverlays();
  cx.restore();requestAnimationFrame(gameLoop);
}

// ===========================  CANVAS INPUT ===========================
cv.addEventListener('mousemove',e=>{const rect=cv.getBoundingClientRect();const mx=(e.clientX-rect.left)*(GW/rect.width),my=(e.clientY-rect.top)*(GH/rect.height);hovCell=my<GH?[Math.floor(mx/CS),Math.floor(my/CS)]:null;});
cv.addEventListener('mouseleave',()=>hovCell=null);
cv.addEventListener('click',e=>{
  const rect=cv.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(GW/rect.width),my=(e.clientY-rect.top)*(GH/rect.height);
  if(my<0||my>=GH)return;
  const col=Math.floor(mx/CS),row=Math.floor(my/CS);
  if(col<0||col>=COLS||row<0||row>=ROWS)return;
  const existing=towers.find(t=>t.col===col&&t.row===row);
  if(existing){setSelTower(selTower===existing?null:existing);sfxUI();return;}
  if(selTower){setSelTower(null);return;}
  if(PATH_SET.has(col+','+row)){toast('경로 위에는 설치할 수 없어요!','#e74c3c');return;}
  const cost=TD[selType].lv[0].cost;
  if(gold<cost){toast(`💰 골드 부족! ${cost} 필요 (현재: ${gold})`,'#e74c3c');return;}
  if(wave<TD[selType].unlock&&selType>=3){toast(`🔒 웨이브 ${TD[selType].unlock} 이후 해금`,'#aaa');return;}
  gold-=cost;towers.push(new Tower(col,row,selType));
  toast(`${TD[selType].icon} ${TD[selType].name} 설치!`,'#2ecc71');sfxUI();updateHUD();
});
cv.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];cv.dispatchEvent(new MouseEvent('click',{clientX:t.clientX,clientY:t.clientY,bubbles:true}));},{passive:false});
document.addEventListener('keydown',e=>{if(e.code==='Space'){startWave(waveRunning);e.preventDefault();}if(e.code==='KeyQ')setSpeed(speedMult%4+1);if(e.code==='Escape'){setSelTower(null);}});

// ===========================  INIT ===========================
updateHUD();
renderShop();
gameLoop();
</script>
</body>
</html>
