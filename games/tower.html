<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏰 타워 디펜스</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;font-family:'Segoe UI',sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:10px;}
#top-bar{width:100%;max-width:560px;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
#top-bar a{color:#aaa;text-decoration:none;font-size:.85rem;}
#music-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:6px;color:#fff;font-size:.85rem;padding:4px 10px;cursor:pointer;}
#hud{width:100%;max-width:560px;display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:.85rem;}
#hud span{font-weight:bold;}
.hud-gold{color:#ffd700;}
.hud-hp{color:#e74c3c;}
.hud-wave{color:#4af;}
.hud-score{color:#7be;}
canvas{display:block;cursor:pointer;border-radius:6px;}
#shop{width:100%;max-width:560px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px;}
.tower-btn{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);border-radius:10px;padding:8px 4px;cursor:pointer;text-align:center;transition:background .15s,border .15s;}
.tower-btn:hover{background:rgba(255,255,255,.15);}
.tower-btn.selected{border-color:#ffd700;background:rgba(255,215,0,.1);}
.tower-btn .ticon{font-size:1.4rem;}
.tower-btn .tname{font-size:.7rem;font-weight:bold;margin:2px 0;}
.tower-btn .tcost{font-size:.7rem;color:#ffd700;}
.tower-btn .tdesc{font-size:.62rem;color:#888;}
#wave-btn{width:100%;max-width:560px;margin-top:8px;background:linear-gradient(135deg,#e74c3c,#c0392b);border:none;border-radius:10px;color:#fff;font-size:1rem;font-weight:bold;padding:10px;cursor:pointer;transition:opacity .2s;}
#wave-btn:hover{opacity:.85;}
#msg{font-size:.85rem;color:#ffd700;min-height:20px;text-align:center;margin-top:4px;}
</style>
</head>
<body>
<div id="top-bar">
  <a href="index.html">← 메뉴</a>
  <span style="font-size:.85rem">🏰 타워 디펜스</span>
  <button id="music-btn" onclick="toggleMusic()">🎵 켜기</button>
</div>
<div id="hud">
  <span class="hud-gold">💰 <span id="h-gold">150</span></span>
  <span class="hud-hp">❤️ <span id="h-hp">20</span></span>
  <span class="hud-wave">🌊 웨이브 <span id="h-wave">0</span></span>
  <span class="hud-score">⭐ <span id="h-score">0</span></span>
</div>
<canvas id="c" width="560" height="380"></canvas>
<div id="shop">
  <div class="tower-btn selected" onclick="selectTower(0)" id="tb0">
    <div class="ticon">🗼</div><div class="tname">기본</div>
    <div class="tcost">💰 50</div><div class="tdesc">균형잡힌 타워</div>
  </div>
  <div class="tower-btn" onclick="selectTower(1)" id="tb1">
    <div class="ticon">🏹</div><div class="tname">빠른</div>
    <div class="tcost">💰 75</div><div class="tdesc">빠른 발사속도</div>
  </div>
  <div class="tower-btn" onclick="selectTower(2)" id="tb2">
    <div class="ticon">💣</div><div class="tname">폭탄</div>
    <div class="tcost">💰 120</div><div class="tdesc">범위 대미지</div>
  </div>
  <div class="tower-btn" onclick="selectTower(3)" id="tb3">
    <div class="ticon">❄️</div><div class="tname">얼음</div>
    <div class="tcost">💰 90</div><div class="tdesc">적 속도 감소</div>
  </div>
</div>
<button id="wave-btn" onclick="startWave()">▶ 다음 웨이브 보내기</button>
<div id="msg">타워를 설치하고 웨이브를 시작하세요!</div>

<script>
// ===== 음악 =====
const N={R:0,C3:131,G3:196,C4:262,E4:330,G4:392,A4:440,C5:523,E5:659,G5:784,A5:880};
const LEAD=[[N.C5,1],[N.E5,.5],[N.G5,.5],[N.A5,1],[N.G5,.5],[N.E5,.5],[N.C5,2],[N.G4,1],[N.A4,.5],[N.C5,.5],[N.E5,1],[N.D5||(N.E5*.9),.5],[N.C5,.5],[N.G4,2]];
const BASS2=[[N.C3,1],[N.C3,1],[N.G3,1],[N.G3,1],[N.C3,1],[N.C3,1],[N.G3,.5],[N.A3||(N.G3*1.1),.5],[N.C3,1]];
let audioCtx=null,musicOn=false,musicTimer=null,nxt2=[0,0],idx2=[0,0];
function gc(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function sn2(freq,t,dur,type='square',vol=.07){const ctx=gc();if(!freq)return;const o=ctx.createOscillator(),g=ctx.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur*.85);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+dur);}
function drum2(t,type){const ctx=gc();const buf=ctx.createBuffer(1,ctx.sampleRate*.1,ctx.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);const src=ctx.createBufferSource(),g=ctx.createGain(),f=ctx.createBiquadFilter();src.buffer=buf;f.type='lowpass';f.frequency.value=type==='kick'?180:5000;g.gain.setValueAtTime(type==='kick'?.35:.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);src.connect(f);f.connect(g);g.connect(ctx.destination);src.start(t);}
function schedMusic2(){
  if(!musicOn)return;
  const ctx=gc(),b=60/130;
  while(nxt2[0]<ctx.currentTime+.3){const[f,beats]=LEAD[idx2[0]];sn2(f,nxt2[0],b*beats*.9);nxt2[0]+=b*beats;idx2[0]=(idx2[0]+1)%LEAD.length;}
  while(nxt2[1]<ctx.currentTime+.3){const[f,beats]=BASS2[idx2[1]];sn2(f,nxt2[1],b*beats*.9,'square',.05);nxt2[1]+=b*beats;idx2[1]=(idx2[1]+1)%BASS2.length;}
  const now=gc().currentTime,b2=60/130;
  for(let i=0;i<4;i++){const t=Math.ceil(now/b2)*b2+i*b2;if(t>now+.05&&t<now+.3){drum2(t,'kick');if(i%2===1)setTimeout(()=>drum2(t+b2*.5,'snare'),0);}}
  musicTimer=setTimeout(schedMusic2,100);
}
function toggleMusic(){const btn=document.getElementById('music-btn');if(musicOn){musicOn=false;clearTimeout(musicTimer);btn.textContent='🎵 켜기';}else{musicOn=true;const ctx=gc();ctx.resume();nxt2[0]=ctx.currentTime+.1;nxt2[1]=ctx.currentTime+.1;idx2[0]=0;idx2[1]=0;schedMusic2();btn.textContent='🔇 끄기';}}
function sfx2(f,dur){const ctx=gc();ctx.resume();const o=ctx.createOscillator(),g=ctx.createGain();o.type='square';o.frequency.value=f;g.gain.setValueAtTime(.15,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+dur);}

// ===== 게임 상수 =====
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const COLS=14,ROWS=10,CS=40; // cell size

// 경로 정의 (열, 행 좌표)
const PATH_COORDS=[[0,4],[1,4],[2,4],[3,4],[3,3],[3,2],[3,1],[4,1],[5,1],[6,1],[7,1],[7,2],[7,3],[7,4],[7,5],[8,5],[9,5],[10,5],[10,4],[10,3],[10,2],[11,2],[12,2],[13,2],[13,3],[13,4],[13,5],[13,6],[13,7],[12,7],[11,7],[10,7],[9,7],[8,7],[7,7],[6,7],[5,7],[4,7],[3,7],[3,8],[3,9]];
const PATH_SET=new Set(PATH_COORDS.map(([c,r])=>c+','+r));

// 타워 정보
const TOWER_TYPES=[
  {name:'기본',icon:'🗼',cost:50,dmg:25,range:2.5,rate:60,color:'#4af',aoe:0},
  {name:'빠른',icon:'🏹',cost:75,dmg:12,range:2,rate:20,color:'#2ecc71',aoe:0},
  {name:'폭탄',icon:'💣',cost:120,dmg:60,range:2,rate:90,color:'#e74c3c',aoe:1.2},
  {name:'얼음',icon:'❄️',cost:90,dmg:8,range:2.5,rate:50,color:'#74b9ff',aoe:0,slow:true},
];

let gold=150,hp=20,score=0,wave=0,best=Number(localStorage.getItem('best_tower')||0);
let towers=[],enemies=[],bullets=[],particles2=[];
let selectedType=0,waveRunning=false,spawnQueue=[],spawnTimer2=0,gameOver2=false;

// 웨이브 생성
function buildWave(w){
  const list=[];
  const count=5+w*3;
  for(let i=0;i<count;i++){
    let type='normal';
    if(w>2&&i%5===0)type='armored';
    else if(w>1&&i%4===0)type='fast';
    if(w>4&&i===Math.floor(count/2))type='boss';
    list.push({type,delay:i*40+20});
  }
  return list;
}

function spawnEnemy2(type){
  const hp2={normal:60+wave*15,fast:30+wave*8,armored:120+wave*25,boss:400+wave*80};
  const spd={normal:1,fast:2,armored:.7,boss:.5};
  const reward={normal:10,fast:15,armored:20,boss:60};
  const icons={normal:'👾',fast:'🏃',armored:'🛡️',boss:'👑'};
  enemies.push({
    pathIdx:0,progress:0,
    hp:hp2[type],maxHp:hp2[type],
    spd:spd[type],type,
    reward:reward[type],
    icon:icons[type],
    slow:0,
    x:PATH_COORDS[0][0]*CS+CS/2,
    y:PATH_COORDS[0][1]*CS+CS/2,
  });
}

function updateEnemies(){
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    const spd=e.slow>0?e.spd*.4:e.spd;
    if(e.slow>0)e.slow--;
    e.progress+=spd;
    // 경로 따라 이동
    const segLen=CS;
    let traveled=e.progress;
    let idx3=0;
    while(idx3<PATH_COORDS.length-1&&traveled>=segLen){traveled-=segLen;idx3++;}
    if(idx3>=PATH_COORDS.length-1){
      hp--;document.getElementById('h-hp').textContent=hp;
      sfx2(200,.2);
      enemies.splice(i,1);
      addParticle2(e.x,e.y,'#f00',8);
      if(hp<=0){triggerGameOver();return;}
      continue;
    }
    const[cx1,cy1]=PATH_COORDS[idx3],[cx2,cy2]=PATH_COORDS[idx3+1];
    const t=traveled/segLen;
    e.x=(cx1+(cx2-cx1)*t)*CS+CS/2;
    e.y=(cy1+(cy2-cy1)*t)*CS+CS/2;
  }
}

function updateTowers(){
  towers.forEach(tower=>{
    tower.timer++;
    const td=TOWER_TYPES[tower.type];
    if(tower.timer<td.rate)return;
    // 사거리 내 적 찾기
    let target=null,minDist=Infinity;
    enemies.forEach(e=>{
      const dx=e.x-tower.px,dy=e.y-tower.py,d=Math.sqrt(dx*dx+dy*dy);
      if(d<td.range*CS&&e.progress>minDist-1){target=e;minDist=e.progress;}
    });
    // 가장 많이 전진한 적 타겟
    enemies.forEach(e=>{
      const dx=e.x-tower.px,dy=e.y-tower.py,d=Math.sqrt(dx*dx+dy*dy);
      if(d<td.range*CS&&e.progress>=(target?target.progress:0)){target=e;}
    });
    if(!target)return;
    tower.timer=0;
    bullets.push({x:tower.px,y:tower.py,tx:target.x,ty:target.y,target,spd:6,type:tower.type,dmg:td.dmg,aoe:td.aoe,slow:td.slow||false,color:td.color});
    sfx2(tower.type===2?300:880,.03);
  });
}

function updateBullets(){
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    const dx=b.tx-b.x,dy=b.ty-b.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<b.spd+2){
      // 명중
      if(b.aoe>0){
        enemies.forEach(e=>{
          const ex=e.x-b.tx,ey=e.y-b.ty;
          if(Math.sqrt(ex*ex+ey*ey)<b.aoe*CS){
            e.hp-=b.dmg;addParticle2(e.x,e.y,'#f84',6);
          }
        });
        addParticle2(b.tx,b.ty,'#f84',18);
      } else {
        if(b.target&&b.target.hp>0){
          b.target.hp-=b.dmg;
          if(b.slow)b.target.slow=60;
          addParticle2(b.tx,b.ty,b.color,5);
        }
      }
      // 적 죽음 처리
      for(let ei=enemies.length-1;ei>=0;ei--){
        if(enemies[ei].hp<=0){
          gold+=enemies[ei].reward;score+=enemies[ei].reward*10;
          if(score>best){best=score;localStorage.setItem('best_tower',best);}
          addParticle2(enemies[ei].x,enemies[ei].y,'#ffd700',12);
          sfx2(660,.04);
          enemies.splice(ei,1);
          document.getElementById('h-gold').textContent=gold;
          document.getElementById('h-score').textContent=score;
        }
      }
      bullets.splice(i,1);
    } else {
      b.x+=dx/d*b.spd; b.y+=dy/d*b.spd;
      if(b.target)b.tx=b.target.x,b.ty=b.target.y;
    }
  }
}

function addParticle2(x,y,color,count){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*3+1;
    particles2.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color,size:Math.random()*3+1});
  }
}

function startWave(){
  if(waveRunning||gameOver2)return;
  wave++;document.getElementById('h-wave').textContent=wave;
  spawnQueue=buildWave(wave);waveRunning=true;spawnTimer2=0;
  document.getElementById('wave-btn').disabled=true;
  document.getElementById('msg').textContent='웨이브 '+wave+' 시작!';
  sfx2(440,.1);setTimeout(()=>sfx2(550,.1),.12);
}

function triggerGameOver(){
  gameOver2=true;waveRunning=false;
  document.getElementById('msg').textContent='💀 게임 오버! 최고: '+best+'점 | 새로고침으로 재시작';
  sfx2(200,.1);setTimeout(()=>sfx2(150,.1),.1);setTimeout(()=>sfx2(100,.3),.2);
}

// 타워 설치
function selectTower(t){
  selectedType=t;
  document.querySelectorAll('.tower-btn').forEach((b,i)=>b.classList.toggle('selected',i===t));
}

cv.addEventListener('click',e=>{
  if(gameOver2)return;
  const rect=cv.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(560/rect.width),my=(e.clientY-rect.top)*(380/rect.height);
  const col=Math.floor(mx/CS),row=Math.floor(my/CS);
  if(col<0||col>=COLS||row<0||row>=ROWS)return;
  if(PATH_SET.has(col+','+row))return;
  if(towers.some(t=>t.col===col&&t.row===row))return;
  const td=TOWER_TYPES[selectedType];
  if(gold<td.cost){document.getElementById('msg').textContent='💰 골드가 부족합니다!';return;}
  gold-=td.cost;document.getElementById('h-gold').textContent=gold;
  towers.push({col,row,px:col*CS+CS/2,py:row*CS+CS/2,type:selectedType,timer:0});
  sfx2(880,.05);
  document.getElementById('msg').textContent=td.icon+' '+td.name+' 타워 설치!';
});

function draw2(){
  cx.fillStyle='#1a2a1a';cx.fillRect(0,0,560,380);
  // 격자
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const isPath=PATH_SET.has(c+','+r);
    cx.fillStyle=isPath?'#3d2b1a':'rgba(255,255,255,.03)';
    cx.fillRect(c*CS,r*CS,CS,CS);
    cx.strokeStyle='rgba(255,255,255,.05)';cx.strokeRect(c*CS,r*CS,CS,CS);
  }
  // 경로 화살표
  for(let i=0;i<PATH_COORDS.length-1;i+=3){
    const[c1,r1]=PATH_COORDS[i],[c2,r2]=PATH_COORDS[Math.min(i+1,PATH_COORDS.length-1)];
    cx.fillStyle='rgba(255,200,100,.25)';
    const ax=c1*CS+CS/2,ay=r1*CS+CS/2;
    const dx=c2-c1,dy=r2-r1;
    cx.font='.8rem sans-serif';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(dx>0?'→':dx<0?'←':dy>0?'↓':'↑',ax,ay);
  }
  // 시작/끝 표시
  const[sc,sr]=PATH_COORDS[0],[ec,er]=PATH_COORDS[PATH_COORDS.length-1];
  cx.font='.85rem sans-serif';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillStyle='#2ecc71';cx.fillText('START',sc*CS+CS/2,sr*CS+CS/2);
  cx.fillStyle='#e74c3c';cx.fillText('END',ec*CS+CS/2,er*CS+CS/2);
  // 타워
  towers.forEach(t=>{
    const td=TOWER_TYPES[t.type];
    cx.fillStyle=td.color+'33';cx.strokeStyle=td.color+'88';cx.lineWidth=1;
    cx.beginPath();cx.arc(t.px,t.py,td.range*CS,0,Math.PI*2);cx.fill();cx.stroke();
    cx.font='1.5rem sans-serif';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(td.icon,t.px,t.py+3);
  });
  // 적
  enemies.forEach(e=>{
    const bw=28,bh=5;
    cx.fillStyle='#333';cx.fillRect(e.x-bw/2,e.y-20,bw,bh);
    cx.fillStyle=e.type==='boss'?'#e74c3c':'#2ecc71';cx.fillRect(e.x-bw/2,e.y-20,bw*(e.hp/e.maxHp),bh);
    cx.font=(e.type==='boss'?'1.8rem':'1.3rem')+' sans-serif';cx.textAlign='center';cx.textBaseline='middle';
    if(e.slow>0){cx.globalAlpha=.7;cx.fillStyle='#74b9ff';cx.beginPath();cx.arc(e.x,e.y,18,0,Math.PI*2);cx.fill();cx.globalAlpha=1;}
    cx.fillText(e.icon,e.x,e.y+3);
  });
  // 총알
  bullets.forEach(b=>{
    cx.fillStyle=b.color;cx.shadowBlur=8;cx.shadowColor=b.color;
    cx.beginPath();cx.arc(b.x,b.y,b.type===2?6:3,0,Math.PI*2);cx.fill();
    cx.shadowBlur=0;
  });
  // 파티클
  particles2.forEach(p=>{
    cx.globalAlpha=p.life;cx.fillStyle=p.color;
    cx.beginPath();cx.arc(p.x,p.y,p.size,0,Math.PI*2);cx.fill();
  });
  cx.globalAlpha=1;
  // 게임 오버
  if(gameOver2){
    cx.fillStyle='rgba(0,0,0,.7)';cx.fillRect(0,0,560,380);
    cx.fillStyle='#f55';cx.font='bold 2rem sans-serif';cx.textAlign='center';
    cx.fillText('💀 게임 오버',280,170);
    cx.fillStyle='#ffd700';cx.font='1.2rem sans-serif';cx.fillText('점수: '+score,280,210);
    cx.fillStyle='#aaa';cx.font='.9rem sans-serif';cx.fillText('새로고침으로 다시 시작',280,245);
  }
}

function gameLoop2(){
  if(!gameOver2){
    // 스폰
    if(waveRunning&&spawnQueue.length>0){
      spawnTimer2++;
      if(spawnTimer2>=spawnQueue[0].delay){
        spawnEnemy2(spawnQueue[0].type);spawnQueue.shift();spawnTimer2=0;
      }
      if(spawnQueue.length===0&&enemies.length===0){
        waveRunning=false;
        gold+=30+wave*10;document.getElementById('h-gold').textContent=gold;
        document.getElementById('wave-btn').disabled=false;
        document.getElementById('msg').textContent='✅ 웨이브 클리어! 💰+'+(30+wave*10)+'골드 보상!';
        sfx2(880,.08);setTimeout(()=>sfx2(1100,.08),.1);
      }
    }
    if(waveRunning&&spawnQueue.length===0&&enemies.length===0){waveRunning=false;document.getElementById('wave-btn').disabled=false;}
    updateEnemies();updateTowers();updateBullets();
    particles2.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=.03;p.size*=.95;});
    particles2=particles2.filter(p=>p.life>0);
  }
  draw2();
  requestAnimationFrame(gameLoop2);
}
gameLoop2();
</script>
</body>
</html>
