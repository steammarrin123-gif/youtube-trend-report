<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏰 타워 디펜스</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#060c14;display:flex;flex-direction:column;align-items:center;font-family:'Segoe UI',sans-serif;color:#fff;padding:6px;}
#top-bar{width:1000px;max-width:100vw;display:flex;justify-content:space-between;align-items:center;padding:0 0 5px;}
#top-bar a{color:#aaa;text-decoration:none;font-size:.8rem;}
canvas{display:block;max-width:100vw;cursor:pointer;border-radius:4px 4px 0 0;}
#stats{width:1000px;max-width:100vw;background:#0d1520;border:1px solid #1a2535;border-top:none;display:flex;gap:4px;padding:5px 6px;align-items:center;}
.stat{background:rgba(255,255,255,.06);border-radius:5px;padding:3px 10px;font-size:12px;font-weight:bold;white-space:nowrap;}
#controls{width:1000px;max-width:100vw;background:#0d1520;border:1px solid #1a2535;border-top:none;display:flex;gap:5px;padding:5px 6px;align-items:center;}
.spd-btn{background:rgba(255,255,255,.08);border:1px solid #2a3a4a;border-radius:5px;color:#aaa;font-size:11px;font-weight:bold;padding:5px 12px;cursor:pointer;transition:all .15s;}
.spd-btn.active{background:rgba(255,215,0,.25);border-color:#ffd700;color:#ffd700;}
.spd-btn:hover{background:rgba(255,255,255,.15);}
#wave-btn{flex:1;background:rgba(40,180,60,.8);border:2px solid #2ecc71;border-radius:6px;color:#fff;font-size:13px;font-weight:bold;padding:6px 16px;cursor:pointer;transition:all .15s;}
#wave-btn.running{background:rgba(200,140,0,.8);border-color:#ffd700;}
#wave-btn.done{background:rgba(60,60,60,.5);border-color:#555;color:#777;cursor:default;}
#shop{width:1000px;max-width:100vw;background:#0d1520;border:1px solid #1a2535;border-top:none;display:grid;grid-template-columns:repeat(8,1fr);border-radius:0 0 6px 6px;}
.tw-btn{background:transparent;border:none;border-right:1px solid #1a2535;color:#fff;padding:6px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:background .15s;min-height:72px;}
.tw-btn:last-child{border-right:none;}
.tw-btn:hover:not(:disabled){background:rgba(255,255,255,.08);}
.tw-btn.sel{background:rgba(255,255,255,.14);}
.tw-btn:disabled{opacity:.35;cursor:not-allowed;}
.tw-btn .ti{font-size:1.5rem;line-height:1;}
.tw-btn .tn{font-size:10px;font-weight:bold;}
.tw-btn .tc{font-size:10px;}
.tw-btn .td{font-size:8.5px;color:#889;text-align:center;}
#tower-panel{width:1000px;max-width:100vw;background:#0d1520;border:1px solid #1a2535;border-top:none;display:none;align-items:center;gap:8px;padding:6px 10px;border-radius:0 0 6px 6px;}
#tp-info{flex:1;}#tp-name{font-size:13px;font-weight:bold;}#tp-stats{font-size:11px;color:#aaa;margin-top:2px;}#tp-desc{font-size:10px;color:#88c;margin-top:1px;}
#tp-upg,#tp-sell,#tp-close{border-radius:6px;font-size:12px;font-weight:bold;padding:8px 14px;cursor:pointer;white-space:nowrap;border:2px solid;}
#tp-upg{background:rgba(40,160,40,.8);border-color:#2ecc71;color:#fff;}
#tp-upg:disabled{background:rgba(60,60,60,.5);border-color:#555;color:#777;}
#tp-sell{background:rgba(160,40,40,.8);border-color:#e74c3c;color:#fff;}
#tp-close{background:rgba(60,60,60,.5);border-color:#444;color:#aaa;}
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.88);border-radius:8px;padding:10px 22px;font-size:14px;font-weight:bold;pointer-events:none;opacity:0;transition:opacity .25s;z-index:100;}
</style>

<script>
// ==================== AUDIO ====================
let AC=null;
function gac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}

// 4채널 Epic Game OST
const MN={R:0,
  A2:110,B2:123,C3:131,D3:147,E3:165,F3:175,G3:196,A3:220,B3:247,
  C4:262,D4:294,E4:330,F4:349,G4:392,A4:440,B4:494,
  C5:523,D5:587,E5:659,F5:698,G5:784,A5:880,B5:988,
  C6:1047,D6:1175,E6:1319,G6:1568};
// Lead: 어드벤처 스타일 멜로디
const ML=[[MN.A5,.5],[MN.A5,.25],[MN.R,.25],[MN.A5,.5],[MN.G5,.5],[MN.E5,.75],[MN.R,.25],
  [MN.D5,.5],[MN.E5,.5],[MN.F5,.5],[MN.E5,.5],[MN.D5,1],[MN.R,.5],
  [MN.C5,.5],[MN.E5,.5],[MN.G5,.5],[MN.A5,.5],[MN.G5,.5],[MN.F5,.5],[MN.E5,1],[MN.R,.5],
  [MN.D5,.5],[MN.F5,.5],[MN.A5,.5],[MN.D6,.5],[MN.C6,.5],[MN.A5,.5],[MN.F5,1],[MN.R,.5],
  [MN.E5,.5],[MN.G5,.5],[MN.B5,.5],[MN.E6,.5],[MN.D6,.5],[MN.B5,.5],[MN.G5,1],[MN.R,.5]];
// Counter melody
const MC=[[MN.E4,.5],[MN.F4,.5],[MN.G4,.5],[MN.A4,.5],[MN.G4,.5],[MN.F4,.5],[MN.E4,1],
  [MN.D4,.5],[MN.E4,.5],[MN.F4,.5],[MN.G4,.5],[MN.F4,.5],[MN.E4,.5],[MN.D4,1],
  [MN.C4,.5],[MN.D4,.5],[MN.E4,.5],[MN.F4,.5],[MN.E4,.5],[MN.D4,.5],[MN.C4,1],
  [MN.A3,.5],[MN.B3,.5],[MN.C4,.5],[MN.D4,.5],[MN.E4,1],[MN.R,1]];
// Bass
const MB=[[MN.A2,1],[MN.A2,1],[MN.F2||(MN.A2*.74),1],[MN.G2||(MN.A2*.84),1],
  [MN.C3,1],[MN.C3,1],[MN.G2||(MN.A2*.84),1],[MN.A2,1]];
let mOn=false,mT=null,mN2=[0,0,0],mI=[0,0,0];
function asn(f,t,d,tp='square',v=.07){const c=gac();if(!f)return;const o=c.createOscillator(),g=c.createGain();o.type=tp;o.frequency.value=f;g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+d*.88);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+d);}
function adrm(t,type){
  const c=gac();const buf=c.createBuffer(1,Math.floor(c.sampleRate*.1),c.sampleRate);const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
  const s=c.createBufferSource(),g=c.createGain(),f=c.createBiquadFilter();
  s.buffer=buf;f.type=type==='kick'?'lowpass':type==='snare'?'bandpass':'highpass';
  f.frequency.value=type==='kick'?180:type==='snare'?3000:8000;
  g.gain.setValueAtTime(type==='kick'?.4:type==='snare'?.2:.08,t);g.gain.exponentialRampToValueAtTime(.001,t+.07);
  s.connect(f);f.connect(g);g.connect(c.destination);s.start(t);
}
function schedMusic(){
  if(!mOn)return;const c=gac(),b=60/148;
  while(mN2[0]<c.currentTime+.3){const[f,bs]=ML[mI[0]];asn(f,mN2[0],b*bs*.9,'square',.07);mN2[0]+=b*bs;mI[0]=(mI[0]+1)%ML.length;}
  while(mN2[1]<c.currentTime+.3){const[f,bs]=MC[mI[1]];asn(f,mN2[1],b*bs*.9,'triangle',.05);mN2[1]+=b*bs;mI[1]=(mI[1]+1)%MC.length;}
  while(mN2[2]<c.currentTime+.3){const[f,bs]=MB[mI[2]];asn(f,mN2[2],b*bs*.9,'sawtooth',.06);mN2[2]+=b*bs;mI[2]=(mI[2]+1)%MB.length;}
  const now=c.currentTime;
  for(let i=0;i<8;i++){const t=Math.ceil(now/(b*.5))*b*.5+i*b*.5;if(t>now+.05&&t<now+.3){if(i%4===0)adrm(t,'kick');if(i%4===2)adrm(t,'snare');if(i%2===1)adrm(t,'hihat');}}
  mT=setTimeout(schedMusic,100);
}
function toggleMusic(){const btn=document.getElementById('music-btn');if(mOn){mOn=false;clearTimeout(mT);btn.textContent='🎵 켜기';}else{mOn=true;const c=gac();c.resume();mN2=[c.currentTime+.05,c.currentTime+.05,c.currentTime+.05];mI=[0,0,0];schedMusic();btn.textContent='🔇 끄기';}}

// 타워별 효과음
function sfxShoot(type){
  const c=gac();c.resume();const t=c.currentTime;
  const fx=[[660,.05,'square',.12],[880,.04,'square',.1,3],[100,.2,'sawtooth',.2],[1400,.08,'sine',.12],[400,.1,'sawtooth',.15],[250,.12,'sawtooth',.12],[100,.3,'sawtooth',.3],[200,.4,'sine',.18]];
  const[f,d,tp,v,chain]=fx[type]||fx[0];
  if(type===1&&chain){for(let i=0;i<chain;i++)asn(f+i*60,t+i*.04,d,tp,v);}
  else{const o=c.createOscillator(),g=c.createGain();o.type=tp;o.frequency.value=f;if(type===4){o.frequency.setValueAtTime(500,t);o.frequency.exponentialRampToValueAtTime(100,t+d);}if(type===5){o.frequency.setValueAtTime(300,t);o.frequency.linearRampToValueAtTime(100,t+d);}if(type===7){o.frequency.setValueAtTime(200,t);o.frequency.linearRampToValueAtTime(60,t+d);}g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+d);}
}
function sfxKill(big){const c=gac();c.resume();const t=c.currentTime;big?[200,160,120,80].forEach((f,i)=>asn(f,t+i*.08,.1,'sawtooth',.22)):asn(550,t,.06,'square',.14);}
function sfxUI(){const c=gac();c.resume();asn(660,c.currentTime,.06,'square',.1);}
function sfxUnlock(){const c=gac();c.resume();const t=c.currentTime;[440,550,660,880,1100].forEach((f,i)=>asn(f,t+i*.09,.1,'sine',.16));}

// ==================== CONSTANTS ====================
const COLS=25,ROWS=12,CS=40,GW=1000,GH=500;
const cv=document.getElementById('c'),cx=cv.getContext('2d');

// 경로 (25×12)
const WPT=[[0,2],[4,2],[4,0],[9,0],[9,5],[5,5],[5,9],[11,9],[11,5],[16,5],[16,10],[21,10],[21,6],[24,6]];
function buildPath(){const cells=[],seen=new Set();for(let i=0;i<WPT.length-1;i++){const[c1,r1]=WPT[i],[c2,r2]=WPT[i+1];const dc=Math.sign(c2-c1),dr=Math.sign(r2-r1);let c=c1,r=r1;while(c!==c2||r!==r2){const k=c+','+r;if(!seen.has(k)){cells.push([c,r]);seen.add(k);}c+=dc;r+=dr;}}const[lc,lr]=WPT[WPT.length-1];if(!seen.has(lc+','+lr))cells.push([lc,lr]);return cells;}
const PATH=buildPath(),PATH_SET=new Set(PATH.map(([c,r])=>c+','+r));

// ==================== TOWER DATA ====================
const TD=[
  {name:'기본',icon:'🗼',color:'#4af',unlock:1,lv:[{cost:60,upgCost:80,dmg:28,range:2.5,rate:55,desc:'균형형'},{cost:60,upgCost:120,dmg:52,range:2.8,rate:48,desc:'강화'},{cost:60,upgCost:0,dmg:95,range:3.2,rate:40,desc:'관통',special:'pierce'}]},
  {name:'궁수',icon:'🏹',color:'#2ecc71',unlock:1,lv:[{cost:80,upgCost:95,dmg:14,range:2.4,rate:16,desc:'연사'},{cost:80,upgCost:140,dmg:22,range:2.7,rate:12,desc:'3연발',special:'triple'},{cost:80,upgCost:0,dmg:30,range:3.1,rate:9,desc:'5연발',special:'penta'}]},
  {name:'폭탄',icon:'💣',color:'#e74c3c',unlock:1,lv:[{cost:130,upgCost:155,dmg:70,range:2.0,rate:88,aoe:1.3,desc:'범위폭발'},{cost:130,upgCost:200,dmg:120,range:2.3,rate:78,aoe:1.8,desc:'강화폭발'},{cost:130,upgCost:0,dmg:200,range:2.6,rate:65,aoe:2.6,desc:'초대형',special:'mega'}]},
  {name:'얼음',icon:'❄️',color:'#74b9ff',unlock:6,lv:[{cost:95,upgCost:115,dmg:8,range:2.5,rate:50,slow:.4,desc:'감속40%'},{cost:95,upgCost:155,dmg:13,range:2.8,rate:43,slow:.65,desc:'감속65%'},{cost:95,upgCost:0,dmg:6,range:3.3,rate:38,slow:.96,desc:'동결',special:'freeze'}]},
  {name:'전기',icon:'⚡',color:'#ffd700',unlock:6,lv:[{cost:160,upgCost:195,dmg:40,range:2.3,rate:54,chain:2,desc:'체인2'},{cost:160,upgCost:245,dmg:65,range:2.6,rate:46,chain:3,desc:'체인3'},{cost:160,upgCost:0,dmg:100,range:3.1,rate:38,chain:5,desc:'체인5',special:'storm'}]},
  {name:'화염',icon:'🔥',color:'#e67e22',unlock:11,lv:[{cost:115,upgCost:145,dmg:7,range:2.2,rate:26,burn:20,desc:'화상'},{cost:115,upgCost:190,dmg:11,range:2.5,rate:21,burn:32,aoe:.7,desc:'광역화상'},{cost:115,upgCost:0,dmg:15,range:2.9,rate:17,burn:55,aoe:1.3,desc:'불바다',special:'inferno'}]},
  {name:'운석',icon:'☄️',color:'#ff6b35',unlock:11,lv:[{cost:200,upgCost:240,dmg:150,range:3.0,rate:180,aoe:1.8,desc:'운석소환',special:'meteor'},{cost:200,upgCost:300,dmg:250,range:3.5,rate:160,aoe:2.3,desc:'대형운석',special:'meteor'},{cost:200,upgCost:0,dmg:400,range:4.0,rate:140,aoe:3.0,desc:'3발',special:'meteorstorm'}]},
  {name:'파동포',icon:'🌊',color:'#a29bfe',unlock:16,lv:[{cost:250,upgCost:300,dmg:80,range:9.9,rate:200,desc:'파동',special:'wave'},{cost:250,upgCost:380,dmg:140,range:9.9,rate:175,desc:'강화파동',special:'wave'},{cost:250,upgCost:0,dmg:220,range:9.9,rate:150,desc:'쌍발',special:'wave2'}]},
];

// ==================== ENEMY DATA ====================
const ED={
  normal:{hp:80,spd:1.0,reward:10,armor:0,col:'#27ae60',size:11},
  fast:{hp:45,spd:2.5,reward:14,armor:0,col:'#e74c3c',size:9},

// ==================== WAVE DATA ====================
const WAVES=[
  [{t:'normal',n:8,iv:40}],[{t:'normal',n:14,iv:32}],[{t:'normal',n:10,iv:32},{t:'fast',n:5,iv:24}],
  [{t:'fast',n:14,iv:20}],[{t:'armored',n:7,iv:44}],[{t:'normal',n:12,iv:28},{t:'armored',n:6,iv:40}],

  [{t:'dragon',n:1,iv:0},{t:'boss',n:2,iv:100},{t:'cyborg',n:10,iv:28},{t:'splitter',n:8,iv:36}],
];

// ==================== STATE ====================
let gold=200,lives=20,score=0,wave=0,best=Number(localStorage.getItem('best_td4')||0);
let towers=[],enemies=[],bullets=[],particles=[],effects=[],lightnings=[],waveEffects=[];
let spawnQueues=[],selType=0,selTower=null;
let waveRunning=false,gameOver=false,gameWon=false,speedMult=1,frameN=0;
let shakeX=0,shakeY=0,hovCell=null;

function chapterOf(w){return w<=5?1:w<=10?2:w<=15?3:4;}
function addP(x,y,color,n,spd,sz=3){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=(Math.random()*.8+.4)*spd;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-Math.random()*spd*.3,life:1,color,sz:Math.random()*sz+1.5});}}
function shake(a){shakeX=(Math.random()-.5)*a;shakeY=(Math.random()-.5)*a;}
// Effects: visual-only, separated from game logic
function addEffect(type,x,y,opts){effects.push({type,x,y,life:1,...opts});}

let toastT=null;
function toast(msg,col='#ffd700'){const el=document.getElementById('toast');el.textContent=msg;el.style.color=col;el.style.opacity=1;clearTimeout(toastT);toastT=setTimeout(()=>el.style.opacity=0,2200);}

// ==================== UI ====================
function updateHUD(){
  document.getElementById('h-lives').textContent=lives;
  document.getElementById('h-gold').textContent=gold;
  document.getElementById('h-wave').textContent=wave;
  document.getElementById('h-score').textContent=score.toLocaleString();
  document.getElementById('h-best').textContent=best.toLocaleString();
  document.getElementById('h-chap').textContent=chapterOf(wave||1);
  const wb=document.getElementById('wave-btn');
  if(wave>=20){wb.textContent='모든 웨이브 완료!';wb.className='done';}
  else if(waveRunning){wb.textContent='⚡ 다음 웨이브 조기 소환 [스페이스]';wb.className='running';}
  else{wb.textContent='▶ 다음 웨이브 시작 [스페이스]';wb.className='';}

function upgSelTower(){if(!selTower||selTower.lv>=2)return;const c=selTower.data.upgCost;if(gold<c){toast('💰 골드 부족!','#e74c3c');return;}gold-=c;selTower.totalCost+=c;selTower.lv++;sfxUI();toast(`⬆ ${TD[selTower.type].name} Lv.${selTower.lv+1}!`,'#2ecc71');setSelTower(selTower);updateHUD();}

function buildSpawnQueue(wi){const q=[];WAVES[wi].forEach(g=>{for(let i=0;i<g.n;i++)q.push({type:g.t,delay:g.iv*(i+1)});});q.sort((a,b)=>a.delay-b.delay);return q;}
function handleWaveBtn(){startWave(waveRunning);}
function startWave(early=false){
  if(wave>=20||gameOver||gameWon)return;
  try{gac().resume();}catch(e){}
  if(!waveRunning&&!early){
    wave++;spawnQueues.push({q:buildSpawnQueue(wave-1),tick:0,waveN:wave});waveRunning=true;
    toast(`🌊 웨이브 ${wave} 시작!`,'#4af');sfxUI();
    TD.filter(t=>t.unlock===wave).forEach(t=>setTimeout(()=>{toast(`🔓 해금: ${t.icon}${t.name}`,'#2ecc71');sfxUnlock();},600));
    [{w:6,g:60},{w:11,g:120},{w:16,g:180}].filter(c=>c.w===wave).forEach(c=>setTimeout(()=>{gold+=c.g;toast(`🎖 챕터보너스 +${c.g}💰`);updateHUD();},1100));
  } else if(waveRunning&&wave<20){
    wave++;spawnQueues.push({q:buildSpawnQueue(wave-1),tick:0,waveN:wave});
    const b=20+wave*2;gold+=b;toast(`⚡ 웨이브${wave} 조기소환! +${b}💰`);sfxUI();
    TD.filter(t=>t.unlock===wave).forEach(t=>setTimeout(()=>{toast(`🔓 해금: ${t.icon}${t.name}`,'#2ecc71');sfxUnlock();},400));
  }
  updateHUD();
}

// ==================== CLASSES ====================
class Tower{
  constructor(col,row,type){this.col=col;this.row=row;this.type=type;this.lv=0;this.px=col*CS+CS/2;this.py=row*CS+CS/2;this.timer=0;this.angle=0;this.fireFlash=0;this.totalCost=TD[type].lv[0].cost;this.kills=0;}
  get data(){return TD[this.type].lv[this.lv];}
  get rangePx(){return this.data.range*CS;}
  get sellVal(){return Math.floor(this.totalCost*.65);}
}
class Enemy{
  constructor(type,waveN){
    const ed=ED[type];this.type=type;
    this.hp=Math.floor(ed.hp*(1+waveN*.13));this.maxHp=this.hp;
    this.spd=ed.spd;this.reward=Math.floor(ed.reward*(1+waveN*.05));this.armor=ed.armor||0;
    this.stealth=ed.stealth||false;this.split=ed.split||0;this.regen=ed.regen||0;
    this.isBoss=ed.isBoss||false;this.immuneSlow=ed.immuneSlow||false;
    this.progress=0;const[sc,sr]=PATH[0];this.x=sc*CS+CS/2;this.y=sr*CS+CS/2;
    this.slowT=0;this.burnT=0;this.burnDmg=0;this.burnTick=0;this.freezeT=0;this.dead=false;this.waveN=waveN;
    this.wobble=Math.random()*Math.PI*2;
  }
  get effectSpd(){if(this.freezeT>0)return this.spd*.04;if(!this.immuneSlow&&this.slowT>0)return this.spd*.38;return this.spd;}
  update(){
    if(this.dead)return false;
    this.progress+=this.effectSpd;this.wobble+=.1;
    const idx=Math.min(Math.floor(this.progress/CS),PATH.length-2);
    if(this.progress>=(PATH.length-1)*CS)return'leak';
    const[c1,r1]=PATH[idx],[c2,r2]=PATH[Math.min(idx+1,PATH.length-1)];
    const t=(this.progress%CS)/CS;this.x=(c1+(c2-c1)*t)*CS+CS/2;this.y=(r1+(r2-r1)*t)*CS+CS/2;
    if(this.slowT>0)this.slowT--;if(this.freezeT>0)this.freezeT--;
    if(this.burnT>0){this.burnTick++;if(this.burnTick>=7){this.hp-=this.burnDmg;this.burnTick=0;if(this.hp<=0){killEnemy(this);return false;}}this.burnT--;addP(this.x,this.y,'#f84',1,1.5,2);}
    if(this.regen>0&&this.hp<this.maxHp)this.hp=Math.min(this.maxHp,this.hp+this.regen);
    return false;
  }
}
class Bullet{
  constructor(sx,sy,target,dmg,opts,color){this.x=sx;this.y=sy;this.target=target;this.dmg=dmg;this.opts=opts;this.color=color;this.spd=9;this.dead=false;this.trail=[];}
  update(){
    if(!this.target||this.target.dead){this.dead=true;return;}
    this.trail.push({x:this.x,y:this.y,life:.8});
    if(this.trail.length>8)this.trail.shift();
    this.trail.forEach(p=>p.life-=.12);
    const dx=this.target.x-this.x,dy=this.target.y-this.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<this.spd+4){this.explode();return;}
    this.x+=dx/d*this.spd;this.y+=dy/d*this.spd;
  }
  explode(){
    this.dead=true;const tx=this.target.x,ty=this.target.y;
    if(this.opts.aoe>0){
      enemies.forEach(e=>{if(e.dead)return;const dx=e.x-tx,dy=e.y-ty;if(dx*dx+dy*dy<(this.opts.aoe*CS)**2)hitEnemy(e,this.dmg,this.opts);});
      // 폭발 이펙트
      addEffect('explosion',tx,ty,{radius:this.opts.aoe*CS,color:this.color,life:1,decay:.04});
      addP(tx,ty,this.color,30,6,6);addP(tx,ty,'#fff',10,4,3);shake(6);sfxShoot(2);
    } else {
      hitEnemy(this.target,this.dmg,this.opts);
      addP(tx,ty,this.color,10,3.5,4);
      if(this.opts.chain){
        let src=this.target;
        for(let i=0;i<this.opts.chain;i++){
          let near=null,nd=Infinity;
          enemies.forEach(e=>{if(e.dead||e===src)return;const d2=Math.hypot(e.x-src.x,e.y-src.y);if(d2<170&&d2<nd){nd=d2;near=e;}});
          if(!near)break;
          lightnings.push({x1:src.x,y1:src.y,x2:near.x,y2:near.y,life:12,bright:i===0});
          hitEnemy(near,Math.floor(this.dmg*.55),this.opts);src=near;
        }
      }
      if(this.opts.slow&&!this.target.immuneSlow){addEffect('ice_burst',tx,ty,{life:1,decay:.06,color:'#74b9ff'});}
      if(this.opts.burn){addEffect('flame_burst',tx,ty,{life:1,decay:.055,color:'#e67e22'});}
    }
  }
}

function hitEnemy(e,dmg,opts={}){if(e.dead)return;const d=Math.max(1,Math.floor(dmg*(1-e.armor)));e.hp-=d;if(opts.slow&&!e.immuneSlow)e.slowT=Math.max(e.slowT,65);if(opts.freeze&&!e.immuneSlow){e.freezeT=Math.max(e.freezeT,90);addP(e.x,e.y,'#74b9ff',8,2.5,3);}if(opts.burn){e.burnT=Math.max(e.burnT,130);e.burnDmg=Math.floor(opts.burn/8);}addP(e.x,e.y,'#ff6',3,2,2.5);if(e.hp<=0)killEnemy(e);}
function killEnemy(e){if(e.dead)return;e.dead=true;gold+=e.reward;score+=e.reward*15;if(score>best){best=score;localStorage.setItem('best_td4',best);}sfxKill(e.isBoss);if(e.isBoss)shake(14);addP(e.x,e.y,'#ffd700',25,6,6);if(e.split>0&&e.maxHp>60){for(let i=0;i<e.split;i++){const ne=new Enemy(e.split===2?'zombie':'normal',Math.max(1,e.waveN-2));ne.hp=Math.floor(e.maxHp*.25);ne.maxHp=ne.hp;ne.progress=Math.max(0,e.progress-8+i*4);enemies.push(ne);}}}

// ==================== TOWER FIRING ====================
function updateTowers(){
  towers.forEach(t=>{
    t.timer++;t.fireFlash=Math.max(0,t.fireFlash-1);
    const d=t.data;if(t.timer<d.rate)return;
    let target=null,maxP=-Infinity;
    enemies.forEach(e=>{if(e.dead)return;const dx=e.x-t.px,dy=e.y-t.py;if(dx*dx+dy*dy<=t.rangePx**2&&e.progress>maxP){maxP=e.progress;target=e;}});
    if(!target)return;
    t.timer=0;t.fireFlash=12;t.kills++;t.angle=Math.atan2(target.y-t.py,target.x-t.px);
    sfxShoot(t.type);
    const spec=d.special,opts={aoe:d.aoe||0,slow:d.slow||0,freeze:spec==='freeze',burn:d.burn||0,chain:d.chain||0};
    if(spec==='meteor'||spec==='meteorstorm'){
      const cnt=spec==='meteorstorm'?3:1;
      for(let m=0;m<cnt;m++)setTimeout(()=>{
        const alive=enemies.filter(e=>!e.dead);if(!alive.length)return;
        const et=alive[Math.floor(Math.random()*Math.min(alive.length,5))];
        waveEffects.push({type:'meteor',x:et.x+Math.random()*60-30,y:-20,tx:et.x,ty:et.y,spd:14,dmg:d.dmg,aoe:d.aoe,life:80});
      },m*350);
    } else if(spec==='wave'||spec==='wave2'){
      const cnt=spec==='wave2'?2:1;
      for(let w2=0;w2<cnt;w2++)waveEffects.push({type:'wave',x:t.px,y:t.py+(w2-.5)*35,vx:8,dmg:d.dmg,life:130,hit:new Set(),color:'#a29bfe'});
    } else if(spec==='triple'||spec==='penta'){
      const cnt=spec==='penta'?5:3;
      const sorted=[...enemies].filter(e=>!e.dead).sort((a,b)=>b.progress-a.progress);
      sorted.slice(0,cnt).forEach(e=>{if(Math.hypot(e.x-t.px,e.y-t.py)<t.rangePx*1.6)bullets.push(new Bullet(t.px,t.py,e,d.dmg,opts,TD[t.type].color));});
    } else {
      bullets.push(new Bullet(t.px,t.py,target,d.dmg,opts,TD[t.type].color));
    }
    // 레이저 이펙트 (기본 타워)
    if(t.type===0){lightnings.push({x1:t.px,y1:t.py,x2:target.x,y2:target.y,life:6,laser:true,color:TD[0].color});}
  });
}
function updateWaveEffects(){
  for(let i=waveEffects.length-1;i>=0;i--){
    const ef=waveEffects[i];ef.life--;
    if(ef.type==='meteor'){ef.y+=ef.spd;if(ef.y>=ef.ty){enemies.forEach(e=>{if(e.dead)return;const dx=e.x-ef.tx,dy=e.y-ef.ty;if(dx*dx+dy*dy<(ef.aoe*CS)**2)hitEnemy(e,ef.dmg,{aoe:ef.aoe});});addEffect('explosion',ef.tx,ef.ty,{radius:ef.aoe*CS*1.2,color:'#ff6b35',life:1,decay:.035});addP(ef.tx,ef.ty,'#ff6b35',35,8,7);shake(10);waveEffects.splice(i,1);continue;}}
    else if(ef.type==='wave'){ef.x+=ef.vx;enemies.forEach(e=>{if(e.dead||ef.hit.has(e))return;if(Math.abs(e.x-ef.x)<28&&Math.abs(e.y-ef.y)<55){hitEnemy(e,ef.dmg,{});ef.hit.add(e);}});if(ef.x>GW+60){waveEffects.splice(i,1);continue;}}
    if(ef.life<=0)waveEffects.splice(i,1);
  }
}

// ==================== MONSTER DRAWING ====================
function drawMonster(e){
  cx.save();cx.translate(e.x,e.y);
  const a=e.stealth?.48:1;cx.globalAlpha=a;
  const w=Math.sin(e.wobble)*.3;
  const ed=ED[e.type];const r=ed.size||12;

  if(e.freezeT>0){cx.fillStyle='rgba(100,200,255,.35)';cx.beginPath();cx.arc(0,0,r+6,0,Math.PI*2);cx.fill();}
  if(e.slowT>0){cx.strokeStyle='rgba(100,180,255,.4)';cx.lineWidth=2;cx.setLineDash([4,4]);cx.beginPath();cx.arc(0,0,r+4,0,Math.PI*2);cx.stroke();cx.setLineDash([]);}

  switch(e.type){
    case 'normal':
      cx.fillStyle='#27ae60';cx.beginPath();cx.ellipse(0,0,r,r*.85,w,0,Math.PI*2);cx.fill();
      cx.fillStyle='#2ecc71';cx.beginPath();cx.ellipse(0,-r*.3,r*.9,r*.55,w,0,Math.PI*2);cx.fill();
      // 눈
      cx.fillStyle='#fff';cx.beginPath();cx.arc(-r*.35,-r*.2,r*.28,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(r*.35,-r*.2,r*.28,0,Math.PI*2);cx.fill();
      cx.fillStyle='#111';cx.beginPath();cx.arc(-r*.35,-r*.2,r*.15,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(r*.35,-r*.2,r*.15,0,Math.PI*2);cx.fill();
      // 안테나
      cx.strokeStyle='#27ae60';cx.lineWidth=1.5;cx.beginPath();cx.moveTo(-r*.2,-r);cx.lineTo(-r*.3,-r*1.5);cx.stroke();cx.beginPath();cx.moveTo(r*.2,-r);cx.lineTo(r*.3,-r*1.5);cx.stroke();
      cx.fillStyle='#f1c40f';cx.beginPath();cx.arc(-r*.3,-r*1.5,r*.2,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(r*.3,-r*1.5,r*.2,0,Math.PI*2);cx.fill();
      break;
    case 'fast':
      cx.fillStyle='#e74c3c';cx.beginPath();cx.moveTo(0,-r);cx.lineTo(r*.8,r*.3);cx.lineTo(0,r*.7);cx.lineTo(-r*.8,r*.3);cx.closePath();cx.fill();
      cx.fillStyle='#ff6b6b';cx.beginPath();cx.arc(0,-r*.2,r*.4,0,Math.PI*2);cx.fill();
      cx.fillStyle='#fff';cx.beginPath();cx.arc(-r*.15,-r*.25,r*.18,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(r*.15,-r*.25,r*.18,0,Math.PI*2);cx.fill();
      cx.fillStyle='#333';cx.beginPath();cx.arc(-r*.15,-r*.25,r*.1,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(r*.15,-r*.25,r*.1,0,Math.PI*2);cx.fill();
      // 속도선
      cx.strokeStyle='rgba(255,200,0,.5)';cx.lineWidth=1.5;
      [-r*1.4,-r*1.1,-r*.8].forEach(ox=>{cx.beginPath();cx.moveTo(ox,-r*.3);cx.lineTo(ox-r*.4,r*.1);cx.stroke();});
      break;
    case 'armored':
      // 몸체 (사각 장갑)
      cx.fillStyle='#7f8c8d';cx.fillRect(-r,-r,r*2,r*2);
      cx.fillStyle='#95a5a6';cx.fillRect(-r*.7,-r*.7,r*1.4,r*1.4);
      cx.strokeStyle='#5d6d7e';cx.lineWidth=2;cx.strokeRect(-r,-r,r*2,r*2);
      // 눈 (좁은 슬릿)
      cx.fillStyle='#e74c3c';cx.fillRect(-r*.5,-r*.15,r,r*.3);
      cx.fillStyle='#c0392b';cx.fillRect(-r*.3,-r*.1,r*.6,r*.2);
      // 볼트
      [[r*.6,r*.7],[r*.6,-r*.7],[-r*.6,r*.7],[-r*.6,-r*.7]].forEach(([bx,by])=>{cx.fillStyle='#2c3e50';cx.beginPath();cx.arc(bx,by,r*.12,0,Math.PI*2);cx.fill();cx.strokeStyle='#1a252f';cx.lineWidth=1;cx.stroke();});
      break;
    case 'flying':
      // 새 몸체
      cx.fillStyle='#f39c12';cx.beginPath();cx.ellipse(0,0,r*1.2,r*.6,0,0,Math.PI*2);cx.fill();
      // 날개
      cx.fillStyle='#e67e22';
      const wng=Math.sin(frameN*.15)*r*.8;
      cx.beginPath();cx.moveTo(-r*.3,0);cx.quadraticCurveTo(-r*1.5,-r*.8+wng,-r*2,-r*.2+wng);cx.quadraticCurveTo(-r*1.2,r*.3,-r*.3,0);cx.fill();
      cx.beginPath();cx.moveTo(r*.3,0);cx.quadraticCurveTo(r*1.5,-r*.8+wng,r*2,-r*.2+wng);cx.quadraticCurveTo(r*1.2,r*.3,r*.3,0);cx.fill();
      cx.fillStyle='#fff';cx.beginPath();cx.arc(-r*.2,0,r*.22,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(r*.2,0,r*.22,0,Math.PI*2);cx.fill();
      cx.fillStyle='#333';cx.beginPath();cx.arc(-r*.2,0,r*.12,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(r*.2,0,r*.12,0,Math.PI*2);cx.fill();
      break;
    case 'stealth':

      cx.fillStyle=grd;cx.beginPath();cx.arc(0,0,r*.4,0,Math.PI*2);cx.fill();

      cx.fillStyle='#1b5e20';cx.beginPath();cx.ellipse(0,-r*.3,r*.8,r*.5,0,0,Math.PI*2);cx.fill();
      // 뼈 무늬
      cx.strokeStyle='rgba(255,255,255,.3)';cx.lineWidth=1;
      cx.beginPath();cx.moveTo(-r*.4,-r*.5);cx.lineTo(r*.4,r*.5);cx.stroke();
      cx.beginPath();cx.moveTo(r*.4,-r*.5);cx.lineTo(-r*.4,r*.5);cx.stroke();
      // 눈
      cx.fillStyle='#f9ca24';cx.beginPath();cx.arc(-r*.3,-r*.3,r*.22,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(r*.3,-r*.3,r*.22,0,Math.PI*2);cx.fill();
      cx.fillStyle='#333';cx.beginPath();cx.arc(-r*.3,-r*.3,r*.12,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(r*.3,-r*.3,r*.12,0,Math.PI*2);cx.fill();
      break;
    case 'regen':{
      const pulse=.85+Math.sin(frameN*.12)*.15;
      cx.fillStyle='#1abc9c';cx.beginPath();cx.arc(0,0,r*pulse,0,Math.PI*2);cx.fill();
      cx.fillStyle='rgba(26,188,156,.4)';cx.beginPath();cx.arc(0,0,r*1.3,0,Math.PI*2);cx.fill();
      // + 표시
      cx.strokeStyle='rgba(255,255,255,.8)';cx.lineWidth=2;
      cx.beginPath();cx.moveTo(0,-r*.5);cx.lineTo(0,r*.5);cx.stroke();
      cx.beginPath();cx.moveTo(-r*.5,0);cx.lineTo(r*.5,0);cx.stroke();
      break;}
    case 'boss':
      // 큰 빨간 몬스터
      cx.fillStyle='#c0392b';cx.beginPath();cx.ellipse(0,0,r,r*.85,0,0,Math.PI*2);cx.fill();
      cx.fillStyle='#922b21';cx.beginPath();cx.arc(0,-r*.2,r*.7,0,Math.PI*2);cx.fill();
      // 왕관
      cx.fillStyle='#ffd700';
      cx.beginPath();cx.moveTo(-r*.7,-r*.8);cx.lineTo(-r*.7,-r*1.3);cx.lineTo(-r*.35,-r*1.0);cx.lineTo(0,-r*1.4);cx.lineTo(r*.35,-r*1.0);cx.lineTo(r*.7,-r*1.3);cx.lineTo(r*.7,-r*.8);cx.closePath();cx.fill();
      cx.fillStyle='#e74c3c';[[-r*.5,-r*1.25],[0,-r*1.35],[r*.5,-r*1.25]].forEach(([bx,by])=>{cx.beginPath();cx.arc(bx,by,r*.12,0,Math.PI*2);cx.fill();});
      // 눈 (빛남)
      cx.fillStyle='#f1c40f';cx.shadowBlur=8;cx.shadowColor='#f1c40f';
      cx.beginPath();cx.arc(-r*.35,-r*.2,r*.25,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(r*.35,-r*.2,r*.25,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
      cx.fillStyle='#111';cx.beginPath();cx.arc(-r*.35,-r*.2,r*.15,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(r*.35,-r*.2,r*.15,0,Math.PI*2);cx.fill();
      // 이빨
      cx.fillStyle='#fff';for(let ti=0;ti<5;ti++){cx.beginPath();cx.moveTo(-r*.5+ti*r*.25,r*.2);cx.lineTo(-r*.38+ti*r*.25,r*.45);cx.lineTo(-r*.26+ti*r*.25,r*.2);cx.fill();}
      break;
    case 'cyborg':
      cx.fillStyle='#7f8c8d';cx.fillRect(-r,-r*.8,r*2,r*1.6);
      cx.fillStyle='#2980b9';cx.fillRect(-r*.7,-r*.5,r*1.4,r);
      // 눈 (LED)
      cx.fillStyle='#00ff00';cx.shadowBlur=6;cx.shadowColor='#00ff00';
      cx.fillRect(-r*.4,-r*.1,r*.3,r*.2);cx.fillRect(r*.1,-r*.1,r*.3,r*.2);cx.shadowBlur=0;
      // 안테나
      cx.strokeStyle='#7f8c8d';cx.lineWidth=2;cx.beginPath();cx.moveTo(r*.3,-r*.8);cx.lineTo(r*.5,-r*1.2);cx.stroke();
      cx.fillStyle='#e74c3c';cx.beginPath();cx.arc(r*.5,-r*1.2,r*.12,0,Math.PI*2);cx.fill();
      // 다리
      cx.fillStyle='#95a5a6';cx.fillRect(-r*.6,r*.8,r*.4,r*.5);cx.fillRect(r*.2,r*.8,r*.4,r*.5);
      break;
    case 'ghost':{
      const ga=.6+Math.sin(frameN*.1)*.2;cx.globalAlpha*=ga;
      cx.fillStyle='#ecf0f1';cx.beginPath();cx.arc(0,-r*.3,r,0,Math.PI);cx.lineTo(r,-r*.3+r*.3);
      for(let gi=0;gi<3;gi++){const sx=r-gi*r*.67;cx.quadraticCurveTo(sx+r*.2,r,sx-r*.2,r*.5);}
      cx.lineTo(-r,-r*.3+r*.3);cx.closePath();cx.fill();
      cx.fillStyle='#2c3e50';cx.beginPath();cx.arc(-r*.3,-r*.4,r*.2,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(r*.3,-r*.4,r*.2,0,Math.PI*2);cx.fill();
      break;}
    case 'splitter':{
      const sp=.9+Math.sin(frameN*.2)*.1;
      cx.fillStyle='#e67e22';cx.beginPath();cx.arc(0,0,r*sp,0,Math.PI*2);cx.fill();
      cx.fillStyle='rgba(255,150,50,.5)';cx.beginPath();cx.arc(0,0,r*sp*1.3,0,Math.PI*2);cx.fill();
      // 분열선
      cx.strokeStyle='rgba(255,255,255,.5)';cx.lineWidth=1.5;
      cx.beginPath();cx.moveTo(-r*.8,0);cx.lineTo(r*.8,0);cx.stroke();
      cx.beginPath();cx.moveTo(0,-r*.8);cx.lineTo(0,r*.8);cx.stroke();
      break;}
    case 'dragon':
      // 큰 용
      cx.fillStyle='#8e44ad';cx.beginPath();cx.ellipse(0,0,r,r*.7,0,0,Math.PI*2);cx.fill();
      cx.fillStyle='#6c3483';cx.beginPath();cx.ellipse(0,-r*.2,r*.8,r*.5,0,0,Math.PI*2);cx.fill();
      // 날개
      cx.fillStyle='rgba(142,68,173,.6)';
      cx.beginPath();cx.moveTo(-r*.4,0);cx.lineTo(-r*2,-r*.8);cx.lineTo(-r*1.8,r*.3);cx.lineTo(-r*.6,r*.3);cx.fill();
      cx.beginPath();cx.moveTo(r*.4,0);cx.lineTo(r*2,-r*.8);cx.lineTo(r*1.8,r*.3);cx.lineTo(r*.6,r*.3);cx.fill();
      // 뿔
      cx.fillStyle='#e74c3c';
      cx.beginPath();cx.moveTo(-r*.3,-r);cx.lineTo(-r*.1,-r*1.6);cx.lineTo(r*.1,-r*.9);cx.fill();
      cx.beginPath();cx.moveTo(r*.3,-r);cx.lineTo(r*.1,-r*1.6);cx.lineTo(-r*.1,-r*.9);cx.fill();
      // 눈
      cx.fillStyle='#f1c40f';cx.shadowBlur=10;cx.shadowColor='#f1c40f';
      cx.beginPath();cx.arc(-r*.3,-r*.15,r*.28,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(r*.3,-r*.15,r*.28,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
      cx.fillStyle='#000';cx.beginPath();cx.arc(-r*.3,-r*.15,r*.16,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(r*.3,-r*.15,r*.16,0,Math.PI*2);cx.fill();
      break;
    default:
      cx.fillStyle=ed.col||'#9b59b6';cx.beginPath();cx.arc(0,0,r,0,Math.PI*2);cx.fill();
  }
  cx.globalAlpha=1;cx.restore();

  // HP바 (몬스터 위에)
  if(!e.isBoss){
    const bw=Math.max(24,ED[e.type].size*2.2),bh=4,bx=e.x-bw/2,by=e.y-ED[e.type].size-8;
    cx.fillStyle='#1a1a1a';cx.fillRect(bx,by,bw,bh);
    const p=e.hp/e.maxHp;cx.fillStyle=p>.5?'#2ecc71':p>.25?'#f39c12':'#e74c3c';cx.fillRect(bx,by,bw*p,bh);
  } else {
    const bw=60,bh=7,bx=e.x-bw/2,by=e.y-ED[e.type].size-14;
    cx.fillStyle='#111';cx.fillRect(bx-1,by-1,bw+2,bh+2);cx.fillStyle='#e74c3c';cx.fillRect(bx,by,bw*(e.hp/e.maxHp),bh);
    cx.strokeStyle='#f55';cx.lineWidth=1;cx.strokeRect(bx,by,bw,bh);
    cx.fillStyle='#ffd700';cx.font='bold 9px sans-serif';cx.textAlign='center';
    cx.fillText(`${e.type.toUpperCase()} ${Math.ceil(e.hp)}`,e.x,by-2);
  }
  if(e.burnT>0){cx.font='10px sans-serif';cx.textAlign='center';cx.fillText('🔥',e.x+ED[e.type].size,e.y-ED[e.type].size);}
}

// ==================== EFFECTS DRAWING ====================
function drawEffects(){
  // Visual effects
  effects.forEach(ef=>{
    if(ef.type==='explosion'){
      const r=ef.radius*(1-ef.life+1)*ef.life*2;
      cx.strokeStyle=ef.color;cx.lineWidth=3*(ef.life);cx.globalAlpha=ef.life*.7;
      cx.beginPath();cx.arc(ef.x,ef.y,r,0,Math.PI*2);cx.stroke();
      cx.fillStyle=ef.color;cx.globalAlpha=ef.life*.3;
      cx.beginPath();cx.arc(ef.x,ef.y,r*.6,0,Math.PI*2);cx.fill();
      cx.globalAlpha=1;
    } else if(ef.type==='ice_burst'){
      for(let i=0;i<6;i++){
        const a=i/6*Math.PI*2,d=(1-ef.life)*25;
        cx.strokeStyle='#74b9ff';cx.lineWidth=2;cx.globalAlpha=ef.life;
        cx.beginPath();cx.moveTo(ef.x+Math.cos(a)*d,ef.y+Math.sin(a)*d);cx.lineTo(ef.x+Math.cos(a)*(d+10),ef.y+Math.sin(a)*(d+10));cx.stroke();
      }
      cx.globalAlpha=1;
    } else if(ef.type==='flame_burst'){
      for(let i=0;i<8;i++){
        const a=i/8*Math.PI*2,d=(1-ef.life)*20;
        cx.fillStyle=`hsl(${20+ef.life*20},100%,60%)`;cx.globalAlpha=ef.life*.8;
        cx.beginPath();cx.arc(ef.x+Math.cos(a)*d,ef.y+Math.sin(a)*d,4*ef.life,0,Math.PI*2);cx.fill();
      }
      cx.globalAlpha=1;
    }
  });
  // Lightning effects
  lightnings.forEach(l=>{
    const isFade=l.life/12;
    cx.save();
    if(l.laser){cx.strokeStyle=`rgba(100,180,255,${isFade*.9})`;cx.lineWidth=3;}
    else{cx.strokeStyle=`rgba(255,220,0,${isFade*.85})`;cx.lineWidth=l.bright?3:2;}
    cx.shadowBlur=l.laser?12:8;cx.shadowColor=l.laser?'#4af':'#ffd700';
    cx.beginPath();cx.moveTo(l.x1,l.y1);
    const steps=6,dx=(l.x2-l.x1)/steps,dy=(l.y2-l.y1)/steps;
    for(let i=1;i<steps;i++)cx.lineTo(l.x1+dx*i+(Math.random()-.5)*14,l.y1+dy*i+(Math.random()-.5)*14);
    cx.lineTo(l.x2,l.y2);cx.stroke();cx.restore();
  });
  // Bullets
  bullets.forEach(b=>{
    // Trail
    b.trail.forEach(p=>{cx.globalAlpha=p.life*.5;cx.fillStyle=b.color;cx.beginPath();cx.arc(p.x,p.y,3,0,Math.PI*2);cx.fill();});
    cx.globalAlpha=1;
    // Bullet
    cx.fillStyle=b.color;cx.shadowBlur=10;cx.shadowColor=b.color;
    cx.beginPath();cx.arc(b.x,b.y,b.opts.aoe>0?7:4,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
  });
  // Wave effects
  waveEffects.forEach(ef=>{
    if(ef.type==='meteor'){
      cx.save();cx.translate(ef.x,ef.y);cx.rotate(Math.PI/3);
      // 운석 몸체
      cx.fillStyle='#ff6b35';cx.beginPath();cx.arc(0,0,14,0,Math.PI*2);cx.fill();
      cx.fillStyle='#fff';cx.beginPath();cx.arc(-4,-4,5,0,Math.PI*2);cx.fill();
      // 꼬리
      for(let i=1;i<=6;i++){cx.fillStyle=`rgba(255,100,30,${.7-i*.1})`;cx.fillRect(-3,i*10,6,8);}
      cx.restore();
    } else if(ef.type==='wave'){
      cx.fillStyle=`rgba(162,155,254,${ef.life/130*.55})`;
      cx.shadowBlur=12;cx.shadowColor='#a29bfe';
      cx.beginPath();cx.ellipse(ef.x,ef.y,32,55,0,0,Math.PI*2);cx.fill();
      cx.shadowBlur=0;
    }
  });
}

// ==================== BACKGROUND DRAWING ====================
function drawBG(){
  const ch=chapterOf(wave||1);
  const skyCols=[['#0a1520','#162a16'],['#0a0f1a','#1a2a10'],['#1a0a0a','#2a1510'],['#1a0505','#300a0a']];
  const sc=skyCols[ch-1];const sky=cx.createLinearGradient(0,0,0,GH);sky.addColorStop(0,sc[0]);sky.addColorStop(1,sc[1]);
  cx.fillStyle=sky;cx.fillRect(0,0,GW,GH);
  // 배경 나무들
  for(let i=0;i<14;i++){const tx=i*76+20,th=28+i%4*9,hue=120-ch*10;cx.fillStyle=`hsl(${hue},40%,${8+i%3*2}%)`;cx.fillRect(tx-3,GH-th-8,6,th);cx.fillStyle=`hsl(${hue},45%,${12+i%3*2}%)`;cx.beginPath();cx.moveTo(tx-13,GH-th-6);cx.lineTo(tx,GH-th-30);cx.lineTo(tx+13,GH-th-6);cx.closePath();cx.fill();}
  // 그리드 셀
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(!PATH_SET.has(c+','+r)){
      cx.fillStyle=`hsl(${115+((c*3+r*7)%25)},${20+(c+r)%4*3}%,${7+(c+r)%4*2}%)`;
      cx.fillRect(c*CS,r*CS,CS,CS);cx.strokeStyle='rgba(0,0,0,.12)';cx.lineWidth=.4;cx.strokeRect(c*CS,r*CS,CS,CS);
    }
  }
  // 경로
  PATH.forEach(([c,r],idx)=>{
    cx.fillStyle=`hsl(28,${32+idx%4*2}%,${18+idx%3*2}%)`;cx.fillRect(c*CS,r*CS,CS,CS);
    cx.fillStyle='rgba(0,0,0,.1)';cx.fillRect(c*CS+3,r*CS+3,CS-6,CS-6);
  });
  // 경로 화살표
  cx.fillStyle='rgba(255,200,100,.14)';cx.font='13px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
  for(let i=0;i<PATH.length-1;i+=2){const[c1,r1]=PATH[i],[c2,r2]=PATH[i+1];cx.fillText(c2>c1?'→':c2<c1?'←':r2>r1?'↓':'↑',c1*CS+CS/2,r1*CS+CS/2);}
  // 시작/끝
  const[sc2,sr]=PATH[0],[ec,er]=PATH[PATH.length-1];
  cx.fillStyle='rgba(0,255,100,.25)';cx.fillRect(sc2*CS,sr*CS,CS,CS);cx.fillStyle='rgba(255,50,50,.25)';cx.fillRect(ec*CS,er*CS,CS,CS);
  cx.fillStyle='#fff';cx.font='bold 9px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText('IN',sc2*CS+CS/2,sr*CS+CS/2);cx.fillText('OUT',ec*CS+CS/2,er*CS+CS/2);
}

// ==================== TOWER DRAWING ====================
function drawTower(t){
  const lc=TD[t.type].color,x=t.col*CS,y=t.row*CS;
  cx.fillStyle='#1a2030';cx.fillRect(x+2,y+2,CS-4,CS-4);
  cx.fillStyle=lc+'35';cx.fillRect(x+2,y+2,CS-4,CS-4);
  if(t.fireFlash>5){cx.fillStyle=lc+'70';cx.fillRect(x+2,y+2,CS-4,CS-4);cx.shadowBlur=15;cx.shadowColor=lc;}
  cx.strokeStyle=selTower===t?lc:lc+'55';cx.lineWidth=selTower===t?2.5:1.5;cx.strokeRect(x+2,y+2,CS-4,CS-4);cx.shadowBlur=0;
  // 타워 아이콘
  cx.save();cx.translate(t.px,t.py);if(t.type===0||t.type===4)cx.rotate(t.angle);
  cx.font='18px sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(TD[t.type].icon,0,2);cx.restore();
  // 레벨 점
  for(let i=0;i<3;i++){cx.fillStyle=i<=t.lv?lc:'#1e2a3a';cx.beginPath();cx.arc(x+9+i*8,y+5,2.5,0,Math.PI*2);cx.fill();}
}

// ==================== GAME OVERLAYS ====================
function drawOverlays(){
  if(gameOver){cx.fillStyle='rgba(0,0,0,.85)';cx.fillRect(0,0,GW,GH);cx.textAlign='center';cx.strokeStyle='#000';cx.lineWidth=5;cx.fillStyle='#e74c3c';cx.font='bold 56px sans-serif';cx.strokeText('💀 게임 오버',GW/2,GH/2-30);cx.fillText('💀 게임 오버',GW/2,GH/2-30);cx.fillStyle='#ffd700';cx.font='24px sans-serif';cx.fillText('점수: '+score.toLocaleString(),GW/2,GH/2+20);cx.fillStyle='#aaa';cx.font='16px sans-serif';cx.fillText('새로고침으로 재시작',GW/2,GH/2+60);}
  if(gameWon){cx.fillStyle='rgba(0,0,20,.88)';cx.fillRect(0,0,GW,GH);cx.textAlign='center';cx.strokeStyle='#000';cx.lineWidth=4;cx.fillStyle='#ffd700';cx.font='bold 50px sans-serif';cx.strokeText('🏆 클리어!',GW/2,GH/2-40);cx.fillText('🏆 클리어!',GW/2,GH/2-40);cx.fillStyle='#fff';cx.font='22px sans-serif';cx.fillText('최종: '+score.toLocaleString()+'점',GW/2,GH/2+15);cx.fillStyle='#aaa';cx.font='16px sans-serif';cx.fillText('새로고침으로 재시작',GW/2,GH/2+55);}
  // 사거리 미리보기
  if(!selTower&&hovCell&&!PATH_SET.has(hovCell[0]+','+hovCell[1])&&!towers.some(t=>t.col===hovCell[0]&&t.row===hovCell[1])){
    const r=TD[selType].lv[0].range*CS,px=hovCell[0]*CS+CS/2,py=hovCell[1]*CS+CS/2;
    cx.fillStyle=TD[selType].color+'15';cx.strokeStyle=TD[selType].color+'66';cx.lineWidth=1.5;
    cx.beginPath();cx.arc(px,py,r,0,Math.PI*2);cx.fill();cx.stroke();
    cx.fillStyle='rgba(255,255,255,.07)';cx.fillRect(hovCell[0]*CS,hovCell[1]*CS,CS,CS);
  }
  if(selTower){const lc=TD[selTower.type].color;cx.fillStyle=lc+'12';cx.strokeStyle=lc+'77';cx.lineWidth=2;cx.beginPath();cx.arc(selTower.px,selTower.py,selTower.rangePx,0,Math.PI*2);cx.fill();cx.stroke();}
}

// ==================== MAIN UPDATE ====================
function update(){
  if(gameOver||gameWon)return;
  frameN++;shakeX*=.68;shakeY*=.68;
  // Spawn
  for(let qi=spawnQueues.length-1;qi>=0;qi--){const sq=spawnQueues[qi];sq.tick++;while(sq.q.length>0&&sq.tick>=sq.q[0].delay){enemies.push(new Enemy(sq.q[0].type,sq.waveN));sq.q.shift();}if(sq.q.length===0)spawnQueues.splice(qi,1);}
  // Wave complete
  if(waveRunning&&spawnQueues.length===0&&enemies.filter(e=>!e.dead).length===0){
    waveRunning=false;const b=40+wave*12;gold+=b;toast(`✅ 웨이브 ${wave} 완료! +${b}💰`,'#2ecc71');sfxUI();if(wave>=20)gameWon=true;updateHUD();
  }
  // Enemies
  for(let i=enemies.length-1;i>=0;i--){
    if(enemies[i].dead){enemies.splice(i,1);continue;}
    const r=enemies[i].update();
    if(r==='leak'){lives--;addP(PATH[PATH.length-1][0]*CS,PATH[PATH.length-1][1]*CS,'#f55',14,5,4);enemies.splice(i,1);if(lives<=0){gameOver=true;updateHUD();return;}updateHUD();}
    else if(enemies[i]&&enemies[i].dead)enemies.splice(i,1);
  }
  updateTowers();
  for(let i=bullets.length-1;i>=0;i--){bullets[i].update();if(bullets[i].dead)bullets.splice(i,1);}
  updateWaveEffects();
  lightnings.forEach(l=>l.life--);lightnings=lightnings.filter(l=>l.life>0);
  effects.forEach(ef=>{ef.life-=ef.decay||.04;});effects=effects.filter(ef=>ef.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=.028;p.sz*=.95;});particles=particles.filter(p=>p.life>0);
}

function gameLoop(){
  for(let s=0;s<speedMult;s++)update();
  cx.save();if(Math.abs(shakeX)>.4){cx.translate(shakeX,shakeY);}
  cx.clearRect(-10,-10,GW+20,GH+20);
  drawBG();
  // 타워 그리기 (이펙트 아래)
  towers.forEach(drawTower);
  // 이펙트 (몬스터 아래)
  drawEffects();
  // 몬스터
  enemies.forEach(e=>{if(!e.dead)drawMonster(e);});
  // 파티클
  particles.forEach(p=>{cx.globalAlpha=p.life;cx.fillStyle=p.color;cx.beginPath();cx.arc(p.x,p.y,p.sz,0,Math.PI*2);cx.fill();});
  cx.globalAlpha=1;
  drawOverlays();
  cx.restore();
  requestAnimationFrame(gameLoop);
}

// ==================== INPUT ====================
cv.addEventListener('mousemove',e=>{const rect=cv.getBoundingClientRect();const mx=(e.clientX-rect.left)*(GW/rect.width),my=(e.clientY-rect.top)*(GH/rect.height);hovCell=my<GH?[Math.floor(mx/CS),Math.floor(my/CS)]:null;});
cv.addEventListener('mouseleave',()=>hovCell=null);
cv.addEventListener('click',e=>{
  const rect=cv.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(GW/rect.width),my=(e.clientY-rect.top)*(GH/rect.height);
  if(my<0||my>=GH)return;
  const col=Math.floor(mx/CS),row=Math.floor(my/CS);
  if(col<0||col>=COLS||row<0||row>=ROWS)return;
  const ex=towers.find(t=>t.col===col&&t.row===row);
  if(ex){setSelTower(selTower===ex?null:ex);sfxUI();return;}
  if(selTower){setSelTower(null);return;}
  if(PATH_SET.has(col+','+row)){toast('경로 위에는 설치 불가!','#e74c3c');return;}
  const cost=TD[selType].lv[0].cost;
  if(gold<cost){toast(`💰 골드 부족! (${cost} 필요)`,'#e74c3c');return;}
  if(wave<TD[selType].unlock&&selType>=3){toast(`🔒 웨이브 ${TD[selType].unlock} 이후 해금`,'#aaa');return;}
  gold-=cost;towers.push(new Tower(col,row,selType));toast(`${TD[selType].icon} 설치!`,'#2ecc71');sfxUI();updateHUD();
});
cv.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];cv.dispatchEvent(new MouseEvent('click',{clientX:t.clientX,clientY:t.clientY,bubbles:true}));},{passive:false});
document.addEventListener('keydown',e=>{if(e.code==='Space'){startWave(waveRunning);e.preventDefault();}if(e.code==='KeyQ')setSpeed(speedMult%4+1);if(e.code==='Escape')setSelTower(null);});

// ==================== INIT ====================
updateHUD();renderShop();gameLoop();
</script>
