body{background:#060c14;display:flex;flex-direction:column;align-items:center;font-family:'Segoe UI',sans-serif;color:#fff;padding:4px;}

<script>
// ===== EDM BATTLE MUSIC =====
let AC=null;
function gac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
const BPM=168,BEAT=60/BPM;
const MN={R:0,A2:110,B2:123,C3:131,D3:147,E3:165,F3:175,G3:196,A3:220,B3:247,
  C4:262,D4:294,E4:330,F4:349,G4:392,A4:440,B4:494,
  C5:523,D5:587,E5:659,F5:698,G5:784,A5:880,B5:988,C6:1047,E6:1319};
// EDM Lead
const ML=[[MN.A5,.25],[MN.A5,.25],[MN.E5,.5],[MN.A5,.25],[MN.G5,.25],[MN.E5,.5],
  [MN.D5,.25],[MN.E5,.25],[MN.F5,.5],[MN.E5,.25],[MN.D5,.25],[MN.C5,.5],
  [MN.E5,.25],[MN.C5,.25],[MN.A4,.5],[MN.C5,.25],[MN.D5,.25],[MN.E5,.5],
  [MN.F5,.5],[MN.E5,.5],[MN.D5,.5],[MN.C5,.5],
  [MN.A5,.5],[MN.G5,.25],[MN.F5,.25],[MN.E5,.5],[MN.D5,.25],[MN.C5,.25],
  [MN.B4,.5],[MN.A4,.5],[MN.G4,.25],[MN.A4,.25],[MN.B4,.5],
  [MN.C5,.5],[MN.E5,.5],[MN.A5,.75],[MN.G5,.25],
  [MN.F5,.5],[MN.E5,.5],[MN.D5,.5],[MN.E5,1]];
// Fast arpeggio (EDM feel)
const MA=[[MN.A4,.125],[MN.C5,.125],[MN.E5,.125],[MN.A5,.125],[MN.G5,.125],[MN.E5,.125],[MN.C5,.125],[MN.A4,.125],
  [MN.F4,.125],[MN.A4,.125],[MN.C5,.125],[MN.F5,.125],[MN.E5,.125],[MN.C5,.125],[MN.A4,.125],[MN.F4,.125],
  [MN.G4,.125],[MN.B4,.125],[MN.D5,.125],[MN.G5,.125],[MN.F5,.125],[MN.D5,.125],[MN.B4,.125],[MN.G4,.125],
  [MN.E4,.125],[MN.A4,.125],[MN.C5,.125],[MN.E5,.125],[MN.A5,.125],[MN.E5,.125],[MN.C5,.125],[MN.A4,.125]];
// Bass
const MB=[[MN.A2,.5],[MN.R,.25],[MN.A2,.25],[MN.G2,.25],[MN.A2,.25],
  [MN.F3,.5],[MN.R,.25],[MN.F3,.25],[MN.E3,.25],[MN.F3,.25],
  [MN.C3,.5],[MN.R,.25],[MN.C3,.25],[MN.B2,.25],[MN.C3,.25],
  [MN.G3,.5],[MN.R,.25],[MN.G3,.25],[MN.A3,.25],[MN.G3,.25]];
let mOn=false,mT=null,mN2=[0,0,0],mI=[0,0,0];
function asn(f,t,d,tp='square',v=.07){const c=gac();if(!f)return;const o=c.createOscillator(),g=c.createGain();o.type=tp;o.frequency.value=f;g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+d*.88);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+d);}
function adrm(t,type){const c=gac();const b=c.createBuffer(1,Math.floor(c.sampleRate*.1),c.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);const s=c.createBufferSource(),g=c.createGain(),f=c.createBiquadFilter();s.buffer=b;f.type=type==='kick'?'lowpass':type==='snare'?'bandpass':'highpass';f.frequency.value=type==='kick'?160:type==='snare'?2500:9000;g.gain.setValueAtTime(type==='kick'?.45:type==='snare'?.22:.09,t);g.gain.exponentialRampToValueAtTime(.001,t+.07);s.connect(f);f.connect(g);g.connect(c.destination);s.start(t);}
function schedMusic(){
  if(!mOn)return;const c=gac();
  while(mN2[0]<c.currentTime+.3){const[f,bs]=ML[mI[0]];asn(f,mN2[0],BEAT*bs*.88,'square',.08);mN2[0]+=BEAT*bs;mI[0]=(mI[0]+1)%ML.length;}
  while(mN2[1]<c.currentTime+.3){const[f,bs]=MA[mI[1]];asn(f,mN2[1],BEAT*bs*.7,'triangle',.04);mN2[1]+=BEAT*bs;mI[1]=(mI[1]+1)%MA.length;}
  while(mN2[2]<c.currentTime+.3){const[f,bs]=MB[mI[2]];asn(f,mN2[2],BEAT*bs*.88,'sawtooth',.07);mN2[2]+=BEAT*bs;mI[2]=(mI[2]+1)%MB.length;}
  const now=c.currentTime,hb=BEAT*.5;
  for(let i=0;i<8;i++){const t=Math.ceil(now/hb)*hb+i*hb;if(t>now+.05&&t<now+.3){if(i%4===0){adrm(t,'kick');adrm(t+BEAT*.25,'kick');}if(i%4===2)adrm(t,'snare');adrm(t,'hihat');}}
  mT=setTimeout(schedMusic,100);
}
function toggleMusic(){const btn=document.getElementById('music-btn');if(mOn){mOn=false;clearTimeout(mT);btn.textContent='🎵 켜기';}else{mOn=true;const c=gac();c.resume();mN2=[c.currentTime+.05,c.currentTime+.05,c.currentTime+.05];mI=[0,0,0];schedMusic();btn.textContent='🔇 끄기';}}
function sfxShoot(type){const c=gac();c.resume();const t=c.currentTime;const FX=[[660,.05,'square',.12],[880,.04,'square',.1,3],[100,.2,'sawtooth',.25],[1400,.08,'sine',.13],[400,.1,'sawtooth',.16],[250,.12,'sawtooth',.13],[100,.3,'sawtooth',.32],[200,.4,'sine',.19],[900,.04,'square',.1],[300,.08,'sawtooth',.14],[500,.06,'sine',.12],[660,.06,'triangle',.11]];const[f,d,tp,v,cn]=FX[type]||FX[0];if(type===1&&cn){for(let i=0;i<cn;i++)asn(f+i*80,t+i*.04,d,tp,v);}else{const o=c.createOscillator(),g=c.createGain();o.type=tp;o.frequency.value=f;if([4,5,7].includes(type)){const ff=[500,300,200][([4,5,7].indexOf(type))];o.frequency.setValueAtTime(ff,t);o.frequency.exponentialRampToValueAtTime(f*.2,t+d);}g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+d);}}
function sfxKill(big){const c=gac();c.resume();const t=c.currentTime;big?[180,140,100,60].forEach((f,i)=>asn(f,t+i*.08,.12,'sawtooth',.24)):asn(550,t,.06,'square',.14);}
function sfxUI(){const c=gac();c.resume();asn(660,c.currentTime,.06,'square',.1);}
function sfxUnlock(){const c=gac();c.resume();const t=c.currentTime;[440,550,660,880,1100].forEach((f,i)=>asn(f,t+i*.09,.1,'sine',.16));}

// ===== CONSTANTS =====

// Long winding path
const WPT=[[0,1],[5,1],[5,3],[9,3],[9,0],[15,0],[15,5],[10,5],[10,9],[16,9],[16,5],[22,5],[22,10],[27,10],[27,6],[29,6]];
function buildPath(){const cells=[],seen=new Set();for(let i=0;i<WPT.length-1;i++){const[c1,r1]=WPT[i],[c2,r2]=WPT[i+1];const dc=Math.sign(c2-c1),dr=Math.sign(r2-r1);let c=c1,r=r1;while(c!==c2||r!==r2){const k=c+','+r;if(!seen.has(k)){cells.push([c,r]);seen.add(k);}c+=dc;r+=dr;}}const[lc,lr]=WPT[WPT.length-1];if(!seen.has(lc+','+lr))cells.push([lc,lr]);return cells;}

function chapterOf(w){return w<=6?1:w<=12?2:w<=18?3:w<=24?4:5;}
function addP(x,y,color,n,spd,sz=3){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=(Math.random()*.8+.4)*spd;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color,sz:Math.random()*sz+1.5});}}

function renderShop(){

function setSelTower(t){

function upgSelTower(){if(!selTower||selTower.lv>=2)return;const c=selTower.data.upgCost;if(gold<c){toast('💰 골드 부족!','#e74c3c');return;}gold-=c;selTower.totalCost+=c;selTower.lv++;sfxUI();toast(`⬆ Lv.${selTower.lv+1}!`,'#2ecc71');setSelTower(selTower);updateHUD();}
function sellSelTower(){if(!selTower)return;gold+=selTower.sellVal;toast(`+${selTower.sellVal}💰`,'#ffd700');sfxUI();towers=towers.filter(t=>t!==selTower);setSelTower(null);updateHUD();}

function buildSpawnQueue(wi){const q=[];WAVES[wi].forEach(g=>{for(let i=0;i<g.n;i++)q.push({type:g.t,delay:g.iv*(i+1)});});q.sort((a,b)=>a.delay-b.delay);return q;}
function handleWaveBtn(){startWave(waveRunning);}
function startWave(early=false){
  if(wave>=30||gameOver||gameWon)return;
  try{gac().resume();}catch(e){}
  if(!waveRunning&&!early){
    wave++;spawnQueues.push({q:buildSpawnQueue(wave-1),tick:0,waveN:wave});waveRunning=true;
    toast(`🌊 웨이브 ${wave} — 챕터 ${chapterOf(wave)}`,'#4af');sfxUI();
    TD.filter(t=>t.unlock===wave).forEach(t=>setTimeout(()=>{toast(`🔓 해금: ${t.icon}${t.name}`,'#2ecc71');sfxUnlock();},600));
    [{w:7,g:70},{w:13,g:130},{w:19,g:190},{w:25,g:250}].filter(c=>c.w===wave).forEach(c=>setTimeout(()=>{gold+=c.g;toast(`🎖 챕터보너스 +${c.g}💰`);updateHUD();},1100));
  } else if(waveRunning&&wave<30){
    wave++;spawnQueues.push({q:buildSpawnQueue(wave-1),tick:0,waveN:wave});
    const b=20+wave*2;gold+=b;toast(`⚡ W${wave} 조기소환 +${b}💰`);sfxUI();
    TD.filter(t=>t.unlock===wave).forEach(t=>setTimeout(()=>{toast(`🔓 해금: ${t.icon}${t.name}`,'#2ecc71');sfxUnlock();},400));
  }
  updateHUD();
}

// ===== CLASSES =====
class Tower{
  constructor(col,row,type){this.col=col;this.row=row;this.type=type;this.lv=0;this.px=col*CS+CS/2;this.py=row*CS+CS/2;this.timer=0;this.angle=0;this.fireFlash=0;this.totalCost=TD[type].lv[0].cost;this.kills=0;}
  get data(){return TD[this.type].lv[this.lv];}
  get rangePx(){return this.data.range*CS;}
  get sellVal(){return Math.floor(this.totalCost*.65);}
}
class Enemy{
  constructor(type,waveN){
    const ed=ED[type];this.type=type;
    this.hp=Math.floor(ed.hp*(1+waveN*.13));this.maxHp=this.hp;
    this.spd=ed.spd;this.reward=Math.floor(ed.reward*(1+waveN*.05));this.armor=ed.armor||0;
    this.stealth=ed.stealth||false;this.split=ed.split||0;this.regen=ed.regen||0;
    this.isBoss=ed.isBoss||false;this.immuneSlow=ed.immuneSlow||false;
    this.progress=0;const[sc,sr]=PATH[0];this.x=sc*CS+CS/2;this.y=sr*CS+CS/2;
    this.slowT=0;this.burnT=0;this.burnDmg=0;this.burnTick=0;this.freezeT=0;this.dead=false;this.waveN=waveN;this.wobble=Math.random()*Math.PI*2;
  }
  get effectSpd(){if(this.freezeT>0)return this.spd*.04;if(!this.immuneSlow&&this.slowT>0)return this.spd*.38;return this.spd;}
  update(){
    if(this.dead)return false;
    this.progress+=this.effectSpd;this.wobble+=.1;
    const idx=Math.min(Math.floor(this.progress/CS),PATH.length-2);
    if(this.progress>=(PATH.length-1)*CS)return'leak';
    const[c1,r1]=PATH[idx],[c2,r2]=PATH[Math.min(idx+1,PATH.length-1)];
    const t=(this.progress%CS)/CS;this.x=(c1+(c2-c1)*t)*CS+CS/2;this.y=(r1+(r2-r1)*t)*CS+CS/2;
    if(this.slowT>0)this.slowT--;if(this.freezeT>0)this.freezeT--;
    if(this.burnT>0){this.burnTick++;if(this.burnTick>=7){this.hp-=this.burnDmg;this.burnTick=0;if(this.hp<=0){killEnemy(this);return false;}}this.burnT--;addP(this.x,this.y,'#f84',1,1.5,2);}
    if(this.regen>0&&this.hp<this.maxHp)this.hp=Math.min(this.maxHp,this.hp+this.regen);
    return false;
  }
}
class Bullet{
  constructor(sx,sy,target,dmg,opts,color){this.x=sx;this.y=sy;this.target=target;this.dmg=dmg;this.opts=opts;this.color=color;this.spd=9;this.dead=false;this.trail=[];}
  update(){
    if(!this.target||this.target.dead){this.dead=true;return;}
    this.trail.push({x:this.x,y:this.y,life:.7});if(this.trail.length>7)this.trail.shift();this.trail.forEach(p=>p.life-=.12);
    const dx=this.target.x-this.x,dy=this.target.y-this.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<this.spd+4){this.explode();return;}this.x+=dx/d*this.spd;this.y+=dy/d*this.spd;
  }
  explode(){
    this.dead=true;const tx=this.target.x,ty=this.target.y;
    if(this.opts.aoe>0){
      enemies.forEach(e=>{if(e.dead)return;const dx=e.x-tx,dy=e.y-ty;if(dx*dx+dy*dy<(this.opts.aoe*CS)**2)hitEnemy(e,this.dmg,this.opts);});
      addEffect('explosion',tx,ty,{radius:this.opts.aoe*CS,color:this.color,life:1,decay:.04});
      addP(tx,ty,this.color,32,7,7);addP(tx,ty,'#fff',12,4,3);shake(7);
    } else {
      hitEnemy(this.target,this.dmg,this.opts);addP(tx,ty,this.color,12,4,4);
      if(this.opts.chain){let src=this.target;for(let i=0;i<this.opts.chain;i++){let near=null,nd=Infinity;enemies.forEach(e=>{if(e.dead||e===src)return;const d2=Math.hypot(e.x-src.x,e.y-src.y);if(d2<180&&d2<nd){nd=d2;near=e;}});if(!near)break;lightnings.push({x1:src.x,y1:src.y,x2:near.x,y2:near.y,life:12,bright:i===0});hitEnemy(near,Math.floor(this.dmg*.55),this.opts);src=near;}}
      if(this.opts.slow&&!this.target.immuneSlow)addEffect('ice_burst',tx,ty,{life:1,decay:.06,color:'#74b9ff'});
      if(this.opts.burn)addEffect('flame_burst',tx,ty,{life:1,decay:.055,color:'#e67e22'});
    }
  }
}

function hitEnemy(e,dmg,opts={}){if(e.dead)return;const d=Math.max(1,Math.floor(dmg*(1-e.armor)));e.hp-=d;if(opts.slow&&!e.immuneSlow)e.slowT=Math.max(e.slowT,65);if(opts.freeze&&!e.immuneSlow){e.freezeT=Math.max(e.freezeT,90);addP(e.x,e.y,'#74b9ff',8,2.5,3);}if(opts.burn){e.burnT=Math.max(e.burnT,130);e.burnDmg=Math.floor(opts.burn/8);}addP(e.x,e.y,'#ff6',3,2,2.5);if(e.hp<=0)killEnemy(e);}
function killEnemy(e){if(e.dead)return;e.dead=true;gold+=e.reward;score+=e.reward*15;if(score>best){best=score;localStorage.setItem('best_td5',best);}sfxKill(e.isBoss);if(e.isBoss)shake(16);addP(e.x,e.y,'#ffd700',28,6,7);if(e.split>0&&e.maxHp>60){for(let i=0;i<e.split;i++){const ne=new Enemy(e.split===2?'zombie':'normal',Math.max(1,e.waveN-2));ne.hp=Math.floor(e.maxHp*.25);ne.maxHp=ne.hp;ne.progress=Math.max(0,e.progress-8+i*4);enemies.push(ne);}}}

// ===== TOWER FIRING =====
function updateTowers(){
  towers.forEach(t=>{
    t.timer++;t.fireFlash=Math.max(0,t.fireFlash-1);
    const d=t.data;if(t.timer<d.rate)return;
    let target=null,maxP=-Infinity;
    enemies.forEach(e=>{if(e.dead)return;const dx=e.x-t.px,dy=e.y-t.py;if(dx*dx+dy*dy<=t.rangePx**2&&e.progress>maxP){maxP=e.progress;target=e;}});
    if(!target)return;
    t.timer=0;t.fireFlash=14;t.kills++;t.angle=Math.atan2(target.y-t.py,target.x-t.px);
    sfxShoot(t.type);
    const spec=d.special,opts={aoe:d.aoe||0,slow:d.slow||0,freeze:spec==='freeze',burn:d.burn||0,chain:d.chain||0};
    if(spec==='meteor'||spec==='meteorstorm'){
      const cnt=spec==='meteorstorm'?3:1;
      for(let m=0;m<cnt;m++)setTimeout(()=>{const alive=enemies.filter(e=>!e.dead);if(!alive.length)return;const et=alive[Math.floor(Math.random()*Math.min(alive.length,5))];waveEffects.push({type:'meteor',x:et.x+Math.random()*50-25,y:-20,tx:et.x,ty:et.y,spd:15,dmg:d.dmg,aoe:d.aoe,life:80});},m*320);
    } else if(spec==='wave'||spec==='wave2'){
      const cnt=spec==='wave2'?2:1;for(let w2=0;w2<cnt;w2++)waveEffects.push({type:'wave',x:t.px,y:t.py+(w2-.5)*38,vx:8,dmg:d.dmg,life:140,hit:new Set(),color:'#a29bfe'});
    } else if(spec==='starburst'||spec==='starburst12'||spec==='starburst16'){
      const cnt=spec==='starburst16'?16:spec==='starburst12'?12:8;
      for(let si=0;si<cnt;si++){const a=si/cnt*Math.PI*2;const dummyTarget={x:t.px+Math.cos(a)*t.rangePx,y:t.py+Math.sin(a)*t.rangePx,dead:false,hp:999};const nearE=enemies.filter(e=>!e.dead).sort((a2,b2)=>Math.hypot(a2.x-t.px,a2.y-t.py)-Math.hypot(b2.x-t.px,b2.y-t.py));if(nearE.length){const b2=new Bullet(t.px,t.py,nearE[Math.floor(Math.random()*Math.min(nearE.length,4))],d.dmg,opts,TD[t.type].color);bullets.push(b2);}else bullets.push(new Bullet(t.px,t.py,dummyTarget,d.dmg,opts,TD[t.type].color));}
    } else if(spec==='tornado'){
      enemies.forEach(e=>{if(e.dead)return;const dx=e.x-t.px,dy=e.y-t.py;if(dx*dx+dy*dy<=t.rangePx**2)hitEnemy(e,d.dmg,opts);});
      addEffect('tornado_spin',t.px,t.py,{life:1,decay:.04,color:TD[t.type].color,range:t.rangePx});
    } else if(spec==='nuclear'){
      enemies.forEach(e=>{if(e.dead)return;const dx=e.x-t.px,dy=e.y-t.py;if(dx*dx+dy*dy<=(d.aoe*CS)**2)hitEnemy(e,d.dmg,opts);});
      addEffect('explosion',t.px,t.py,{radius:d.aoe*CS*1.3,color:TD[t.type].color,life:1,decay:.025});shake(10);
    } else if(spec==='triple'||spec==='penta'){
      const cnt=spec==='penta'?5:3;const sorted=[...enemies].filter(e=>!e.dead).sort((a2,b2)=>b2.progress-a2.progress);sorted.slice(0,cnt).forEach(e=>{if(Math.hypot(e.x-t.px,e.y-t.py)<t.rangePx*1.6)bullets.push(new Bullet(t.px,t.py,e,d.dmg,opts,TD[t.type].color));});
    } else if(spec==='snipe'){
      // Pierce through all in line
      bullets.push(new Bullet(t.px,t.py,target,d.dmg,{...opts,pierce:true},TD[t.type].color));
      lightnings.push({x1:t.px,y1:t.py,x2:target.x,y2:target.y,life:8,laser:true,color:TD[t.type].color});
    } else {
      bullets.push(new Bullet(t.px,t.py,target,d.dmg,opts,TD[t.type].color));
    }
    if(t.type===0)lightnings.push({x1:t.px,y1:t.py,x2:target.x,y2:target.y,life:5,laser:true,color:'#4af'});
  });
}
function updateWaveEffects(){for(let i=waveEffects.length-1;i>=0;i--){const ef=waveEffects[i];ef.life--;if(ef.type==='meteor'){ef.y+=ef.spd;if(ef.y>=ef.ty){enemies.forEach(e=>{if(e.dead)return;const dx=e.x-ef.tx,dy=e.y-ef.ty;if(dx*dx+dy*dy<(ef.aoe*CS)**2)hitEnemy(e,ef.dmg,{aoe:ef.aoe});});addEffect('explosion',ef.tx,ef.ty,{radius:ef.aoe*CS*1.3,color:'#ff6b35',life:1,decay:.032});addP(ef.tx,ef.ty,'#ff6b35',40,9,8);shake(12);waveEffects.splice(i,1);continue;}}else if(ef.type==='wave'){ef.x+=ef.vx;enemies.forEach(e=>{if(e.dead||ef.hit.has(e))return;if(Math.abs(e.x-ef.x)<30&&Math.abs(e.y-ef.y)<58){hitEnemy(e,ef.dmg,{});ef.hit.add(e);}});if(ef.x>GW+70){waveEffects.splice(i,1);continue;}}if(ef.life<=0)waveEffects.splice(i,1);}}

// ===== MONSTER DRAWING (canvas art) =====
function drawMonster(e){
  cx.save();cx.translate(e.x,e.y);
  const a=e.stealth?.48:1;cx.globalAlpha=a;
  const ed=ED[e.type];const r=ed.size||13;
  if(e.freezeT>0){cx.fillStyle='rgba(100,200,255,.4)';cx.beginPath();cx.arc(0,0,r+7,0,Math.PI*2);cx.fill();}
  if(e.slowT>0){cx.strokeStyle='rgba(100,180,255,.45)';cx.lineWidth=2;cx.setLineDash([4,4]);cx.beginPath();cx.arc(0,0,r+5,0,Math.PI*2);cx.stroke();cx.setLineDash([]);}
  const w=Math.sin(e.wobble)*.3;
  switch(e.type){
    case 'normal':
      cx.fillStyle='#27ae60';cx.beginPath();cx.ellipse(0,0,r,r*.85,w,0,Math.PI*2);cx.fill();
      cx.fillStyle='#2ecc71';cx.beginPath();cx.ellipse(0,-r*.25,r*.88,r*.52,w,0,Math.PI*2);cx.fill();
      cx.fillStyle='#fff';cx.beginPath();cx.arc(-r*.35,-r*.18,r*.3,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(r*.35,-r*.18,r*.3,0,Math.PI*2);cx.fill();
      cx.fillStyle='#111';cx.beginPath();cx.arc(-r*.35,-r*.18,r*.16,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(r*.35,-r*.18,r*.16,0,Math.PI*2);cx.fill();
      cx.strokeStyle='#27ae60';cx.lineWidth=1.5;cx.beginPath();cx.moveTo(-r*.2,-r);cx.lineTo(-r*.3,-r*1.6);cx.stroke();cx.beginPath();cx.moveTo(r*.2,-r);cx.lineTo(r*.3,-r*1.6);cx.stroke();
      cx.fillStyle='#f1c40f';cx.beginPath();cx.arc(-r*.3,-r*1.6,r*.22,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(r*.3,-r*1.6,r*.22,0,Math.PI*2);cx.fill();break;
    case 'fast':
      cx.fillStyle='#e74c3c';cx.beginPath();cx.moveTo(0,-r);cx.lineTo(r*.85,r*.35);cx.lineTo(0,r*.75);cx.lineTo(-r*.85,r*.35);cx.closePath();cx.fill();
      cx.fillStyle='#ff6b6b';cx.beginPath();cx.arc(0,-r*.15,r*.42,0,Math.PI*2);cx.fill();
      cx.fillStyle='#fff';cx.beginPath();cx.arc(-r*.16,-r*.2,r*.2,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(r*.16,-r*.2,r*.2,0,Math.PI*2);cx.fill();
      cx.fillStyle='#333';cx.beginPath();cx.arc(-r*.16,-r*.2,r*.11,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(r*.16,-r*.2,r*.11,0,Math.PI*2);cx.fill();
      cx.strokeStyle='rgba(255,220,0,.55)';cx.lineWidth=1.5;[-r*1.5,-r*1.15,-r*.8].forEach(ox=>{cx.beginPath();cx.moveTo(ox,-r*.25);cx.lineTo(ox-r*.45,r*.15);cx.stroke();});break;
    case 'armored':
      cx.fillStyle='#7f8c8d';cx.fillRect(-r,-r,r*2,r*2);cx.fillStyle='#95a5a6';cx.fillRect(-r*.72,-r*.72,r*1.44,r*1.44);cx.strokeStyle='#5d6d7e';cx.lineWidth=2;cx.strokeRect(-r,-r,r*2,r*2);
      cx.fillStyle='#e74c3c';cx.fillRect(-r*.55,-r*.18,r*1.1,r*.36);cx.fillStyle='#c0392b';cx.fillRect(-r*.32,-r*.12,r*.64,r*.24);

function drawTowerBody(t){

  cx.strokeStyle=selTower===t?lc:lc+'55';cx.lineWidth=selTower===t?2.5:1.5;cx.strokeRect(x+2,y+2,CS-4,CS-4);cx.shadowBlur=0;
  cx.save();cx.translate(t.px,t.py);if([0,4,5].includes(t.type))cx.rotate(t.angle);

function drawEffects(){
  effects.forEach(ef=>{
    if(ef.type==='explosion'){const r=ef.radius*(2-ef.life)*ef.life*2;cx.strokeStyle=ef.color;cx.lineWidth=3*ef.life;cx.globalAlpha=ef.life*.75;cx.beginPath();cx.arc(ef.x,ef.y,r,0,Math.PI*2);cx.stroke();cx.fillStyle=ef.color;cx.globalAlpha=ef.life*.28;cx.beginPath();cx.arc(ef.x,ef.y,r*.58,0,Math.PI*2);cx.fill();cx.globalAlpha=1;}

    else if(ef.type==='flame_burst'){for(let i=0;i<9;i++){const a=i/9*Math.PI*2,d=(1-ef.life)*22;cx.fillStyle=`hsl(${20+ef.life*25},100%,62%)`;cx.globalAlpha=ef.life*.85;cx.beginPath();cx.arc(ef.x+Math.cos(a)*d,ef.y+Math.sin(a)*d,5*ef.life,0,Math.PI*2);cx.fill();}cx.globalAlpha=1;}
    else if(ef.type==='tornado_spin'){cx.strokeStyle=ef.color;cx.lineWidth=2;cx.globalAlpha=ef.life*.6;for(let i=0;i<12;i++){const a=i/12*Math.PI*2+frameN*.15,r2=ef.range*.6*(1-ef.life*.3);cx.beginPath();cx.arc(ef.x,ef.y,r2,a,a+.4);cx.stroke();}cx.globalAlpha=1;}
  });
  lightnings.forEach(l=>{cx.save();cx.strokeStyle=l.laser?`rgba(100,180,255,${l.life/12*.9})`:`rgba(255,220,0,${l.life/12*.85})`;cx.lineWidth=l.laser?3:l.bright?3:2;cx.shadowBlur=l.laser?14:9;cx.shadowColor=l.laser?'#4af':'#ffd700';cx.beginPath();cx.moveTo(l.x1,l.y1);const steps=6,dx=(l.x2-l.x1)/steps,dy=(l.y2-l.y1)/steps;for(let i=1;i<steps;i++)cx.lineTo(l.x1+dx*i+(Math.random()-.5)*15,l.y1+dy*i+(Math.random()-.5)*15);cx.lineTo(l.x2,l.y2);cx.stroke();cx.restore();});
  bullets.forEach(b=>{b.trail.forEach(p=>{cx.globalAlpha=p.life*.5;cx.fillStyle=b.color;cx.beginPath();cx.arc(p.x,p.y,3,0,Math.PI*2);cx.fill();});cx.globalAlpha=1;cx.fillStyle=b.color;cx.shadowBlur=11;cx.shadowColor=b.color;cx.beginPath();cx.arc(b.x,b.y,b.opts.aoe>0?8:4.5,0,Math.PI*2);cx.fill();cx.shadowBlur=0;});
  waveEffects.forEach(ef=>{if(ef.type==='meteor'){cx.save();cx.translate(ef.x,ef.y);cx.rotate(Math.PI/3);cx.fillStyle='#ff6b35';cx.beginPath();cx.arc(0,0,16,0,Math.PI*2);cx.fill();cx.fillStyle='#fff';cx.beginPath();cx.arc(-5,-5,6,0,Math.PI*2);cx.fill();for(let i=1;i<=7;i++){cx.fillStyle=`rgba(255,100,30,${.7-i*.09})`;cx.fillRect(-3,i*11,6,9);}cx.restore();}else if(ef.type==='wave'){cx.fillStyle=`rgba(162,155,254,${ef.life/140*.58})`;cx.shadowBlur=14;cx.shadowColor='#a29bfe';cx.beginPath();cx.ellipse(ef.x,ef.y,34,58,0,0,Math.PI*2);cx.fill();cx.shadowBlur=0;}});
}
function drawOverlays(){

// ===== UPDATE =====
function update(){
  if(gameOver||gameWon)return;
  frameN++;shakeX*=.68;shakeY*=.68;
  for(let qi=spawnQueues.length-1;qi>=0;qi--){const sq=spawnQueues[qi];sq.tick++;while(sq.q.length>0&&sq.tick>=sq.q[0].delay){enemies.push(new Enemy(sq.q[0].type,sq.waveN));sq.q.shift();}if(sq.q.length===0)spawnQueues.splice(qi,1);}
  if(waveRunning&&spawnQueues.length===0&&enemies.filter(e=>!e.dead).length===0){waveRunning=false;const b=40+wave*14;gold+=b;toast(`✅ 웨이브 ${wave} 완료! +${b}💰`,'#2ecc71');sfxUI();if(wave>=30)gameWon=true;updateHUD();}
  for(let i=enemies.length-1;i>=0;i--){if(enemies[i].dead){enemies.splice(i,1);continue;}const r=enemies[i].update();if(r==='leak'){lives--;addP(PATH[PATH.length-1][0]*CS,PATH[PATH.length-1][1]*CS,'#f55',16,5,5);enemies.splice(i,1);if(lives<=0){gameOver=true;updateHUD();return;}updateHUD();}else if(enemies[i]&&enemies[i].dead)enemies.splice(i,1);}
  updateTowers();
  for(let i=bullets.length-1;i>=0;i--){bullets[i].update();if(bullets[i].dead)bullets.splice(i,1);}
  updateWaveEffects();
  lightnings.forEach(l=>l.life--);lightnings=lightnings.filter(l=>l.life>0);
  effects.forEach(ef=>{ef.life-=ef.decay||.04;});effects=effects.filter(ef=>ef.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=.026;p.sz*=.96;});particles=particles.filter(p=>p.life>0);
}
function gameLoop(){
  for(let s=0;s<speedMult;s++)update();
  cx.save();if(Math.abs(shakeX)>.4)cx.translate(shakeX,shakeY);
  cx.clearRect(-12,-12,GW+24,GH+24);
  drawBG();towers.forEach(drawTowerBody);drawEffects();enemies.forEach(e=>{if(!e.dead)drawMonster(e);});
  particles.forEach(p=>{cx.globalAlpha=p.life;cx.fillStyle=p.color;cx.beginPath();cx.arc(p.x,p.y,p.sz,0,Math.PI*2);cx.fill();});cx.globalAlpha=1;
  drawOverlays();cx.restore();requestAnimationFrame(gameLoop);
}

cv.addEventListener('mousemove',e=>{const rect=cv.getBoundingClientRect();const mx=(e.clientX-rect.left)*(GW/rect.width),my=(e.clientY-rect.top)*(GH/rect.height);hovCell=my<GH?[Math.floor(mx/CS),Math.floor(my/CS)]:null;});

cv.addEventListener('click',e=>{
  const rect=cv.getBoundingClientRect();const mx=(e.clientX-rect.left)*(GW/rect.width),my=(e.clientY-rect.top)*(GH/rect.height);
  if(my<0||my>=GH)return;
  const col=Math.floor(mx/CS),row=Math.floor(my/CS);if(col<0||col>=COLS||row<0||row>=ROWS)return;
  const ex=towers.find(t=>t.col===col&&t.row===row);
  if(ex){setSelTower(selTower===ex?null:ex);sfxUI();return;}
  if(selTower){setSelTower(null);return;}
  if(PATH_SET.has(col+','+row)){toast('경로 위 설치 불가!','#e74c3c');return;}
  const cost=TD[selType].lv[0].cost;if(gold<cost){toast(`💰 골드 부족 (${cost} 필요)`,'#e74c3c');return;}
  if(wave<TD[selType].unlock&&selType>=3){toast(`🔒 웨이브 ${TD[selType].unlock} 이후 해금`,'#aaa');return;}
  gold-=cost;towers.push(new Tower(col,row,selType));toast(`${TD[selType].icon} 설치!`,'#2ecc71');sfxUI();updateHUD();
});
cv.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];cv.dispatchEvent(new MouseEvent('click',{clientX:t.clientX,clientY:t.clientY,bubbles:true}));},{passive:false});
document.addEventListener('keydown',e=>{if(e.code==='Space'){startWave(waveRunning);e.preventDefault();}if(e.code==='KeyQ')setSpeed(speedMult%4+1);if(e.code==='Escape')setSelTower(null);});

updateHUD();renderShop();gameLoop();
</script>
</body>
</html>
