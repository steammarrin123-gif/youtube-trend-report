const BN={R:0,C3:131,D3:147,E3:165,G3:196,A3:220,B3:247,C4:262,D4:294,E4:330,F4:349,G4:392,A4:440,B4:494,C5:523,D5:587,E5:659,G5:784,A5:880};
const BGM_LEAD=[[BN.E5,.5],[BN.D5,.25],[BN.E5,.25],[BN.C5,.5],[BN.E5,.5],[BN.G5,1],[BN.R,.25],[BN.A5,.25],[BN.G5,.25],[BN.E5,.25],[BN.D5,.5],[BN.C5,.25],[BN.D5,.25],[BN.B4,.5],[BN.D5,.5],[BN.E5,1],[BN.R,.5],[BN.C5,.5],[BN.E5,.5],[BN.G5,.5],[BN.A5,.5],[BN.G5,.25],[BN.F5||(BN.E5*1.06),.25],[BN.E5,.5],[BN.C5,.25],[BN.D5,.25],[BN.B4,1],[BN.R,.5]];
const BGM_BASS=[[BN.C3,.5],[BN.G3,.5],[BN.C4,.5],[BN.G3,.5],[BN.A3,.5],[BN.E3,.5],[BN.G3,.5],[BN.C3,.5]];
let mOn=false,mT=null,mN=[0,0],mI=[0,0];

function asn(f,t,d,tp='square',v=.07){const c=gac();if(!f)return;const o=c.createOscillator(),g=c.createGain();o.type=tp;o.frequency.value=f;g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+d*.88);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+d);}
function adrm(t,k){const c=gac();const b=c.createBuffer(1,Math.floor(c.sampleRate*.12),c.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);const s=c.createBufferSource(),g=c.createGain(),f=c.createBiquadFilter();s.buffer=b;f.type=k?'lowpass':'highpass';f.frequency.value=k?180:5500;g.gain.setValueAtTime(k?.4:.14,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);s.connect(f);f.connect(g);g.connect(c.destination);s.start(t);}
function schedBGM(){if(!mOn)return;const c=gac(),b=60/132;while(mN[0]<c.currentTime+.3){const[f,bs]=BGM_LEAD[mI[0]];asn(f,mN[0],b*bs*.9);mN[0]+=b*bs;mI[0]=(mI[0]+1)%BGM_LEAD.length;}while(mN[1]<c.currentTime+.3){const[f,bs]=BGM_BASS[mI[1]];asn(f,mN[1],b*bs*.9,'square',.05);mN[1]+=b*bs;mI[1]=(mI[1]+1)%BGM_BASS.length;}const now=c.currentTime,b2=60/132;for(let i=0;i<4;i++){const t=Math.ceil(now/b2)*b2+i*b2;if(t>now+.05&&t<now+.3){adrm(t,true);if(i%2===1)adrm(t+b2*.5,false);}}mT=setTimeout(schedBGM,100);}
function toggleMusic(){const btn=document.getElementById('music-btn');if(mOn){mOn=false;clearTimeout(mT);btn.textContent='🎵 켜기';}else{mOn=true;const c=gac();c.resume();mN=[c.currentTime+.1,c.currentTime+.1];mI=[0,0];schedBGM();btn.textContent='🔇 끄기';}}

// Per-tower SFX
function sfxShoot(type,lv){
  const c=gac();c.resume();
  const t=c.currentTime;
  switch(type){
    case 0: asn(660+lv*80,t,.05,'square',.12); break; // 기본: 레이저
    case 1: for(let i=0;i<=lv;i++)asn(880+i*100,t+i*.04,.04,'square',.1); break; // 궁수: 연속
    case 2: asn(80,t,.18,'sawtooth',.25);asn(60,t+.05,.14,'sawtooth',.2); break; // 폭탄: 폭발
    case 3: asn(1400,t,.08,'sine',.12);asn(1800,t+.03,.06,'sine',.1); break; // 얼음: 크리스탈
    case 4:{const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.setValueAtTime(500,t);o.frequency.exponentialRampToValueAtTime(100,t+.1);g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.1);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.1);break;} // 전기: 지직
    case 5:{const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.setValueAtTime(300,t);o.frequency.linearRampToValueAtTime(150,t+.12);g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.12);break;} // 화염: 쉬익
    case 6:{asn(100,t,.3,'sawtooth',.3);asn(60,t+.1,.25,'sawtooth',.25);setTimeout(()=>{asn(40,t+.2,.2,'sawtooth',.35);},0);break;} // 운석: 쾅
    case 7:{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(200,t);o.frequency.linearRampToValueAtTime(80,t+.4);g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.4);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.4);break;} // 파동포: 웅웅
  }
}

const WPT=[[0,2],[4,2],[4,0],[8,0],[8,4],[4,4],[4,7],[10,7],[10,3],[14,3],[14,8],[19,8]];
function buildPath(){
  const cells=[],seen=new Set();
  for(let i=0;i<WPT.length-1;i++){
    const[c1,r1]=WPT[i],[c2,r2]=WPT[i+1];
    const dc=Math.sign(c2-c1),dr=Math.sign(r2-r1);
    let c=c1,r=r1;
    while(c!==c2||r!==r2){const k=c+','+r;if(!seen.has(k)){cells.push([c,r]);seen.add(k);}c+=dc;r+=dr;}
  }
  const[lc,lr]=WPT[WPT.length-1];if(!seen.has(lc+','+lr))cells.push([lc,lr]);
  return cells;
}

// ===========================
//  WAVE MANAGEMENT
// ===========================
function buildSpawnQueue(waveIdx){
  const q=[];
  WAVES[waveIdx].forEach(g=>{
    for(let i=0;i<g.n;i++){
      const delay=g.iv*(i+1)+(q.length>0?Math.max(...q.map(x=>x.delay)):0);
      q.push({type:g.t,delay});
    }
  });
  q.sort((a,b)=>a.delay-b.delay);
  return q;
}

function startWave(early=false){
  if(wave>=20||gameOver||gameWon)return;
  if(!waveRunning&&!early){
    wave++;
    spawnQueues.push({q:buildSpawnQueue(wave-1),tick:0,waveN:wave});
    waveRunning=true;
    const ch=chapterOf(wave);
    showInfo('웨이브 '+wave+' 시작! (챕터 '+ch+')',90,'#4af');
    sfxUI();
  } else if(waveRunning&&wave<20){
    // Early call - queue next wave
    wave++;
    spawnQueues.push({q:buildSpawnQueue(wave-1),tick:0,waveN:wave});
    const bonus=20+wave*2;gold+=bonus;
    showInfo('⚡ 웨이브 '+wave+' 조기 소환! +'+bonus+'💰',100,'#ffd700');
    sfxUI();
  }
  // Check unlocks
  const unlockedTowers=TD.filter(t=>t.unlock===wave);
  if(unlockedTowers.length>0){
    setTimeout(()=>{showInfo('🔓 신규 타워 해금: '+unlockedTowers.map(t=>t.icon+t.name).join(', '),150,'#2ecc71');sfxUnlock();},500);
  }
  // Chapter bonus
  const cap=CHAPS.find(c=>c.w===wave);
  if(cap&&cap.gold>0){setTimeout(()=>{gold+=cap.gold;showInfo('🎖️ 챕터 클리어 보너스! +'+cap.gold+'💰',120,'#ffd700');},1000);}
}

  get rangePx(){return this.data.range*CS;}
  get sellVal(){return Math.floor(this.totalCost*.65);}
  upgrade(){if(this.lv>=2||gold<this.data.upgCost)return false;gold-=this.data.upgCost;this.totalCost+=this.data.upgCost;this.lv++;sfxUI();showInfo('⬆ '+TD[this.type].name+' Lv.'+(this.lv+1)+' 완료!',70,'#2ecc71');return true;}
  sell(){const v=this.sellVal;gold+=v;sfxUI();showInfo('💰 판매 +'+v,50);return v;}
}

// ===========================
//  ENEMY CLASS
// ===========================
class Enemy{
  constructor(type,waveN){
    const ed=ED[type];
    this.type=type;this.icon=ed.icon;
    this.hp=Math.floor(ed.baseHp*(1+waveN*.13));this.maxHp=this.hp;
    this.spd=ed.spd;this.reward=Math.floor(ed.reward*(1+waveN*.05));
    this.armor=ed.armor||0;this.stealth=ed.stealth||false;
    this.split=ed.split||0;this.regen=ed.regen||0;
    this.isBoss=ed.isBoss||false;this.immuneSlow=ed.immuneSlow||false;
    this.progress=0;this.pathLen=PATH.length;
    const[sc,sr]=PATH[0];this.x=sc*CS+CS/2;this.y=sr*CS+CS/2;
    this.slowT=0;this.burnT=0;this.burnDmg=0;this.burnTick=0;this.freezeT=0;
    this.dead=false;this.waveN=waveN;
  }
  get effectSpd(){if(this.freezeT>0)return this.spd*.04;if(!this.immuneSlow&&this.slowT>0)return this.spd*.38;return this.spd;}
  update(){
    if(this.dead)return false;
    this.progress+=this.effectSpd;
    const traveled=this.progress;let idx=Math.floor(traveled/CS);
    if(idx>=PATH.length-1)return'leak';
    const[c1,r1]=PATH[idx],[c2,r2]=PATH[Math.min(idx+1,PATH.length-1)];
    const t=(traveled%CS)/CS;
    this.x=(c1+(c2-c1)*t)*CS+CS/2;this.y=(r1+(r2-r1)*t)*CS+CS/2;
    if(this.slowT>0)this.slowT--;if(this.freezeT>0)this.freezeT--;
    if(this.burnT>0){this.burnTick++;if(this.burnTick>=7){this.hp-=this.burnDmg;this.burnTick=0;if(this.hp<=0){killEnemy(this);return false;}}this.burnT--;addP(this.x,this.y,'#f84',1,1.5,2);}
    if(this.regen>0&&this.hp<this.maxHp)this.hp=Math.min(this.maxHp,this.hp+this.regen);
    return false;
  }
}

// ===========================
//  ENEMY HIT & KILL
// ===========================
function hitEnemy(e,dmg,opts={}){
  if(e.dead)return;
  const d=Math.max(1,Math.floor(dmg*(1-e.armor)));e.hp-=d;
  if(opts.slow&&!e.immuneSlow){e.slowT=Math.max(e.slowT,65);}
  if(opts.freeze&&!e.immuneSlow){e.freezeT=Math.max(e.freezeT,90);addP(e.x,e.y,'#74b9ff',6,2.5,3);}
  if(opts.burn){e.burnT=Math.max(e.burnT,130);e.burnDmg=Math.floor(opts.burn/8);}
  addP(e.x,e.y,'#ff6',3,2,2.5);
  if(e.hp<=0)killEnemy(e);
}
function killEnemy(e){
  if(e.dead)return;e.dead=true;
  gold+=e.reward;score+=e.reward*15;
  if(score>best){best=score;localStorage.setItem('best_td3',best);}
  sfxKill(e.isBoss);
  if(e.isBoss)shake(12);
  addP(e.x,e.y,'#ffd700',20,5,5);
  if(e.split>0&&e.maxHp>60){
    for(let i=0;i<e.split;i++){
      const ne=new Enemy(e.split===2?'zombie':'normal',Math.max(1,e.waveN-2));
      ne.hp=Math.floor(e.maxHp*.25);ne.maxHp=ne.hp;
      ne.progress=Math.max(0,e.progress-10+i*5);
      enemies.push(ne);
    }
  }
}

// ===========================
//  BULLET CLASS
// ===========================
class Bullet{
  constructor(sx,sy,target,dmg,opts,color){
    this.x=sx;this.y=sy;this.target=target;
    this.dmg=dmg;this.opts=opts;this.color=color;
    this.spd=8;this.dead=false;
  }
  update(){
    if(!this.target||this.target.dead){this.dead=true;return;}
    const dx=this.target.x-this.x,dy=this.target.y-this.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<this.spd+3){this.explode();return;}
    this.x+=dx/d*this.spd;this.y+=dy/d*this.spd;
  }
  explode(){
    this.dead=true;
    const tx=this.target.x,ty=this.target.y;
    if(this.opts.aoe){
      enemies.forEach(e=>{if(e.dead)return;const dx=e.x-tx,dy=e.y-ty;if(dx*dx+dy*dy<(this.opts.aoe*CS)**2)hitEnemy(e,this.dmg,this.opts);});
      addP(tx,ty,this.color,25,5,6);sfxShoot(2,0);
    } else {
      hitEnemy(this.target,this.dmg,this.opts);addP(tx,ty,this.color,8,3,3);
      if(this.opts.chain){
        let src=this.target;
        for(let i=0;i<this.opts.chain;i++){
          let nearest=null,nd=Infinity;
          enemies.forEach(e=>{if(e.dead||e===src)return;const d2=Math.hypot(e.x-src.x,e.y-src.y);if(d2<160&&d2<nd){nd=d2;nearest=e;}});
          if(!nearest)break;
          lightnings.push({x1:src.x,y1:src.y,x2:nearest.x,y2:nearest.y,life:10});
          hitEnemy(nearest,Math.floor(this.dmg*.55),this.opts);src=nearest;
        }
      }
    }
  }
}

// ===========================
//  TOWER FIRING
// ===========================
function updateTowers(){
  towers.forEach(t=>{
    t.timer++;t.fireFlash=Math.max(0,t.fireFlash-1);
    const d=t.data;if(t.timer<d.rate)return;
    let target=null,maxP=-Infinity;
    enemies.forEach(e=>{if(e.dead)return;const dx=e.x-t.px,dy=e.y-t.py;if(dx*dx+dy*dy<=t.rangePx**2&&e.progress>maxP){maxP=e.progress;target=e;}});
    if(!target)return;
    t.timer=0;t.fireFlash=10;t.kills++;
    t.angle=Math.atan2(target.y-t.py,target.x-t.px);
    sfxShoot(t.type,t.lv);
    const spec=d.special,opts={aoe:d.aoe||0,slow:d.slow||0,freeze:spec==='freeze',burn:d.burn||0,chain:d.chain||0};
    if(spec==='meteor'||spec==='meteorstorm'){
      const cnt=spec==='meteorstorm'?3:1;
      for(let m=0;m<cnt;m++){
        setTimeout(()=>{
          // Pick random enemy on path
          const alive=enemies.filter(e=>!e.dead);if(!alive.length)return;
          const et=alive[Math.floor(Math.random()*Math.min(alive.length,5))];
          waveEffects.push({type:'meteor',x:et.x,y:-30,tx:et.x,ty:et.y,speed:12,dmg:d.dmg,aoe:d.aoe,color:'#ff6b35',life:60});
          addP(et.x+Math.random()*40-20,-10,'#f84',5,3,3);
        },m*400);
      }
    } else if(spec==='wave'||spec==='wave2'){
      const cnt=spec==='wave2'?2:1;
      for(let w2=0;w2<cnt;w2++){
        waveEffects.push({type:'wave',x:t.px,y:t.py+(w2-.5)*30,vx:7,dmg:d.dmg,life:120,hit:new Set(),color:'#a29bfe'});
      }
    } else if(spec==='triple'||spec==='penta'){
      const cnt=spec==='penta'?5:3;
      const sorted=[...enemies].filter(e=>!e.dead).sort((a,b)=>b.progress-a.progress);
      sorted.slice(0,cnt).forEach(e=>{const dx2=e.x-t.px,dy2=e.y-t.py;if(dx2*dx2+dy2*dy2<(t.rangePx*1.6)**2)bullets.push(new Bullet(t.px,t.py,e,d.dmg,opts,TD[t.type].color));});
    } else {
      bullets.push(new Bullet(t.px,t.py,target,d.dmg,opts,TD[t.type].color));
    }
  });
}

// Wave effects update
function updateWaveEffects(){
  for(let i=waveEffects.length-1;i>=0;i--){
    const ef=waveEffects[i];
    ef.life--;
    if(ef.type==='meteor'){
      ef.y+=ef.speed;
      if(ef.y>=ef.ty){
        enemies.forEach(e=>{if(e.dead)return;const dx=e.x-ef.tx,dy=e.y-ef.ty;if(dx*dx+dy*dy<(ef.aoe*CS)**2)hitEnemy(e,ef.dmg,{aoe:ef.aoe});});
        addP(ef.tx,ef.ty,'#ff6b35',30,6,7);shake(8);sfxShoot(6,0);
        waveEffects.splice(i,1);continue;
      }
    } else if(ef.type==='wave'){
      ef.x+=ef.vx;
      enemies.forEach(e=>{if(e.dead||ef.hit.has(e))return;if(Math.abs(e.x-ef.x)<25&&Math.abs(e.y-ef.y)<50){hitEnemy(e,ef.dmg,{});ef.hit.add(e);}});
      if(ef.x>GW+50){waveEffects.splice(i,1);continue;}
    }
    if(ef.life<=0)waveEffects.splice(i,1);
  }
}

  // Trees (background decoration)
  for(let i=0;i<12;i++){
    const tx=i*70+20,th=30+i%4*10;
    cx.fillStyle='#0d220d';cx.fillRect(tx-4,GH-th-10,8,th);
    cx.fillStyle='#1a3a1a';cx.beginPath();cx.moveTo(tx-14,GH-th-8);cx.lineTo(tx,GH-th-35);cx.lineTo(tx+14,GH-th-8);cx.closePath();cx.fill();
  }
  // Grid cells
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(!PATH_SET.has(c+','+r)){
      cx.fillStyle=`hsl(${120+((c*3+r*7)%20)},${25+((c+r)%3)*5}%,${8+(c+r)%3*2}%)`;
      cx.fillRect(c*CS,r*CS,CS,CS);
      cx.strokeStyle='rgba(0,0,0,.2)';cx.lineWidth=.5;cx.strokeRect(c*CS,r*CS,CS,CS);
    }
  }
  // Path with texture
  PATH.forEach(([c,r],i)=>{
    cx.fillStyle=`hsl(30,${30+i%4*3}%,${22+i%3*3}%)`;cx.fillRect(c*CS,r*CS,CS,CS);
    cx.fillStyle='rgba(0,0,0,.15)';cx.fillRect(c*CS+3,r*CS+3,CS-6,CS-6);
  });
  // Path arrows
  cx.fillStyle='rgba(255,210,120,.18)';cx.font='14px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
  for(let i=0;i<PATH.length-1;i+=2){
    const[c1,r1]=PATH[i],[c2,r2]=PATH[i+1];
    cx.fillText(c2>c1?'→':c2<c1?'←':r2>r1?'↓':'↑',c1*CS+CS/2,r1*CS+CS/2);
  }
  const[sc,sr]=PATH[0],[ec,er]=PATH[PATH.length-1];
  cx.fillStyle='rgba(0,255,100,.3)';cx.fillRect(sc*CS,sr*CS,CS,CS);
  cx.fillStyle='rgba(255,50,50,.3)';cx.fillRect(ec*CS,er*CS,CS,CS);
  cx.fillStyle='#fff';cx.font='bold 9px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText('IN',sc*CS+CS/2,sr*CS+CS/2);cx.fillText('OUT',ec*CS+CS/2,er*CS+CS/2);
}

function drawTowers(){
  // Range preview (placing)
  if(!selTower&&hovCell&&!PATH_SET.has(hovCell[0]+','+hovCell[1])&&!towers.some(t=>t.col===hovCell[0]&&t.row===hovCell[1])){
    const td=TD[selType],r=td.lv[0].range*CS,px=hovCell[0]*CS+CS/2,py=hovCell[1]*CS+CS/2;

  }
  // Selected tower range
  if(selTower){
    const c=TD[selTower.type].color;
    cx.fillStyle=c+'15';cx.strokeStyle=c+'88';cx.lineWidth=2;
    cx.beginPath();cx.arc(selTower.px,selTower.py,selTower.rangePx,0,Math.PI*2);cx.fill();cx.stroke();

    cx.strokeStyle=c;cx.lineWidth=2.5;cx.strokeRect(selTower.col*CS+2,selTower.row*CS+2,CS-4,CS-4);

  towers.forEach(t=>{

    cx.fillStyle='#1e2432';cx.fillRect(t.col*CS+2,t.row*CS+2,CS-4,CS-4);

    grd.addColorStop(0,lc+'33');grd.addColorStop(1,'transparent');
    cx.fillStyle=grd;cx.fillRect(t.col*CS+2,t.row*CS+2,CS-4,CS-4);

    cx.fillText(TD[t.type].icon,0,2);

      cx.beginPath();cx.arc(t.col*CS+9+i*8,t.row*CS+5,3,0,Math.PI*2);cx.fill();

function drawEnemies(){
  enemies.forEach(e=>{
    if(e.dead)return;
    const alpha=e.stealth?.5:1;cx.globalAlpha=alpha;
    // Freeze glow
    if(e.freezeT>0){cx.fillStyle='rgba(100,200,255,.3)';cx.beginPath();cx.arc(e.x,e.y,22,0,Math.PI*2);cx.fill();}
    // Shadow
    cx.fillStyle='rgba(0,0,0,.3)';cx.beginPath();cx.ellipse(e.x,e.y+2,14,6,0,0,Math.PI*2);cx.fill();
    // Icon
    const sz=e.isBoss?2.2:e.type==='dragon'?2.8:1.5;
    cx.font=sz+'rem sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(e.icon,e.x,e.y+4);
    cx.globalAlpha=1;
    // HP bar
    if(!e.isBoss){
      const bw=30,bh=4,bx=e.x-bw/2,by=e.y-22;
      cx.fillStyle='#222';cx.fillRect(bx,by,bw,bh);
      const p=e.hp/e.maxHp;cx.fillStyle=p>.5?'#2ecc71':p>.25?'#f39c12':'#e74c3c';
      cx.fillRect(bx,by,bw*p,bh);
    } else {
      const bw=52,bh=7,bx=e.x-bw/2,by=e.y-32;
      cx.fillStyle='#111';cx.fillRect(bx-1,by-1,bw+2,bh+2);
      cx.fillStyle='#e74c3c';cx.fillRect(bx,by,bw*(e.hp/e.maxHp),bh);
      cx.strokeStyle='#f55';cx.lineWidth=1;cx.strokeRect(bx,by,bw,bh);
      cx.fillStyle='#ffd700';cx.font='bold 9px sans-serif';cx.textAlign='center';
      cx.fillText(e.type.toUpperCase()+' '+Math.ceil(e.hp),e.x,by-2);
    }
    if(e.burnT>0){cx.font='.65rem sans-serif';cx.textAlign='center';cx.fillText('🔥',e.x+14,e.y-14);}
    if(e.slowT>0){cx.font='.65rem sans-serif';cx.fillText('❄️',e.x-14,e.y-14);}
  });
  cx.globalAlpha=1;
}

function drawBullets(){
  bullets.forEach(b=>{
    cx.fillStyle=b.color;cx.shadowBlur=10;cx.shadowColor=b.color;
    cx.beginPath();cx.arc(b.x,b.y,b.opts.aoe?7:4,0,Math.PI*2);cx.fill();
    cx.shadowBlur=0;
  });
  lightnings.forEach(l=>{
    cx.save();cx.strokeStyle=`rgba(255,220,0,${l.life/10})`;cx.lineWidth=2;cx.shadowBlur=10;cx.shadowColor='#ffd700';
    cx.beginPath();cx.moveTo(l.x1,l.y1);
    const steps=5,dx=(l.x2-l.x1)/steps,dy=(l.y2-l.y1)/steps;
    for(let i=1;i<steps;i++)cx.lineTo(l.x1+dx*i+(Math.random()-.5)*14,l.y1+dy*i+(Math.random()-.5)*14);
    cx.lineTo(l.x2,l.y2);cx.stroke();cx.restore();
  });
  // Wave effects
  waveEffects.forEach(ef=>{
    if(ef.type==='meteor'){
      cx.save();cx.translate(ef.x,ef.y);cx.rotate(Math.PI/4);
      cx.font='1.8rem sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('☄️',0,0);
      // Trail
      cx.fillStyle='rgba(255,100,30,.4)';for(let i=1;i<=4;i++)cx.fillRect(-4,i*8,8,6);

      cx.fillStyle=`rgba(162,155,254,${ef.life/120*.6})`;

      cx.strokeStyle='#a29bfe';cx.lineWidth=2;cx.beginPath();cx.ellipse(ef.x,ef.y,30,50,0,0,Math.PI*2);cx.stroke();
    }
  });
}

function drawParticles(){

}

  const stats=[['데미지',td.dmg],['사거리',td.range],['속도',td.rate+'f'],['킬',t.kills]];
  stats.forEach(([k,v],i)=>cx.fillText(k+': '+v,55+i*120,y+32));
  cx.fillStyle='#88c';cx.font='10px sans-serif';cx.fillText(td.desc+(td.special?' ('+td.special+')':''),55,y+46);
  // Upgrade
  if(t.lv<2){
    const uc=td.upgCost,canU=gold>=uc;
    cx.fillStyle=canU?'rgba(50,180,50,.8)':'rgba(40,40,40,.5)';cx.fillRect(GW-240,y+6,108,h-14);
    cx.strokeStyle=canU?'#2ecc71':'#444';cx.lineWidth=1.5;cx.strokeRect(GW-240,y+6,108,h-14);
    cx.fillStyle=canU?'#fff':'#666';cx.font='bold 11px sans-serif';cx.textAlign='center';
    cx.fillText('⬆ 업그레이드',GW-186,y+h/2-3);cx.fillText('💰'+uc,GW-186,y+h/2+12);
  } else {
    cx.fillStyle='rgba(60,60,60,.4)';cx.fillRect(GW-240,y+6,108,h-14);
    cx.strokeStyle='#444';cx.lineWidth=1;cx.strokeRect(GW-240,y+6,108,h-14);
    cx.fillStyle='#ffd700';cx.font='bold 12px sans-serif';cx.textAlign='center';cx.fillText('★ MAX',GW-186,y+h/2+4);
  }
  cx.fillStyle='rgba(160,40,40,.8)';cx.fillRect(GW-126,y+6,118,h-14);
  cx.strokeStyle='#e74c3c';cx.lineWidth=1.5;cx.strokeRect(GW-126,y+6,118,h-14);
  cx.fillStyle='#fff';cx.font='bold 11px sans-serif';cx.textAlign='center';
  cx.fillText('💰 판매 +'+t.sellVal,GW-67,y+h/2+4);
  cx.fillStyle='#444';cx.font='9px sans-serif';cx.textAlign='left';cx.fillText('[다른 곳 클릭 = 닫기]',55,y+h-5);
}

function drawOverlays(){
  if(gameOver){
    cx.fillStyle='rgba(0,0,0,.82)';cx.fillRect(0,0,GW,GH);
    cx.textAlign='center';cx.strokeStyle='#000';cx.lineWidth=4;
    cx.fillStyle='#e74c3c';cx.font='bold 52px sans-serif';cx.strokeText('💀 게임 오버',GW/2,GH/2-30);cx.fillText('💀 게임 오버',GW/2,GH/2-30);
    cx.fillStyle='#ffd700';cx.font='bold 26px sans-serif';cx.fillText('점수: '+score+'  최고: '+best,GW/2,GH/2+25);
    cx.fillStyle='#aaa';cx.font='16px sans-serif';cx.fillText('새로고침으로 다시 시작',GW/2,GH/2+65);
  }
  if(gameWon){
    cx.fillStyle='rgba(0,0,20,.85)';cx.fillRect(0,0,GW,GH);
    cx.textAlign='center';cx.strokeStyle='#000';cx.lineWidth=4;
    cx.fillStyle='#ffd700';cx.font='bold 48px sans-serif';cx.strokeText('🏆 클리어!',GW/2,GH/2-40);cx.fillText('🏆 클리어!',GW/2,GH/2-40);
    cx.fillStyle='#fff';cx.font='24px sans-serif';cx.fillText('최종 점수: '+score,GW/2,GH/2+15);
    cx.fillStyle='#aaa';cx.font='16px sans-serif';cx.fillText('새로고침으로 다시 시작',GW/2,GH/2+60);
  }
  if(!waveRunning&&wave>0&&!gameOver&&!gameWon&&wave<20){
    cx.fillStyle='rgba(0,180,80,.12)';cx.fillRect(GW/2-180,8,360,32);
    cx.strokeStyle='rgba(0,200,100,.4)';cx.lineWidth=1;cx.strokeRect(GW/2-180,8,360,32);
    cx.fillStyle='#2ecc71';cx.font='bold 13px sans-serif';cx.textAlign='center';
    cx.fillText('✅ 웨이브 '+wave+' 완료! 아래 버튼으로 다음 웨이브 시작',GW/2,28);
  }
}

// ===========================
//  MAIN UPDATE
// ===========================
function update(){
  if(gameOver||gameWon)return;
  frameN++;shakeX*=.7;shakeY*=.7;
  // Spawn queues
  for(let qi=spawnQueues.length-1;qi>=0;qi--){
    const sq=spawnQueues[qi];sq.tick++;
    while(sq.q.length>0&&sq.tick>=sq.q[0].delay){enemies.push(new Enemy(sq.q[0].type,sq.waveN));sq.q.shift();}
    if(sq.q.length===0)spawnQueues.splice(qi,1);
  }
  // Check wave completion
  if(waveRunning&&spawnQueues.length===0&&enemies.filter(e=>!e.dead).length===0){
    waveRunning=false;
    const bonus=40+wave*12;gold+=bonus;
    showInfo('✅ 웨이브 '+wave+' 완료! 💰+'+bonus,110,'#2ecc71');
    sfxUI();if(wave>=20)gameWon=true;
  }
  // Update enemies
  for(let i=enemies.length-1;i>=0;i--){
    if(enemies[i].dead){enemies.splice(i,1);continue;}
    const r=enemies[i].update();
    if(r==='leak'){lives--;enemies.splice(i,1);addP(PATH[PATH.length-1][0]*CS,PATH[PATH.length-1][1]*CS,'#f55',12,4,4);if(lives<=0){gameOver=true;return;}}
    else if(enemies[i]&&enemies[i].dead)enemies.splice(i,1);
  }
  updateTowers();
  for(let i=bullets.length-1;i>=0;i--){bullets[i].update();if(bullets[i].dead)bullets.splice(i,1);}
  updateWaveEffects();
  lightnings.forEach(l=>l.life--);lightnings=lightnings.filter(l=>l.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=.026;p.sz*=.96;});
  particles=particles.filter(p=>p.life>0);
  if(infoTimer>0)infoTimer--;
}

function gameLoop(){
  for(let s=0;s<speedMult;s++)update();
  cx.save();if(Math.abs(shakeX)>0.5){cx.translate(shakeX,shakeY);}
  cx.clearRect(0,0,W,H);
  drawBG();drawTowers();drawEnemies();drawBullets();drawParticles();drawOverlays();cx.restore();
  drawUI();
  requestAnimationFrame(gameLoop);
}

// ===========================
//  INPUT
// ===========================
cv.addEventListener('mousemove',e=>{
  const rect=cv.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width),my=(e.clientY-rect.top)*(H/rect.height);
  hovCell=my<GH?[Math.floor(mx/CS),Math.floor(my/CS)]:null;
});
cv.addEventListener('mouseleave',()=>hovCell=null);

cv.addEventListener('click',e=>{
  const rect=cv.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width),my=(e.clientY-rect.top)*(H/rect.height);

  if(my>=GH){
    // 줄2: 속도 버튼 (y=UI_ROW2 ~ UI_ROW2+26)
    if(my>=UI_ROW2&&my<=UI_ROW2+26){
      [1,2,3,4].forEach((s,i)=>{if(mx>=6+i*58&&mx<=6+i*58+54){speedMult=s;sfxUI();}});
      // 웨이브 버튼 (x=244 이후)
      if(mx>=244){startWave(waveRunning);return;}
      return;
    }
    // 줄3: 상점 or 타워패널 (y>=UI_SHOP)
    if(my>=UI_SHOP){
      const h=H-UI_SHOP-4;
      if(selTower){
        if(mx>=GW-240&&mx<=GW-132&&my>=UI_SHOP+6&&my<=UI_SHOP+h-6){selTower.upgrade();return;}
        if(mx>=GW-126&&mx<=GW-8&&my>=UI_SHOP+6&&my<=UI_SHOP+h-6){towers=towers.filter(t=>t!==selTower);selTower.sell();selTower=null;return;}
        selTower=null;return;
      } else {
        TD.forEach((t,i)=>{if(mx>=i*100+2&&mx<=i*100+100){const unlocked=wave>=t.unlock||i<3;if(unlocked&&gold>=t.lv[0].cost){selType=i;sfxUI();}}});
      }
    }
    return;
  }

  const col=Math.floor(mx/CS),row=Math.floor(my/CS);
  if(col<0||col>=COLS||row<0||row>=ROWS)return;
  const existing=towers.find(t=>t.col===col&&t.row===row);
  if(existing){selTower=selTower===existing?null:existing;sfxUI();return;}
  if(selTower){selTower=null;return;}
  if(PATH_SET.has(col+','+row)){showInfo('경로 위에는 설치 불가!',50,'#e74c3c');return;}
  const cost=TD[selType].lv[0].cost;
  if(gold<cost){showInfo('💰 골드 부족! '+cost+' 필요',60,'#e74c3c');return;}
  const unlocked=wave>=TD[selType].unlock||selType<3;
  if(!unlocked){showInfo('🔒 웨이브 '+TD[selType].unlock+' 이후 해금',60,'#aaa');return;}
  gold-=cost;towers.push(new Tower(col,row,selType));sfxUI();
  showInfo(TD[selType].icon+' '+TD[selType].name+' 설치 완료!',45,'#2ecc71');
});

cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0];
  cv.dispatchEvent(new MouseEvent('click',{clientX:t.clientX,clientY:t.clientY}));
},{passive:false});

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){startWave(waveRunning);e.preventDefault();}
  if(e.code==='KeyQ')speedMult=speedMult%4+1;
  if(e.code==='Escape'){selTower=null;selType=0;}
});

gameLoop();
</script>
