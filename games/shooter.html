<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛸 우주 슈팅</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:'Segoe UI',sans-serif; color:#fff; overflow:hidden; }
#top-bar { width:480px; display:flex; justify-content:space-between; align-items:center; padding:6px 0; }
#top-bar a { color:#aaa; text-decoration:none; font-size:0.85rem; }
#music-btn { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:6px; color:#fff; font-size:0.85rem; padding:4px 10px; cursor:pointer; }
canvas { display:block; border:1px solid #222; }
#ui { width:480px; display:flex; justify-content:space-between; align-items:center; padding:6px 4px; font-size:0.9rem; }
#lives-bar span { color:#e74c3c; font-size:1.1rem; }
#score-bar { color:#ffd700; font-weight:bold; }
#level-bar { color:#7be; }
#ctrl { display:flex; gap:8px; margin-top:8px; }
.cbtn { background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.2); border-radius:8px; color:#fff; font-size:1rem; width:50px; height:50px; cursor:pointer; user-select:none; }
.cbtn:active { background:rgba(255,255,255,0.3); }
</style>
</head>
<body>
<div id="top-bar">
  <a href="index.html">← 메뉴</a>
  <span id="score-bar">점수: 0</span>
  <button id="music-btn" onclick="toggleMusic()">🎵 켜기</button>
</div>
<canvas id="c" width="480" height="560"></canvas>
<div id="ui">
  <div id="lives-bar">목숨: <span id="life-icons">❤️❤️❤️</span></div>
  <div id="level-bar">레벨 1</div>
  <div id="best-bar" style="color:#aaa">최고: 0</div>
</div>
<div id="ctrl">
  <button class="cbtn" id="btn-l" onpointerdown="keys.left=true" onpointerup="keys.left=false">◀</button>
  <button class="cbtn" id="btn-fire" onpointerdown="keys.fire=true" onpointerup="keys.fire=false">🔥</button>
  <button class="cbtn" id="btn-r" onpointerdown="keys.right=true" onpointerup="keys.right=false">▶</button>
</div>

<script>
// ===== 음악 (3채널: 멜로디 + 베이스 + 드럼) =====
const N={R:0,C3:131,G3:196,A3:220,B3:247,C4:262,D4:294,E4:330,F4:349,G4:392,A4:440,B4:494,C5:523,D5:587,E5:659,F5:698,G5:784,A5:880};
const LEAD=[[N.E5,.25],[N.E5,.25],[N.R,.25],[N.E5,.25],[N.R,.25],[N.C5,.25],[N.E5,.5],[N.G5,.5],[N.R,.5],[N.G4,.5],[N.R,.5],[N.C5,.5],[N.R,.25],[N.G4,.5],[N.R,.25],[N.E4,.5],[N.R,.25],[N.A4,.5],[N.B4,.5],[N.A4,.25],[N.G4,.25],[N.E5,.25],[N.G5,.25],[N.A5,.5],[N.F5,.25],[N.G5,.25],[N.R,.25],[N.E5,.5],[N.C5,.25],[N.D5,.25],[N.B4,.5],[N.R,.25]];
const BASS=[[N.C3,.5],[N.C3,.5],[N.G3,.5],[N.G3,.5],[N.A3,.5],[N.A3,.5],[N.F4,.25],[N.F4,.25],[N.C3,.5],[N.C3,.5],[N.G3,.5],[N.A3,.25],[N.A3,.25],[N.G3,.5],[N.G3,.5]];
let audioCtx=null,musicOn=false,musicTimer=null,nxt=[0,0],idx=[0,0];
function gc(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function sn(freq,t,dur,type='square',vol=0.08){const ctx=gc();if(!freq)return;const o=ctx.createOscillator(),g=ctx.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur*.85);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+dur);}
function drum(t,type){const ctx=gc();const buf=ctx.createBuffer(1,ctx.sampleRate*.1,ctx.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);const src=ctx.createBufferSource();const g=ctx.createGain(),f=ctx.createBiquadFilter();src.buffer=buf;f.type='lowpass';f.frequency.value=type==='kick'?180:5000;g.gain.setValueAtTime(type==='kick'?.4:.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+.08);src.connect(f);f.connect(g);g.connect(ctx.destination);src.start(t);}
function schedMusic(){
  if(!musicOn)return;
  const ctx=gc(),b=60/160;
  while(nxt[0]<ctx.currentTime+0.3){const[f,beats]=LEAD[idx[0]];sn(f,nxt[0],b*beats*.9,'square',.07);nxt[0]+=b*beats;idx[0]=(idx[0]+1)%LEAD.length;}
  while(nxt[1]<ctx.currentTime+0.3){const[f,beats]=BASS[idx[1]];sn(f,nxt[1],b*beats*.9,'square',.05);nxt[1]+=b*beats;idx[1]=(idx[1]+1)%BASS.length;}
  // 드럼 비트
  const ctx2=gc(),now=ctx2.currentTime;
  for(let i=0;i<4;i++){const t=Math.ceil(now/b)*b+i*b;if(t>now+.05&&t<now+.3){drum(t,'kick');if(i%2===1)drum(t+b*.5,'snare');}}
  musicTimer=setTimeout(schedMusic,100);
}
function toggleMusic(){
  const btn=document.getElementById('music-btn');
  if(musicOn){musicOn=false;clearTimeout(musicTimer);btn.textContent='🎵 켜기';}
  else{musicOn=true;const ctx=gc();ctx.resume();nxt[0]=ctx.currentTime+.1;nxt[1]=ctx.currentTime+.1;idx[0]=0;idx[1]=0;schedMusic();btn.textContent='🔇 끄기';}
}
function sfx(freq,dur,type='square'){const ctx=gc();ctx.resume();const o=ctx.createOscillator(),g=ctx.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(.2,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+dur);}
function explodeSfx(){sfx(200,.05);setTimeout(()=>sfx(150,.08),50);setTimeout(()=>sfx(100,.12),100);}
function shootSfx(){sfx(880,.04);}

// ===== 게임 =====
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=480,H=560;
let state='title',score=0,best=Number(localStorage.getItem('best_shooter')||0),lives=3,level=1,frame=0;
let player,bullets=[],enemies=[],particles=[],powerups=[];
let spawnTimer=0,spawnInterval=90,keys={left:false,right:false,fire:false},fireTimer=0;
const STARS=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2+.5,sp:Math.random()*1.5+.5}));

function initPlayer(){player={x:W/2,y:H-60,w:36,h:28,shield:false,rapid:false,powerTimer:0};}

function spawnEnemy(){
  const type=Math.random()<.15&&level>2?'boss':Math.random()<.3?'fast':'normal';
  const hp=type==='boss'?5:type==='fast'?1:2;
  const spd=type==='boss'?.8:type==='fast'?2.5:1.2+level*.1;
  enemies.push({x:Math.random()*(W-40)+20,y:-30,w:type==='boss'?48:30,h:type==='boss'?36:22,hp,maxHp:hp,spd,type,shootTimer:Math.random()*120,vx:(Math.random()-.5)*.8});
}

function addParticle(x,y,color,count=10){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*4+1;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color,size:Math.random()*4+2});
  }
}

function spawnPowerup(x,y){
  if(Math.random()>.35)return;
  const types=['rapid','shield','bomb'];
  powerups.push({x,y,type:types[Math.floor(Math.random()*types.length)],vy:1.2,life:300});
}

function update(){
  if(state!=='play')return;
  frame++;

  // 배경별 이동
  STARS.forEach(s=>{s.y+=s.sp;if(s.y>H)s.y=0;});

  // 플레이어 이동
  const spd=player.rapid?6:4;
  if(keys.left&&player.x>player.w/2)player.x-=spd;
  if(keys.right&&player.x<W-player.w/2)player.x+=spd;

  // 발사
  fireTimer++;
  const fireRate=player.rapid?6:14;
  if(keys.fire&&fireTimer>=fireRate){
    bullets.push({x:player.x,y:player.y-player.h/2,type:'player',vy:-10,w:4,h:12});
    shootSfx();fireTimer=0;
  }

  // 파워업 타이머
  if(player.powerTimer>0){player.powerTimer--;if(player.powerTimer===0){player.rapid=false;player.shield=false;}}

  // 적 스폰
  spawnTimer++;
  if(spawnTimer>=spawnInterval){spawnEnemy();spawnTimer=0;spawnInterval=Math.max(40,90-level*5);}

  // 적 총알
  enemies.forEach(e=>{
    e.x+=e.vx;if(e.x<e.w/2||e.x>W-e.w/2)e.vx*=-1;
    e.y+=e.spd;
    e.shootTimer--;
    if(e.shootTimer<=0){
      bullets.push({x:e.x,y:e.y+e.h/2,type:'enemy',vy:3+level*.3,w:5,h:10});
      e.shootTimer=60+Math.random()*80;
    }
  });

  // 총알 이동
  bullets.forEach(b=>b.y+=b.vy);
  bullets=bullets.filter(b=>b.y>-20&&b.y<H+20);

  // 파워업 이동
  powerups.forEach(p=>{p.y+=p.vy;p.life--;});
  powerups=powerups.filter(p=>p.y<H+20&&p.life>0);

  // 파티클
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=.025;p.size*=.97;});
  particles=particles.filter(p=>p.life>0);

  // 충돌: 플레이어 총알 vs 적
  for(let bi=bullets.length-1;bi>=0;bi--){
    const b=bullets[bi];if(b.type!=='player')continue;
    for(let ei=enemies.length-1;ei>=0;ei--){
      const e=enemies[ei];
      if(Math.abs(b.x-e.x)<(b.w/2+e.w/2)&&Math.abs(b.y-e.y)<(b.h/2+e.h/2)){
        bullets.splice(bi,1);e.hp--;
        addParticle(b.x,b.y,'#ff6');
        if(e.hp<=0){
          score+=e.type==='boss'?500:e.type==='fast'?150:100;
          if(score>best){best=score;localStorage.setItem('best_shooter',best);}
          addParticle(e.x,e.y,'#f84',e.type==='boss'?25:15);
          explodeSfx();
          spawnPowerup(e.x,e.y);
          enemies.splice(ei,1);
          document.getElementById('score-bar').textContent='점수: '+score;
        }
        break;
      }
    }
  }

  // 충돌: 적 총알/적 vs 플레이어
  const px=player.x,py=player.y,pw=player.w,ph=player.h;
  for(let bi=bullets.length-1;bi>=0;bi--){
    const b=bullets[bi];if(b.type!=='enemy')continue;
    if(Math.abs(b.x-px)<(b.w/2+pw/2)&&Math.abs(b.y-py)<(b.h/2+ph/2)){
      bullets.splice(bi,1);
      if(!player.shield)hitPlayer();
      else addParticle(px,py,'#4af',8);
    }
  }
  for(let ei=enemies.length-1;ei>=0;ei--){
    const e=enemies[ei];
    if(e.y>H){enemies.splice(ei,1);if(!player.shield)hitPlayer();continue;}
    if(Math.abs(e.x-px)<(e.w/2+pw/2)&&Math.abs(e.y-py)<(e.h/2+ph/2)){
      enemies.splice(ei,1);addParticle(e.x,e.y,'#f84',12);explodeSfx();
      if(!player.shield)hitPlayer();
    }
  }

  // 파워업 획득
  for(let pi=powerups.length-1;pi>=0;pi--){
    const p=powerups[pi];
    if(Math.abs(p.x-px)<30&&Math.abs(p.y-py)<30){
      applyPowerup(p.type);powerups.splice(pi,1);
    }
  }

  // 레벨업
  const newLevel=1+Math.floor(score/1000);
  if(newLevel>level){level=newLevel;document.getElementById('level-bar').textContent='레벨 '+level;sfx(660,.1);setTimeout(()=>sfx(880,.1),120);}
}

function hitPlayer(){
  lives--;addParticle(player.x,player.y,'#f00',20);explodeSfx();
  document.getElementById('life-icons').textContent='❤️'.repeat(Math.max(0,lives));
  if(lives<=0)gameOver();
}

function applyPowerup(type){
  if(type==='rapid'){player.rapid=true;player.powerTimer=300;sfx(1000,.05);}
  else if(type==='shield'){player.shield=true;player.powerTimer=300;sfx(800,.05);}
  else if(type==='bomb'){enemies.forEach(e=>{addParticle(e.x,e.y,'#f84',15);score+=100;});enemies=[];explodeSfx();document.getElementById('score-bar').textContent='점수: '+score;}
}

function gameOver(){
  state='over';
  document.getElementById('best-bar').textContent='최고: '+best;
}

function draw(){
  cx.fillStyle='#000';cx.fillRect(0,0,W,H);

  // 별
  STARS.forEach(s=>{cx.fillStyle=`rgba(255,255,255,${.3+s.s*.2})`;cx.beginPath();cx.arc(s.x,s.y,s.s*.6,0,Math.PI*2);cx.fill();});

  if(state==='title'){
    cx.fillStyle='#fff';cx.font='bold 2.5rem sans-serif';cx.textAlign='center';cx.fillText('🛸 우주 슈팅',W/2,H/2-60);
    cx.font='1rem sans-serif';cx.fillStyle='#aaa';cx.fillText('화면 클릭 또는 스페이스바로 시작',W/2,H/2);
    cx.fillStyle='#ffd700';cx.font='.9rem sans-serif';cx.fillText('최고 기록: '+best+'점',W/2,H/2+40);
    return;
  }
  if(state==='over'){
    cx.fillStyle='rgba(0,0,0,.6)';cx.fillRect(0,0,W,H);
    cx.textAlign='center';cx.fillStyle='#f55';cx.font='bold 2rem sans-serif';cx.fillText('💀 게임 오버',W/2,H/2-60);
    cx.fillStyle='#ffd700';cx.font='1.4rem sans-serif';cx.fillText(score+'점',W/2,H/2-10);
    cx.fillStyle='#aaa';cx.font='1rem sans-serif';cx.fillText('최고: '+best+'점',W/2,H/2+30);
    cx.fillStyle='#fff';cx.font='1rem sans-serif';cx.fillText('클릭하면 다시 시작',W/2,H/2+70);
    return;
  }

  // 파워업
  powerups.forEach(p=>{
    const icons={rapid:'⚡',shield:'🛡️',bomb:'💣'};
    cx.font='1.4rem sans-serif';cx.textAlign='center';cx.fillText(icons[p.type],p.x,p.y);
  });

  // 적
  enemies.forEach(e=>{
    const grad=cx.createRadialGradient(e.x,e.y,2,e.x,e.y,e.w/2);
    grad.addColorStop(0,e.type==='boss'?'#f44':'#e74');
    grad.addColorStop(1,e.type==='boss'?'#a00':'#600');
    cx.fillStyle=grad;
    cx.beginPath();cx.ellipse(e.x,e.y,e.w/2,e.h/2,0,0,Math.PI*2);cx.fill();
    cx.font=(e.type==='boss'?'2rem':'1.5rem')+' sans-serif';cx.textAlign='center';cx.fillText(e.type==='boss'?'👾':'👽',e.x,e.y+8);
    if(e.maxHp>1){cx.fillStyle='#333';cx.fillRect(e.x-e.w/2,e.y-e.h/2-8,e.w,5);cx.fillStyle='#2ecc71';cx.fillRect(e.x-e.w/2,e.y-e.h/2-8,e.w*(e.hp/e.maxHp),5);}
  });

  // 플레이어
  cx.save();cx.translate(player.x,player.y);
  if(player.shield){cx.strokeStyle='rgba(100,180,255,.5)';cx.lineWidth=3;cx.beginPath();cx.arc(0,0,28,0,Math.PI*2);cx.stroke();}
  cx.font='2.2rem sans-serif';cx.textAlign='center';cx.fillText('🚀',0,10);
  if(player.rapid&&frame%4<2){cx.fillStyle='#ff0';cx.font='.7rem sans-serif';cx.fillText('⚡',16,-10);}
  cx.restore();

  // 총알
  bullets.forEach(b=>{
    cx.fillStyle=b.type==='player'?'#4df':'#f84';
    cx.shadowBlur=8;cx.shadowColor=b.type==='player'?'#4df':'#f84';
    cx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h);
    cx.shadowBlur=0;
  });

  // 파티클
  particles.forEach(p=>{
    cx.globalAlpha=p.life;cx.fillStyle=p.color;
    cx.beginPath();cx.arc(p.x,p.y,p.size,0,Math.PI*2);cx.fill();
  });
  cx.globalAlpha=1;
}

function loop(){update();draw();requestAnimationFrame(loop);}

// 입력
document.addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft')keys.left=true;
  if(e.code==='ArrowRight')keys.right=true;
  if(e.code==='Space'){keys.fire=true;e.preventDefault();}
  if((e.code==='Space'||e.code==='Enter')&&state!=='play'){startGame();}
});
document.addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft')keys.left=false;
  if(e.code==='ArrowRight')keys.right=false;
  if(e.code==='Space')keys.fire=false;
});
cv.addEventListener('click',()=>{if(state!=='play')startGame();});
cv.addEventListener('mousemove',e=>{
  if(state!=='play')return;
  const rect=cv.getBoundingClientRect();
  player.x=Math.max(player.w/2,Math.min(W-player.w/2,(e.clientX-rect.left)*(W/rect.width)));
});
cv.addEventListener('touchmove',e=>{
  if(state!=='play')return;
  e.preventDefault();
  const rect=cv.getBoundingClientRect();
  player.x=Math.max(player.w/2,Math.min(W-player.w/2,(e.touches[0].clientX-rect.left)*(W/rect.width)));
},{passive:false});
cv.addEventListener('touchstart',e=>{
  keys.fire=true;
  if(state!=='play')startGame();
});
cv.addEventListener('touchend',()=>keys.fire=false);

function startGame(){
  state='play';score=0;lives=3;level=1;frame=0;
  bullets=[];enemies=[];particles=[];powerups=[];spawnTimer=0;spawnInterval=90;fireTimer=0;
  initPlayer();
  document.getElementById('score-bar').textContent='점수: 0';
  document.getElementById('level-bar').textContent='레벨 1';
  document.getElementById('life-icons').textContent='❤️❤️❤️';
  document.getElementById('best-bar').textContent='최고: '+best;
}

document.getElementById('best-bar').textContent='최고: '+best;
loop();
</script>
</body>
</html>
